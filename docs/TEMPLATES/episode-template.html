<!DOCTYPE html>
<html lang="en" class="page-episode-template neo-dark-doc" data-mm-persist-id="episode-template">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="neo-brutalist.css" />
  <link rel="stylesheet" href="neo-brutal-overrides.css" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Episode Tracker</title>
  
<script>/* mm-template-runtime */
(function (w) {
  var DEBOUNCE_MS = 280;
  var saveTimer = null;
  var mo = null;

  function persistKey() {
    var id = document.documentElement.getAttribute("data-mm-persist-id");
    if (id) return "mm-persist:" + id;
    try {
      var p = location.pathname || "";
      var m = p.match(/[^\/]+$/);
      return "mm-persist:" + (m ? decodeURIComponent(m[0]) : "page");
    } catch (e) {
      return "mm-persist:page";
    }
  }

  function legacyPersistKey() {
    try {
      var p = location.pathname || "";
      var m = p.match(/[^\/]+$/);
      if (m && m[0]) return "mm-template-persist:" + m[0];
    } catch (e) {}
    return null;
  }

  function getRoot() {
    return document.getElementById("__mmPersistRoot");
  }

  function setStatus(msg) {
    var el = document.getElementById("mm-tpl-status");
    if (el) el.textContent = msg || "Changes saved locally";
  }

  function saveState(sync) {
    var root = getRoot();
    if (!root) return;
    if (saveTimer) {
      clearTimeout(saveTimer);
      saveTimer = null;
    }
    var run = function () {
      try {
        localStorage.setItem(persistKey(), root.innerHTML);
        setStatus("Changes saved locally");
      } catch (e) {
        setStatus("Could not save (storage blocked or full)");
      }
    };
    if (sync) {
      run();
    } else {
      setStatus("Saving…");
      saveTimer = setTimeout(run, DEBOUNCE_MS);
    }
  }

  function loadState() {
    var root = getRoot();
    if (!root) return;
    try {
      var raw = localStorage.getItem(persistKey());
      if (!raw) {
        var leg = legacyPersistKey();
        if (leg) raw = localStorage.getItem(leg);
      }
      if (raw) root.innerHTML = raw;
    } catch (e) {}
  }

  function stripToolbar() {
    document.querySelectorAll(".mm-template-toolbar").forEach(function (n) {
      if (n.parentNode) n.parentNode.removeChild(n);
    });
  }

  function exportThisVersion() {
    saveState(true);
    stripToolbar();
    try {
      var path = location.pathname || "";
      var m = path.match(/[^/]+$/);
      var base = (m && m[0]) ? m[0] : "page.html";
      base = base.replace(/\.html$/i, "").replace(/\.htm$/i, "");
      var filename = base + "-export.html";
      var markup = "<!DOCTYPE html>\n" + document.documentElement.outerHTML;
      var blob = new Blob([markup], { type: "text/html;charset=utf-8" });
      var url = URL.createObjectURL(blob);
      var a = document.createElement("a");
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(function () {
        URL.revokeObjectURL(url);
        attachToolbar();
      }, 0);
    } catch (e) {
      attachToolbar();
      window.alert("Export failed (some browsers block downloads from local files).");
    }
  }

  function restoreDefault() {
    if (!window.confirm("Restore the original template and clear saved data?")) return;
    try {
      localStorage.removeItem(persistKey());
      var leg = legacyPersistKey();
      if (leg) localStorage.removeItem(leg);
    } catch (e) {}
    location.reload();
  }

  function attachToolbar() {
    stripToolbar();
    var bar = document.createElement("div");
    bar.className = "mm-template-toolbar";
    bar.setAttribute("role", "region");
    bar.setAttribute("aria-label", "Template tools");

    var bExport = document.createElement("button");
    bExport.type = "button";
    bExport.className = "mm-tpl-btn";
    bExport.textContent = "Export This Version";
    bExport.onclick = function () {
      exportThisVersion();
    };

    var bReset = document.createElement("button");
    bReset.type = "button";
    bReset.className = "mm-tpl-btn mm-tpl-btn--muted";
    bReset.textContent = "Restore Default";
    bReset.onclick = function () {
      restoreDefault();
    };

    var st = document.createElement("span");
    st.className = "mm-tpl-status";
    st.id = "mm-tpl-status";
    st.textContent = "Changes saved locally";

    bar.appendChild(bExport);
    bar.appendChild(bReset);
    bar.appendChild(st);
    document.body.insertBefore(bar, document.body.firstChild);
  }

  function initPersistHook() {
    document.addEventListener(
      "input",
      function () {
        saveState(false);
      },
      true
    );
    document.addEventListener(
      "change",
      function () {
        saveState(false);
      },
      true
    );
    var root = getRoot();
    if (root && typeof MutationObserver !== "undefined") {
      if (mo) mo.disconnect();
      mo = new MutationObserver(function () {
        saveState(false);
      });
      mo.observe(root, {
        subtree: true,
        childList: true,
        attributes: true,
        characterData: true
      });
    }
    window.addEventListener("beforeunload", function () {
      saveState(true);
    });
  }

  w.mmBindTableHeaderEditing = function () {
    if (!w.__mmHeaderThSeen) w.__mmHeaderThSeen = new WeakSet();
    var seen = w.__mmHeaderThSeen;
    document.querySelectorAll("table thead th").forEach(function (th) {
      if (seen.has(th)) return;
      seen.add(th);
      th.classList.add("mm-th-editable");
      th.setAttribute("spellcheck", "false");
      th.removeAttribute("tabindex");
      th.classList.remove("editable-cell");
      if (!th.getAttribute("title")) {
        th.setAttribute(
          "title",
          "Column header: double-click to edit. This labels the whole column and is a bit more fixed than the cells below."
        );
      }
      th.contentEditable = "false";
      th.addEventListener("dblclick", function () {
        th.contentEditable = "true";
        th.classList.add("mm-th-editing");
        th.focus();
        try {
          var rng = document.createRange();
          rng.selectNodeContents(th);
          var sel = w.getSelection && w.getSelection();
          if (sel) {
            sel.removeAllRanges();
            sel.addRange(rng);
          }
        } catch (e) {}
      });
      th.addEventListener("blur", function () {
        th.contentEditable = "false";
        th.classList.remove("mm-th-editing");
      });
      th.addEventListener("keydown", function (ev) {
        if (ev.key === "Escape") {
          ev.preventDefault();
          th.blur();
        }
      });
    });
  };

  w.loadState = loadState;
  w.saveState = saveState;
  w.exportThisVersion = exportThisVersion;
  w.restoreDefault = restoreDefault;
  w.attachToolbar = attachToolbar;
  w.initPersistHook = initPersistHook;
  w.mmPersistKey = persistKey;
  w.__mmPersistLoad = loadState;
  w.__mmPersistSave = function () {
    saveState(false);
  };
  w.__mmPersistHook = initPersistHook;
})(window);
</script>

</head>
<body>

<div id="__mmPersistRoot">
  <h1>🎙️ Episode Tracker</h1>

  <h2>Episodes</h2>

  <table id="episodes-table">
    <thead>
      <tr>
        <th>Episode Title</th>
        <th>Format</th>
        <th>Total Words</th>
        <th>Topics</th>
      </tr>
    </thead>
    <tbody>

    </tbody>
  </table>

  <datalist id="topic-options">
    <option value="sex"></option>
    <option value="rape"></option>
    <option value="anatomy"></option>
    <option value="rape"></option>
    <option value="reproduction"></option>
    <option value="marriage"></option>
    <option value="motherhood"></option>
    <option value="homosexuality"></option>
    <option value="mental illness"></option>
    <option value="clitoris"></option>
    <option value="male superiority"></option>
    <option value="female inferiority"></option>
  </datalist>

  <details>
    <summary>📌 Notes</summary>
    <p contenteditable="true">Use this table to track episode drafts, show formats, word counts, and recurring topics.</p>
  </details>

</div>

  <script>
  document.addEventListener("DOMContentLoaded", function () {
    if (typeof loadState === "function") loadState();
    if (typeof mmBindTableHeaderEditing === "function") mmBindTableHeaderEditing();

    const formatOptions = ["broadcast", "guest", "caller", "sponsor"];

    function createSelect(options, selectedValue = options[0]) {
      const select = document.createElement("select");

      options.forEach(optionValue => {
        const option = document.createElement("option");
        option.value = optionValue;
        option.textContent = optionValue;

        if (optionValue === selectedValue) {
          option.selected = true;
        }

        select.appendChild(option);
      });

      return select;
    }

    function createTopicPicker(initialTopics = []) {
      const wrapper = document.createElement("div");
      wrapper.className = "topic-picker";

      const controls = document.createElement("div");
      controls.className = "topic-controls";

      const input = document.createElement("input");
      input.className = "topic-input";
      input.setAttribute("list", "topic-options");
      input.placeholder = "Choose or type topic";

      const addButton = document.createElement("button");
      addButton.type = "button";
      addButton.textContent = "+ Add";

      const tags = document.createElement("div");
      tags.className = "topic-tags";

      function addTopic(value) {
        const topic = value.trim();
        if (!topic) return;

        const existing = [...tags.querySelectorAll(".topic-tag span")]
          .map(span => span.textContent.toLowerCase());

        if (existing.includes(topic.toLowerCase())) {
          input.value = "";
          return;
        }

        const tag = document.createElement("span");
        tag.className = "topic-tag";

        const label = document.createElement("span");
        label.textContent = topic;

        const removeButton = document.createElement("button");
        removeButton.type = "button";
        removeButton.textContent = "×";
        removeButton.title = "Remove topic";
        removeButton.addEventListener("click", () => tag.remove());

        tag.appendChild(label);
        tag.appendChild(removeButton);
        tags.appendChild(tag);
        input.value = "";
      }

      addButton.addEventListener("click", () => addTopic(input.value));

      input.addEventListener("keydown", event => {
        if (event.key === "Enter") {
          event.preventDefault();
          addTopic(input.value);
        }
      });

      controls.appendChild(input);
      controls.appendChild(addButton);
      wrapper.appendChild(controls);
      wrapper.appendChild(tags);

      initialTopics.forEach(addTopic);

      return wrapper;
    }

    function makeEditableCell(value = "") {
      const td = document.createElement("td");
      td.contentEditable = "true";
      td.textContent = value;
      return td;
    }

    function setupExistingRows() {
      const rows = document.querySelectorAll("#episodes-table tbody tr");

      const defaults = [
        { format: "broadcast", topics: ["old web", "tech history"] },
        { format: "caller", topics: ["internet culture", "personal story"] },
        { format: "sponsor", topics: ["software", "business"] }
      ];

      rows.forEach((row, index) => {
        const formatCell = row.children[1];
        const topicsCell = row.children[3];
        if (!formatCell || !topicsCell) return;

        if (!formatCell.querySelector("select")) {
          formatCell.appendChild(createSelect(formatOptions, defaults[index]?.format || "broadcast"));
        }
        if (!topicsCell.querySelector(".topic-picker")) {
          topicsCell.appendChild(createTopicPicker(defaults[index]?.topics || []));
        }
      });
    }

    function addRow(table) {
      const tbody = table.querySelector("tbody");
      const newRow = document.createElement("tr");

      newRow.appendChild(makeEditableCell(""));

      const formatCell = document.createElement("td");
      formatCell.appendChild(createSelect(formatOptions));
      newRow.appendChild(formatCell);

      newRow.appendChild(makeEditableCell(""));

      const topicsCell = document.createElement("td");
      topicsCell.appendChild(createTopicPicker());
      newRow.appendChild(topicsCell);

      tbody.appendChild(newRow);
    }

    function addButtonsToTables() {
      const tables = document.querySelectorAll("table");

      tables.forEach(table => {
        let button = table.nextElementSibling;
        if (!button || !button.classList.contains("add-row-button")) {
          button = document.createElement("button");
          button.type = "button";
          button.textContent = "+ Add row";
          button.className = "add-row-button";
          table.insertAdjacentElement("afterend", button);
        }
        button.onclick = () => addRow(table);

        let delButton = button.nextElementSibling;
        if (!delButton || !delButton.classList.contains("del-row-button")) {
          delButton = document.createElement("button");
          delButton.type = "button";
          delButton.textContent = "− Delete row";
          delButton.className = "del-row-button";
          button.insertAdjacentElement("afterend", delButton);
        }
        delButton.onclick = () => {
          const tbody = table.querySelector("tbody");
          if (tbody && tbody.rows.length > 0) {
            tbody.deleteRow(tbody.rows.length - 1);
          }
        };
      });
    }

    setupExistingRows();
    addButtonsToTables();

    if (typeof initPersistHook === "function") initPersistHook();
    if (typeof attachToolbar === "function") attachToolbar();
  });
  </script>
</body>
</html>
