<!DOCTYPE html>
<html lang="en" class="page-blank-tables neo-dark-doc">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="neo-brutalist.css" />
  <link rel="stylesheet" href="neo-brutal-overrides.css" />
<title>Editable Table Template</title>


</head>

<body>

<!-- Concepts -->
<table>
<thead>
<tr>
<th></th>
<th></th>
<th></th>
<th></th>
<th></th>
<th></th>
</tr>
</thead>
<tbody>
<tr>
<td contenteditable="true"></td>
<td contenteditable="true"></td>
<td contenteditable="true"></td>
<td>
<select>
<option>concept</option>
<option>entity</option>
<option>event</option>
<option>process</option>
<option>tag</option>
<option>source</option>
</select>
</td>
<td contenteditable="true"></td>
<td contenteditable="true"></td>
</tr>
</tbody>
</table>

<!-- Relationships -->
<table>
<thead>
<tr>
<th></th>
<th></th>
<th></th>
<th></th>
<th></th>
<th></th>
</tr>
</thead>
<tbody>
<tr>
<td contenteditable="true"></td>
<td contenteditable="true"></td>
<td contenteditable="true"></td>
<td>
<select>
<option>causes</option>
<option>depends_on</option>
<option>contradicts</option>
</select>
</td>
<td contenteditable="true"></td>
<td contenteditable="true"></td>
</tr>
</tbody>
</table>

<!-- Generic 2-column table -->
<table>
<thead>
<tr>
<th>col_1</th>
<th>col_2</th>
</tr>
</thead>
<tbody>
<tr>
<td contenteditable="true"></td>
<td contenteditable="true"></td>
</tr>
</tbody>
</table>

<script>
const typeOptions = ["concept", "entity", "event", "process", "tag", "source"];
const relationshipOptions = ["causes", "depends_on", "contradicts"];

function createSelect(options) {
  const select = document.createElement("select");

  options.forEach(value => {
    const option = document.createElement("option");
    option.value = value;
    option.textContent = value;
    select.appendChild(option);
  });

  return select;
}

function addRow(table, tableIndex) {
  const tbody = table.querySelector("tbody");
  const firstRow = tbody.querySelector("tr");
  const cellCount = firstRow.children.length;
  const row = document.createElement("tr");

  for (let i = 0; i < cellCount; i++) {
    const td = document.createElement("td");

    // First table, 4th column = type dropdown
    if (tableIndex === 0 && i === 3) {
      td.appendChild(createSelect(typeOptions));
    }

    // Second table, 4th column = relationship_type dropdown
    else if (tableIndex === 1 && i === 3) {
      td.appendChild(createSelect(relationshipOptions));
    }

    // Everything else = editable blank cell
    else {
      td.contentEditable = "true";
      td.textContent = "";
    }

    row.appendChild(td);
  }

  tbody.appendChild(row);
}

document.querySelectorAll("table").forEach((table, tableIndex) => {
  const btn = document.createElement("button");
  btn.textContent = "+ Add row";
  btn.className = "add-row-button";
  btn.addEventListener("click", () => addRow(table, tableIndex));
  table.after(btn);
});
</script>

</body>
</html>
