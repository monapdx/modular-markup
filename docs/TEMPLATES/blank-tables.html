<!DOCTYPE html>
<html lang="en" class="page-blank-tables neo-dark-doc" data-mm-persist-id="blank-tables">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="neo-brutalist.css" />
  <link rel="stylesheet" href="neo-brutal-overrides.css" />
<title>Editable Table Template</title>

<script>/* mm-template-runtime */
(function (w) {
  var DEBOUNCE_MS = 280;
  var saveTimer = null;
  var mo = null;

  function persistKey() {
    var id = document.documentElement.getAttribute("data-mm-persist-id");
    if (id) return "mm-persist:" + id;
    try {
      var p = location.pathname || "";
      var m = p.match(/[^\/]+$/);
      return "mm-persist:" + (m ? decodeURIComponent(m[0]) : "page");
    } catch (e) {
      return "mm-persist:page";
    }
  }

  function legacyPersistKey() {
    try {
      var p = location.pathname || "";
      var m = p.match(/[^\\/]+$/);
      if (m && m[0]) return "mm-template-persist:" + m[0];
    } catch (e) {}
    return null;
  }

  function getRoot() {
    return document.getElementById("__mmPersistRoot");
  }

  function setStatus(msg) {
    var el = document.getElementById("mm-tpl-status");
    if (el) el.textContent = msg || "Changes saved locally";
  }

  function saveState(sync) {
    var root = getRoot();
    if (!root) return;
    if (saveTimer) {
      clearTimeout(saveTimer);
      saveTimer = null;
    }
    var run = function () {
      try {
        localStorage.setItem(persistKey(), root.innerHTML);
        setStatus("Changes saved locally");
      } catch (e) {
        setStatus("Could not save (storage blocked or full)");
      }
    };
    if (sync) {
      run();
    } else {
      setStatus("Saving…");
      saveTimer = setTimeout(run, DEBOUNCE_MS);
    }
  }

  function loadState() {
    var root = getRoot();
    if (!root) return;
    try {
      var raw = localStorage.getItem(persistKey());
      if (!raw) {
        var leg = legacyPersistKey();
        if (leg) raw = localStorage.getItem(leg);
      }
      if (raw) root.innerHTML = raw;
    } catch (e) {}
  }

  function stripToolbar() {
    document.querySelectorAll(".mm-template-toolbar").forEach(function (n) {
      if (n.parentNode) n.parentNode.removeChild(n);
    });
  }

  function exportThisVersion() {
    saveState(true);
    stripToolbar();
    try {
      var path = location.pathname || "";
      var m = path.match(/[^/]+$/);
      var base = (m && m[0]) ? m[0] : "page.html";
      base = base.replace(/\.html$/i, "").replace(/\.htm$/i, "");
      var filename = base + "-export.html";
      var markup = "<!DOCTYPE html>\n" + document.documentElement.outerHTML;
      var blob = new Blob([markup], { type: "text/html;charset=utf-8" });
      var url = URL.createObjectURL(blob);
      var a = document.createElement("a");
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(function () {
        URL.revokeObjectURL(url);
        attachToolbar();
      }, 0);
    } catch (e) {
      attachToolbar();
      window.alert("Export failed (some browsers block downloads from local files).");
    }
  }

  function restoreDefault() {
    if (!window.confirm("Restore the original template and clear saved data?")) return;
    try {
      localStorage.removeItem(persistKey());
      var leg = legacyPersistKey();
      if (leg) localStorage.removeItem(leg);
    } catch (e) {}
    location.reload();
  }

  function attachToolbar() {
    stripToolbar();
    var bar = document.createElement("div");
    bar.className = "mm-template-toolbar";
    bar.setAttribute("role", "region");
    bar.setAttribute("aria-label", "Template tools");

    var bExport = document.createElement("button");
    bExport.type = "button";
    bExport.className = "mm-tpl-btn";
    bExport.textContent = "Export This Version";
    bExport.onclick = function () {
      exportThisVersion();
    };

    var bReset = document.createElement("button");
    bReset.type = "button";
    bReset.className = "mm-tpl-btn mm-tpl-btn--muted";
    bReset.textContent = "Restore Default";
    bReset.onclick = function () {
      restoreDefault();
    };

    var st = document.createElement("span");
    st.className = "mm-tpl-status";
    st.id = "mm-tpl-status";
    st.textContent = "Changes saved locally";

    bar.appendChild(bExport);
    bar.appendChild(bReset);
    bar.appendChild(st);
    document.body.insertBefore(bar, document.body.firstChild);
  }

  function initPersistHook() {
    document.addEventListener(
      "input",
      function () {
        saveState(false);
      },
      true
    );
    document.addEventListener(
      "change",
      function () {
        saveState(false);
      },
      true
    );
    var root = getRoot();
    if (root && typeof MutationObserver !== "undefined") {
      if (mo) mo.disconnect();
      mo = new MutationObserver(function () {
        saveState(false);
      });
      mo.observe(root, {
        subtree: true,
        childList: true,
        attributes: true,
        characterData: true
      });
    }
    window.addEventListener("beforeunload", function () {
      saveState(true);
    });
  }

  w.mmBindTableHeaderEditing = function () {
    if (!w.__mmHeaderThSeen) w.__mmHeaderThSeen = new WeakSet();
    var seen = w.__mmHeaderThSeen;
    document.querySelectorAll("table thead th").forEach(function (th) {
      if (seen.has(th)) return;
      seen.add(th);
      th.classList.add("mm-th-editable");
      th.setAttribute("spellcheck", "false");
      th.removeAttribute("tabindex");
      th.classList.remove("editable-cell");
      if (!th.getAttribute("title")) {
        th.setAttribute(
          "title",
          "Column header: double-click to edit. This labels the whole column and is a bit more fixed than the cells below."
        );
      }
      th.contentEditable = "false";
      th.addEventListener("dblclick", function () {
        th.contentEditable = "true";
        th.classList.add("mm-th-editing");
        th.focus();
        try {
          var rng = document.createRange();
          rng.selectNodeContents(th);
          var sel = w.getSelection && w.getSelection();
          if (sel) {
            sel.removeAllRanges();
            sel.addRange(rng);
          }
        } catch (e) {}
      });
      th.addEventListener("blur", function () {
        th.contentEditable = "false";
        th.classList.remove("mm-th-editing");
      });
      th.addEventListener("keydown", function (ev) {
        if (ev.key === "Escape") {
          ev.preventDefault();
          th.blur();
        }
      });
    });
  };

  w.loadState = loadState;
  w.saveState = saveState;
  w.exportThisVersion = exportThisVersion;
  w.restoreDefault = restoreDefault;
  w.attachToolbar = attachToolbar;
  w.initPersistHook = initPersistHook;
  w.mmPersistKey = persistKey;
  w.__mmPersistLoad = loadState;
  w.__mmPersistSave = function () {
    saveState(false);
  };
  w.__mmPersistHook = initPersistHook;
})(window);
</script>

<script>
document.addEventListener("DOMContentLoaded", function () {
  if (typeof loadState === "function") loadState();
  if (typeof mmBindTableHeaderEditing === "function") mmBindTableHeaderEditing();

  document.querySelectorAll("table tbody td").forEach(function (cell) {
    if (cell.querySelector("select")) return;
    cell.setAttribute("contenteditable", "true");
    cell.setAttribute("spellcheck", "false");
    cell.classList.add("editable-cell");
  });

  var typeOptions = ["concept", "entity", "event", "process", "tag", "source"];
  var relationshipOptions = ["causes", "depends_on", "contradicts"];

  function createSelect(options) {
    var select = document.createElement("select");
    options.forEach(function (value) {
      var option = document.createElement("option");
      option.value = value;
      option.textContent = value;
      select.appendChild(option);
    });
    return select;
  }

  function addRow(table, tableIndex) {
    var tbody = table.querySelector("tbody");
    var firstRow = tbody.querySelector("tr");
    var cellCount = firstRow.children.length;
    var row = document.createElement("tr");
    var i;
    for (i = 0; i < cellCount; i++) {
      var td = document.createElement("td");
      if (tableIndex === 0 && i === 3) {
        td.appendChild(createSelect(typeOptions));
      } else if (tableIndex === 1 && i === 3) {
        td.appendChild(createSelect(relationshipOptions));
      } else {
        td.setAttribute("contenteditable", "true");
        td.setAttribute("spellcheck", "false");
        td.classList.add("editable-cell");
        td.textContent = "";
      }
      row.appendChild(td);
    }
    tbody.appendChild(row);
  }

  document.querySelectorAll("table").forEach(function (table, tableIndex) {
    var btn = table.nextElementSibling;
    if (!btn || !btn.classList.contains("add-table-row-btn")) {
      btn = document.createElement("button");
      btn.type = "button";
      btn.className = "add-table-row-btn";
      btn.textContent = "+ Add row";
      table.insertAdjacentElement("afterend", btn);
    }

    btn.onclick = function () {
      addRow(table, tableIndex);
    };

    var delBtn = btn.nextElementSibling;
    if (!delBtn || !delBtn.classList.contains("del-table-row-btn")) {
      delBtn = document.createElement("button");
      delBtn.type = "button";
      delBtn.className = "del-table-row-btn";
      delBtn.textContent = "− Delete row";
      btn.insertAdjacentElement("afterend", delBtn);
    }

    delBtn.onclick = function () {
      var tbody = table.querySelector("tbody");
      if (tbody && tbody.rows.length > 0) {
        tbody.deleteRow(tbody.rows.length - 1);
      }
    };
  });

  if (typeof initPersistHook === "function") initPersistHook();
  if (typeof attachToolbar === "function") attachToolbar();
});
</script>

</head>

<body>
<div id="__mmPersistRoot">

<!-- Concepts -->
<table>
<thead>
<tr>
<th></th>
<th></th>
<th></th>
<th></th>
<th></th>
<th></th>
</tr>
</thead>
<tbody>
<tr>
<td contenteditable="true"></td>
<td contenteditable="true"></td>
<td contenteditable="true"></td>
<td>
<select>
<option>concept</option>
<option>entity</option>
<option>event</option>
<option>process</option>
<option>tag</option>
<option>source</option>
</select>
</td>
<td contenteditable="true"></td>
<td contenteditable="true"></td>
</tr>
</tbody>
</table>

<!-- Relationships -->
<table>
<thead>
<tr>
<th></th>
<th></th>
<th></th>
<th></th>
<th></th>
<th></th>
</tr>
</thead>
<tbody>
<tr>
<td contenteditable="true"></td>
<td contenteditable="true"></td>
<td contenteditable="true"></td>
<td>
<select>
<option>causes</option>
<option>depends_on</option>
<option>contradicts</option>
</select>
</td>
<td contenteditable="true"></td>
<td contenteditable="true"></td>
</tr>
</tbody>
</table>

<!-- Generic 2-column table -->
<table>
<thead>
<tr>
<th>col_1</th>
<th>col_2</th>
</tr>
</thead>
<tbody>
<tr>
<td contenteditable="true"></td>
<td contenteditable="true"></td>
</tr>
</tbody>
</table>

</div>
</body>
</html>
