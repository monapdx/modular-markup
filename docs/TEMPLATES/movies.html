<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" class="page-movies neo-dark-doc">
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="neo-brutalist.css" />
  <link rel="stylesheet" href="neo-brutal-overrides.css" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
  <title>Movies</title>

<script>/* mm-local-persist */
(function (w) {
  var timer;
  w.__mmPersistKey = function () {
    try {
      var p = w.location && w.location.pathname ? w.location.pathname : "";
      var m = p.match(/[^\\/]+$/);
      return "mm-template-persist:" + (m ? m[0] : "page");
    } catch (e) {
      return "mm-template-persist:page";
    }
  };
  w.__mmPersistLoad = function () {
    var root = document.getElementById("__mmPersistRoot");
    if (!root) return;
    try {
      var raw = localStorage.getItem(w.__mmPersistKey());
      if (raw) root.innerHTML = raw;
    } catch (e) {}
  };
  w.__mmPersistSave = function () {
    var root = document.getElementById("__mmPersistRoot");
    if (!root) return;
    clearTimeout(timer);
    timer = setTimeout(function () {
      try {
        localStorage.setItem(w.__mmPersistKey(), root.innerHTML);
      } catch (e2) {}
    }, 280);
  };
  w.__mmPersistHook = function () {
    document.addEventListener("input", w.__mmPersistSave, true);
    document.addEventListener("change", w.__mmPersistSave, true);
    var root = document.getElementById("__mmPersistRoot");
    if (root && typeof MutationObserver !== "undefined") {
      new MutationObserver(function () {
        w.__mmPersistSave();
      }).observe(root, { subtree: true, childList: true, attributes: true, characterData: true });
    }
  };
})(window);
</script>

</head>
<body>
<div id="__mmPersistRoot">
<h1>🎬 Movies</h1>
<h2>Watch list</h2>
<table>
<thead>
<tr>
<th>Title</th>
<th>Rating</th>
<th>Status</th>
<th>Year</th>
</tr>
</thead>
<tbody>
<tr>
<td></td>
<td></td>
<td>☐ To watch / ✅ Seen</td>
<td></td>
</tr>
</tbody>
</table>
<hr />
<p class="hint">Edits and new rows are saved in this browser (localStorage) for this file name.</p>
</div>

<script>
(function () {
  function makeTablesEditable() {
    document.querySelectorAll("table").forEach((table) => {
      table.querySelectorAll("td, th").forEach((cell) => {
        cell.setAttribute("contenteditable", "true");
        cell.setAttribute("spellcheck", "false");
        cell.classList.add("editable-cell");
      });
    });
  }

  function addTableRowButtons() {
    document.querySelectorAll("table").forEach((table) => {
      let colCount = table.querySelectorAll("thead tr th").length;
      if (!colCount) {
        const firstRow = table.querySelector("tbody tr");
        if (firstRow) {
          colCount = firstRow.querySelectorAll("td").length;
        }
      }
      if (!colCount) {
        return;
      }

      let btn = table.nextElementSibling;
      if (!btn || !btn.classList || !btn.classList.contains("add-table-row-btn")) {
        btn = document.createElement("button");
        btn.type = "button";
        btn.className = "add-table-row-btn";
        btn.textContent = "+ table row";
        table.insertAdjacentElement("afterend", btn);
      }

      btn.onclick = function () {
        let tbody = table.querySelector("tbody");
        if (!tbody) {
          tbody = table.appendChild(document.createElement("tbody"));
        }
        const tr = document.createElement("tr");
        for (let i = 0; i < colCount; i++) {
          const td = document.createElement("td");
          td.setAttribute("contenteditable", "true");
          td.setAttribute("spellcheck", "false");
          td.classList.add("editable-cell");
          tr.appendChild(td);
        }
        tbody.appendChild(tr);
      };

      let delBtn = btn.nextElementSibling;
      if (!delBtn || !delBtn.classList || !delBtn.classList.contains("del-table-row-btn")) {
        delBtn = document.createElement("button");
        delBtn.type = "button";
        delBtn.className = "del-table-row-btn";
        delBtn.textContent = "− table row";
        btn.insertAdjacentElement("afterend", delBtn);
      }
      delBtn.onclick = function () {
        const tbody = table.querySelector("tbody");
        if (tbody && tbody.rows.length > 0) {
          tbody.deleteRow(tbody.rows.length - 1);
        }
      };
    });
  }

  document.addEventListener("DOMContentLoaded", () => {
    if (typeof __mmPersistLoad === "function") __mmPersistLoad();
    makeTablesEditable();
    addTableRowButtons();
    if (typeof __mmPersistHook === "function") __mmPersistHook();
  });
})();
</script>

</body>
</html>
