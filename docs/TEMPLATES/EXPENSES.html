<script>/* mm-template-runtime */
(function (w) {
  var DEBOUNCE_MS = 280;
  var saveTimer = null;
  var mo = null;

  function persistKey() {
    var id = document.documentElement.getAttribute("data-mm-persist-id");
    if (id) return "mm-persist:" + id;
    try {
      var p = location.pathname || "";
      var m = p.match(/[^\/]+$/);
      return "mm-persist:" + (m ? decodeURIComponent(m[0]) : "page");
    } catch (e) {
      return "mm-persist:page";
    }
  }

  function legacyPersistKey() {
    try {
      var p = location.pathname || "";
      var m = p.match(/[^\/]+$/);
      if (m && m[0]) return "mm-template-persist:" + m[0];
    } catch (e) {}
    return null;
  }

  function getRoot() {
    return document.getElementById("__mmPersistRoot");
  }

  function setStatus(msg) {
    var el = document.getElementById("mm-tpl-status");
    if (el) el.textContent = msg || "Changes saved locally";
  }

  function saveState(sync) {
    var root = getRoot();
    if (!root) return;
    if (saveTimer) {
      clearTimeout(saveTimer);
      saveTimer = null;
    }
    var run = function () {
      try {
        localStorage.setItem(persistKey(), root.innerHTML);
        setStatus("Changes saved locally");
      } catch (e) {
        setStatus("Could not save (storage blocked or full)");
      }
    };
    if (sync) {
      run();
    } else {
      setStatus("Saving…");
      saveTimer = setTimeout(run, DEBOUNCE_MS);
    }
  }

  function loadState() {
    var root = getRoot();
    if (!root) return;
    try {
      var raw = localStorage.getItem(persistKey());
      if (!raw) {
        var leg = legacyPersistKey();
        if (leg) raw = localStorage.getItem(leg);
      }
      if (raw) root.innerHTML = raw;
    } catch (e) {}
  }

  function stripToolbar() {
    document.querySelectorAll(".mm-template-toolbar").forEach(function (n) {
      if (n.parentNode) n.parentNode.removeChild(n);
    });
  }

  function exportThisVersion() {
    saveState(true);
    stripToolbar();
    try {
      var path = location.pathname || "";
      var m = path.match(/[^/]+$/);
      var base = (m && m[0]) ? m[0] : "page.html";
      base = base.replace(/\.html$/i, "").replace(/\.htm$/i, "");
      var filename = base + "-export.html";
      var markup = "<!DOCTYPE html>\n" + document.documentElement.outerHTML;
      var blob = new Blob([markup], { type: "text/html;charset=utf-8" });
      var url = URL.createObjectURL(blob);
      var a = document.createElement("a");
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(function () {
        URL.revokeObjectURL(url);
        attachToolbar();
      }, 0);
    } catch (e) {
      attachToolbar();
      window.alert("Export failed (some browsers block downloads from local files).");
    }
  }

  function restoreDefault() {
    if (!window.confirm("Restore the original template and clear saved data?")) return;
    try {
      sessionStorage.setItem("mm-restore-reset", "1");
    } catch (e0) {}
    try {
      localStorage.removeItem(persistKey());
      var leg = legacyPersistKey();
      if (leg) localStorage.removeItem(leg);
    } catch (e) {}
    location.reload();
  }

  function attachToolbar() {
    stripToolbar();
    var bar = document.createElement("div");
    bar.className = "mm-template-toolbar";
    bar.setAttribute("role", "region");
    bar.setAttribute("aria-label", "Template tools");

    var bExport = document.createElement("button");
    bExport.type = "button";
    bExport.className = "mm-tpl-btn";
    bExport.textContent = "Export This Version";
    bExport.onclick = function () {
      exportThisVersion();
    };

    var bReset = document.createElement("button");
    bReset.type = "button";
    bReset.className = "mm-tpl-btn mm-tpl-btn--muted";
    bReset.textContent = "Restore Default";
    bReset.onclick = function () {
      restoreDefault();
    };

    var st = document.createElement("span");
    st.className = "mm-tpl-status";
    st.id = "mm-tpl-status";
    st.textContent = "Changes saved locally";

    bar.appendChild(bExport);
    bar.appendChild(bReset);
    bar.appendChild(st);
    document.body.insertBefore(bar, document.body.firstChild);
  }

  function initPersistHook() {
    try {
      sessionStorage.removeItem("mm-restore-reset");
    } catch (e0) {}
    document.addEventListener(
      "input",
      function () {
        saveState(false);
      },
      true
    );
    document.addEventListener(
      "change",
      function () {
        saveState(false);
      },
      true
    );
    var root = getRoot();
    if (root && typeof MutationObserver !== "undefined") {
      if (mo) mo.disconnect();
      mo = new MutationObserver(function () {
        saveState(false);
      });
      mo.observe(root, {
        subtree: true,
        childList: true,
        attributes: true,
        characterData: true
      });
    }
    window.addEventListener("beforeunload", function () {
      try {
        if (sessionStorage.getItem("mm-restore-reset")) return;
      } catch (e1) {}
      saveState(true);
    });
  }

  w.mmBindTableHeaderEditing = function () {
    if (!w.__mmHeaderThSeen) w.__mmHeaderThSeen = new WeakSet();
    var seen = w.__mmHeaderThSeen;
    document.querySelectorAll("table thead th").forEach(function (th) {
      if (seen.has(th)) return;
      seen.add(th);
      th.classList.add("mm-th-editable");
      th.setAttribute("spellcheck", "false");
      th.removeAttribute("tabindex");
      th.classList.remove("editable-cell");
      if (!th.getAttribute("title")) {
        th.setAttribute(
          "title",
          "Column header: double-click to edit. This labels the whole column and is a bit more fixed than the cells below."
        );
      }
      th.contentEditable = "false";
      th.addEventListener("dblclick", function () {
        th.contentEditable = "true";
        th.classList.add("mm-th-editing");
        th.focus();
        try {
          var rng = document.createRange();
          rng.selectNodeContents(th);
          var sel = w.getSelection && w.getSelection();
          if (sel) {
            sel.removeAllRanges();
            sel.addRange(rng);
          }
        } catch (e) {}
      });
      th.addEventListener("blur", function () {
        th.contentEditable = "false";
        th.classList.remove("mm-th-editing");
      });
      th.addEventListener("keydown", function (ev) {
        if (ev.key === "Escape") {
          ev.preventDefault();
          th.blur();
        }
      });
    });
  };

  w.loadState = loadState;
  w.saveState = saveState;
  w.exportThisVersion = exportThisVersion;
  w.restoreDefault = restoreDefault;
  w.attachToolbar = attachToolbar;
  w.initPersistHook = initPersistHook;
  w.mmPersistKey = persistKey;
  w.__mmPersistLoad = loadState;
  w.__mmPersistSave = function () {
    saveState(false);
  };
  w.__mmPersistHook = initPersistHook;
})(window);
</script>

<script>
document.addEventListener('DOMContentLoaded', function () {
  if (typeof loadState === 'function') loadState();

  if (typeof mmBindTableHeaderEditing === 'function') mmBindTableHeaderEditing();

  var expenseTable = document.getElementById('expenses-table');

  document.querySelectorAll('table tbody td').forEach(function (cell) {
    cell.setAttribute('contenteditable', 'true');
    cell.setAttribute('spellcheck', 'false');
    cell.classList.add('editable-cell');
  });

  function colIndexByHeader(table, label) {
    var ths = table.querySelectorAll('thead tr th');
    var want = String(label).toLowerCase();
    for (var i = 0; i < ths.length; i++) {
      if (ths[i].textContent.trim().toLowerCase() === want) {
        return i;
      }
    }
    return -1;
  }

  function parseMoney(text) {
    var raw = String(text == null ? '' : text).replace(/,/g, '');
    var n = parseFloat(raw.replace(/[^0-9.\-]/g, ''));
    return isFinite(n) ? n : 0;
  }

  function parseYearMonth(dateStr) {
    var s = String(dateStr == null ? '' : dateStr).trim();
    if (!s) {
      return null;
    }
    var m = s.match(/\b(20\d{2}|19\d{2})[-/](\d{1,2})(?:[-/](\d{1,2}))?\b/);
    if (m) {
      return m[1] + '-' + ('0' + m[2]).slice(-2);
    }
    m = s.match(/\b(\d{1,2})[-/](\d{1,2})[-/](20\d{2}|19\d{2})\b/);
    if (m) {
      return m[3] + '-' + ('0' + m[1]).slice(-2);
    }
    return null;
  }

  function formatMoney(n) {
    return new Intl.NumberFormat(undefined, { style: 'currency', currency: 'USD' }).format(n);
  }

  function updateExpenseSummary() {
    if (!expenseTable) {
      return;
    }
    var amountCol = colIndexByHeader(expenseTable, 'Amount');
    var dateCol = colIndexByHeader(expenseTable, 'Date');
    if (amountCol < 0) {
      amountCol = expenseTable.querySelectorAll('thead tr th').length - 1;
    }
    if (dateCol < 0) {
      dateCol = 0;
    }

    var rows = expenseTable.querySelectorAll('tbody tr');
    var total = 0;
    var monthsSeen = {};

    for (var r = 0; r < rows.length; r++) {
      var cells = rows[r].querySelectorAll('td');
      if (cells.length <= amountCol) {
        continue;
      }
      var amt = parseMoney(cells[amountCol].textContent);
      total += amt;
      if (amt !== 0 && cells[dateCol]) {
        var ym = parseYearMonth(cells[dateCol].textContent);
        if (ym) {
          monthsSeen[ym] = true;
        }
      }
    }

    var monthCount = Object.keys(monthsSeen).length;
    var monthly = monthCount > 0 ? total / monthCount : total / 12;

    var totalEl = document.getElementById('expense-summary-total');
    var avgEl = document.getElementById('expense-summary-monthly');
    if (totalEl) {
      totalEl.textContent = formatMoney(total);
    }
    if (avgEl) {
      avgEl.textContent = formatMoney(monthly);
    }
  }

  document.querySelectorAll('table').forEach(function (table) {
    var headerCells = table.querySelectorAll('thead tr th');
    var colCount = headerCells.length;
    if (!colCount) {
      var firstRow = table.querySelector('tbody tr');
      if (firstRow) {
        colCount = firstRow.querySelectorAll('td').length;
      }
    }
    if (!colCount) {
      return;
    }

    var btn = table.nextElementSibling;
    if (!btn || !btn.classList || !btn.classList.contains('add-table-row-btn')) {
      btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'add-table-row-btn';
      btn.textContent = '+ table row';
      table.insertAdjacentElement('afterend', btn);
    }

    btn.onclick = function () {
      var tbody = table.querySelector('tbody');
      if (!tbody) {
        tbody = table.appendChild(document.createElement('tbody'));
      }
      var tr = document.createElement('tr');
      for (var i = 0; i < colCount; i++) {
        var td = document.createElement('td');
        td.setAttribute('contenteditable', 'true');
        td.setAttribute('spellcheck', 'false');
        tr.appendChild(td);
      }
      tbody.appendChild(tr);
      if (table === expenseTable) {
        updateExpenseSummary();
      }
    };

    var delBtn = btn.nextElementSibling;
    if (!delBtn || !delBtn.classList || !delBtn.classList.contains('del-table-row-btn')) {
      delBtn = document.createElement('button');
      delBtn.type = 'button';
      delBtn.className = 'del-table-row-btn';
      delBtn.textContent = '− table row';
      btn.insertAdjacentElement('afterend', delBtn);
    }
    delBtn.onclick = function () {
      var tbody = table.querySelector('tbody');
      if (tbody && tbody.rows.length > 0) {
        tbody.deleteRow(tbody.rows.length - 1);
      }
      if (table === expenseTable) {
        updateExpenseSummary();
      }
    };
  });

  if (expenseTable) {
    expenseTable.oninput = updateExpenseSummary;
  }

  updateExpenseSummary();

  if (typeof initPersistHook === 'function') initPersistHook();
  if (typeof attachToolbar === 'function') attachToolbar();
});
</script>

<th>Category</th>

</tr>

<td></td>
<td></td>
<td></td>
<td></td>
</tr>
</tbody>
</table>

<ul>
<li>Total: <span id="expense-summary-total">$0.00</span></li>
<li>Monthly Avg: <span id="expense-summary-monthly">$0.00</span></li>
</ul>
</div>
