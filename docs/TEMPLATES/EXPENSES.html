<script>/* mm-local-persist */
(function (w) {
  var timer;
  w.__mmPersistKey = function () {
    try {
      var p = w.location && w.location.pathname ? w.location.pathname : "";
      var m = p.match(/[^\\/]+$/);
      return "mm-template-persist:" + (m ? m[0] : "page");
    } catch (e) {
      return "mm-template-persist:page";
    }
  };
  w.__mmPersistLoad = function () {
    var root = document.getElementById("__mmPersistRoot");
    if (!root) return;
    try {
      var raw = localStorage.getItem(w.__mmPersistKey());
      if (raw) root.innerHTML = raw;
    } catch (e) {}
  };
  w.__mmPersistSave = function () {
    var root = document.getElementById("__mmPersistRoot");
    if (!root) return;
    clearTimeout(timer);
    timer = setTimeout(function () {
      try {
        localStorage.setItem(w.__mmPersistKey(), root.innerHTML);
      } catch (e2) {}
    }, 280);
  };
  w.__mmPersistHook = function () {
    document.addEventListener("input", w.__mmPersistSave, true);
    document.addEventListener("change", w.__mmPersistSave, true);
    var root = document.getElementById("__mmPersistRoot");
    if (root && typeof MutationObserver !== "undefined") {
      new MutationObserver(function () {
        w.__mmPersistSave();
      }).observe(root, { subtree: true, childList: true, attributes: true, characterData: true });
    }
  };
})(window);
</script>

<script>
document.addEventListener('DOMContentLoaded', function () {
  if (typeof __mmPersistLoad === 'function') __mmPersistLoad();

  var expenseTable = document.getElementById('expenses-table');

  document.querySelectorAll('table td, table th').forEach(function (cell) {
    cell.setAttribute('contenteditable', 'true');
    cell.setAttribute('spellcheck', 'false');
  });

  function colIndexByHeader(table, label) {
    var ths = table.querySelectorAll('thead tr th');
    var want = String(label).toLowerCase();
    for (var i = 0; i < ths.length; i++) {
      if (ths[i].textContent.trim().toLowerCase() === want) {
        return i;
      }
    }
    return -1;
  }

  function parseMoney(text) {
    var raw = String(text == null ? '' : text).replace(/,/g, '');
    var n = parseFloat(raw.replace(/[^0-9.\-]/g, ''));
    return isFinite(n) ? n : 0;
  }

  function parseYearMonth(dateStr) {
    var s = String(dateStr == null ? '' : dateStr).trim();
    if (!s) {
      return null;
    }
    var m = s.match(/\b(20\d{2}|19\d{2})[-/](\d{1,2})(?:[-/](\d{1,2}))?\b/);
    if (m) {
      return m[1] + '-' + ('0' + m[2]).slice(-2);
    }
    m = s.match(/\b(\d{1,2})[-/](\d{1,2})[-/](20\d{2}|19\d{2})\b/);
    if (m) {
      return m[3] + '-' + ('0' + m[1]).slice(-2);
    }
    return null;
  }

  function formatMoney(n) {
    return new Intl.NumberFormat(undefined, { style: 'currency', currency: 'USD' }).format(n);
  }

  function updateExpenseSummary() {
    if (!expenseTable) {
      return;
    }
    var amountCol = colIndexByHeader(expenseTable, 'Amount');
    var dateCol = colIndexByHeader(expenseTable, 'Date');
    if (amountCol < 0) {
      amountCol = expenseTable.querySelectorAll('thead tr th').length - 1;
    }
    if (dateCol < 0) {
      dateCol = 0;
    }

    var rows = expenseTable.querySelectorAll('tbody tr');
    var total = 0;
    var monthsSeen = {};

    for (var r = 0; r < rows.length; r++) {
      var cells = rows[r].querySelectorAll('td');
      if (cells.length <= amountCol) {
        continue;
      }
      var amt = parseMoney(cells[amountCol].textContent);
      total += amt;
      if (amt !== 0 && cells[dateCol]) {
        var ym = parseYearMonth(cells[dateCol].textContent);
        if (ym) {
          monthsSeen[ym] = true;
        }
      }
    }

    var monthCount = Object.keys(monthsSeen).length;
    var monthly = monthCount > 0 ? total / monthCount : total / 12;

    var totalEl = document.getElementById('expense-summary-total');
    var avgEl = document.getElementById('expense-summary-monthly');
    if (totalEl) {
      totalEl.textContent = formatMoney(total);
    }
    if (avgEl) {
      avgEl.textContent = formatMoney(monthly);
    }
  }

  document.querySelectorAll('table').forEach(function (table) {
    var headerCells = table.querySelectorAll('thead tr th');
    var colCount = headerCells.length;
    if (!colCount) {
      var firstRow = table.querySelector('tbody tr');
      if (firstRow) {
        colCount = firstRow.querySelectorAll('td').length;
      }
    }
    if (!colCount) {
      return;
    }

    var btn = table.nextElementSibling;
    if (!btn || !btn.classList || !btn.classList.contains('add-table-row-btn')) {
      btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'add-table-row-btn';
      btn.textContent = '+ table row';
      table.insertAdjacentElement('afterend', btn);
    }

    btn.onclick = function () {
      var tbody = table.querySelector('tbody');
      if (!tbody) {
        tbody = table.appendChild(document.createElement('tbody'));
      }
      var tr = document.createElement('tr');
      for (var i = 0; i < colCount; i++) {
        var td = document.createElement('td');
        td.setAttribute('contenteditable', 'true');
        td.setAttribute('spellcheck', 'false');
        tr.appendChild(td);
      }
      tbody.appendChild(tr);
      if (table === expenseTable) {
        updateExpenseSummary();
      }
    };
  });

  if (expenseTable) {
    expenseTable.oninput = updateExpenseSummary;
  }

  updateExpenseSummary();

  if (typeof __mmPersistHook === 'function') __mmPersistHook();
});
</script>


</head>
<body>
<div id="__mmPersistRoot">
<h1 id="expenses">💸 Expenses</h1>
<table id="expenses-table">
<thead>
<tr>
<th>Date</th>
<th>Item</th>
<th>Category</th>
<th>Amount</th>
</tr>
</thead>
<tbody>
<tr>
<td></td>
<td></td>
<td></td>
<td></td>
</tr>
</tbody>
</table>
<hr />
<h2 id="summary">📊 Summary</h2>
<ul>
<li>Total: <span id="expense-summary-total">$0.00</span></li>
<li>Monthly Avg: <span id="expense-summary-monthly">$0.00</span></li>
</ul>
</div>
</body>
</html>
