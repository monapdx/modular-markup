<!DOCTYPE html>
<html lang="en" class="page-dashboard-widget neo-dark-doc">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>File Naming Convention Generator</title>
  <link rel="stylesheet" href="neo-brutalist.css" />
  <link rel="stylesheet" href="neo-brutal-overrides.css" />
</head>
<body>

<div id="file-naming-generator" class="dashboard-widget panel dashboard-widget--wide">
  <h3>File Naming Convention Generator</h3>
  <p class="dashboard-lead">Build clean, repeatable file names for projects, exports, media, notes, or archives.</p>

  <div class="dashboard-split">
    <div>
      <div class="dashboard-field-row">
        <label>
          Prefix
          <input id="name-prefix" type="text" placeholder="project" />
        </label>
        <label>
          Base title
          <input id="name-title" type="text" placeholder="frontend widgets launch assets" />
        </label>
      </div>
      <div class="dashboard-field-row-3">
        <label>
          Date style
          <select id="name-date">
            <option value="none">No date</option>
            <option value="yyyy-mm-dd" selected>YYYY-MM-DD</option>
            <option value="yyyymmdd">YYYYMMDD</option>
            <option value="yyyy-mm">YYYY-MM</option>
          </select>
        </label>
        <label>
          Separator
          <select id="name-separator">
            <option value="-" selected>Hyphen (-)</option>
            <option value="_">Underscore (_)</option>
            <option value=".">Dot (.)</option>
          </select>
        </label>
        <label>
          Letter case
          <select id="name-case">
            <option value="kebab" selected>kebab-case</option>
            <option value="snake">snake_case</option>
            <option value="upper">UPPERCASE</option>
            <option value="lower">lowercase words</option>
          </select>
        </label>
      </div>
      <div class="dashboard-field-row-3">
        <label>
          Version
          <input id="name-version" type="text" placeholder="v01" />
        </label>
        <label>
          Extension
          <input id="name-ext" type="text" placeholder="png" value="png" />
        </label>
        <label>
          How many examples
          <input id="name-count" type="number" min="1" max="50" value="8" />
        </label>
      </div>
      <label>Optional parts</label>
      <div class="dashboard-checklist">
        <label class="dashboard-check"><input type="checkbox" id="include-date" checked /> Include date</label>
        <label class="dashboard-check"><input type="checkbox" id="include-prefix" checked /> Include prefix</label>
        <label class="dashboard-check"><input type="checkbox" id="include-version" checked /> Include version</label>
        <label class="dashboard-check"><input type="checkbox" id="include-counter" /> Add sequence number</label>
      </div>
      <div class="dashboard-actions">
        <button type="button" id="generate-names-btn">Generate names</button>
        <button type="button" class="secondary" id="copy-names-btn">Copy output</button>
        <button type="button" class="secondary" id="sample-names-btn">Load sample</button>
      </div>
    </div>
    <div class="dashboard-stack">
      <div>
        <h4>Generated filenames</h4>
        <pre id="names-output" class="dashboard-output">Generated filenames will appear here.</pre>
      </div>
      <div>
        <h4>Pattern summary</h4>
        <pre id="pattern-output" class="dashboard-output">Your file naming pattern summary will appear here.</pre>
      </div>
    </div>
  </div>
</div>

<script>
const $ = (sel) => document.querySelector(sel);

async function copyText(text) {
  const safeText = String(text || '').trim();
  if (!safeText) {
    alert('Nothing to copy yet.');
    return;
  }
  try {
    await navigator.clipboard.writeText(safeText);
  } catch (err) {
    const ta = document.createElement('textarea');
    ta.value = safeText;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    ta.remove();
  }
}

function slugify(value, separator = '-') {
  return String(value || '')
    .normalize('NFKD')
    .replace(/[\u0300-\u036f]/g, '')
    .replace(/[^a-zA-Z0-9]+/g, ' ')
    .trim()
    .replace(/\s+/g, separator)
    .replace(new RegExp(separator + '{2,}', 'g'), separator)
    .replace(new RegExp('^' + separator + '|' + separator + '$', 'g'), '')
    .toLowerCase();
}

function applyCase(value, mode, separator) {
  if (!value) return '';
  if (mode === 'upper') return String(value).replace(/[^a-zA-Z0-9]+/g, separator).toUpperCase();
  if (mode === 'lower') return String(value).replace(/[^a-zA-Z0-9]+/g, ' ').toLowerCase().trim().replace(/\s+/g, separator);
  if (mode === 'snake') return slugify(value, '_');
  return slugify(value, separator);
}

function formatDate(style = 'yyyy-mm-dd', date = new Date()) {
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, '0');
  const d = String(date.getDate()).padStart(2, '0');
  if (style === 'none') return '';
  if (style === 'yyyymmdd') return `${y}${m}${d}`;
  if (style === 'yyyy-mm') return `${y}-${m}`;
  return `${y}-${m}-${d}`;
}

function generateNames() {
  const prefix = $('#name-prefix').value.trim();
  const title = $('#name-title').value.trim();
  const dateStyle = $('#name-date').value;
  const separator = $('#name-separator').value;
  const letterCase = $('#name-case').value;
  const version = $('#name-version').value.trim();
  const ext = $('#name-ext').value.trim().replace(/^\./, '');
  const count = Math.max(1, Math.min(50, parseInt($('#name-count').value || '8', 10)));
  const includeDate = $('#include-date').checked;
  const includePrefix = $('#include-prefix').checked;
  const includeVersion = $('#include-version').checked;
  const includeCounter = $('#include-counter').checked;

  if (!title) {
    $('#names-output').textContent = 'Please enter a base title first.';
    $('#pattern-output').textContent = '';
    return;
  }

  const piecesBase = [];
  if (includeDate) {
    const datePart = formatDate(dateStyle);
    if (datePart) piecesBase.push(datePart);
  }
  if (includePrefix && prefix) piecesBase.push(applyCase(prefix, letterCase, separator));
  piecesBase.push(applyCase(title, letterCase, separator));
  if (includeVersion && version) {
    piecesBase.push(letterCase === 'upper' ? version.toUpperCase() : applyCase(version, letterCase === 'snake' ? 'snake' : 'lower', separator));
  }

  const outputs = Array.from({ length: count }, (_, index) => {
    const pieces = [...piecesBase];
    if (includeCounter) pieces.push(String(index + 1).padStart(2, '0'));
    return pieces.filter(Boolean).join(separator) + (ext ? `.${ext}` : '');
  });

  $('#names-output').textContent = outputs.join('\n');
  $('#pattern-output').textContent = [
    'Pattern summary:',
    `- Date style: ${includeDate ? dateStyle : 'none'}`,
    `- Prefix: ${includePrefix ? (prefix || 'not provided') : 'not included'}`,
    `- Base title: ${title}`,
    `- Separator: ${separator}`,
    `- Case: ${letterCase}`,
    `- Version: ${includeVersion ? (version || 'not provided') : 'not included'}`,
    `- Sequence number: ${includeCounter ? 'yes' : 'no'}`,
    `- Extension: ${ext || 'none'}`
  ].join('\n');
}

$('#generate-names-btn').addEventListener('click', generateNames);
$('#copy-names-btn').addEventListener('click', () => copyText($('#names-output').textContent));
$('#sample-names-btn').addEventListener('click', () => {
  $('#name-prefix').value = 'frontend-widgets';
  $('#name-title').value = 'launch social preview';
  $('#name-date').value = 'yyyy-mm-dd';
  $('#name-separator').value = '-';
  $('#name-case').value = 'kebab';
  $('#name-version').value = 'v02';
  $('#name-ext').value = 'png';
  $('#name-count').value = '8';
  $('#include-date').checked = true;
  $('#include-prefix').checked = true;
  $('#include-version').checked = true;
  $('#include-counter').checked = true;
  generateNames();
});
</script>

</body>
</html>
