<!DOCTYPE html>
<html lang="en" class="page-dashboard-widget neo-dark-doc">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CSV → SQL</title>
  <link rel="stylesheet" href="neo-brutalist.css" />
  <link rel="stylesheet" href="neo-brutal-overrides.css" />
</head>
<body>

<div id="csv-to-sql" class="dashboard-widget panel dashboard-widget--wide">
  <h3>CSV → SQL</h3>
  <p class="dashboard-lead">Paste or upload CSV and get SQL insert statements instantly.</p>

  <div class="dashboard-split">
    <div>
      <label>
        CSV file
        <input id="csvInput" type="file" />
      </label>
      <label>
        CSV text
        <textarea id="csvText" rows="8" placeholder="Paste CSV here"></textarea>
      </label>
      <label>
        Table name
        <input id="tableName" type="text" value="my_table" />
      </label>
      <label class="dashboard-check">
        <input id="hasHeader" type="checkbox" checked />
        Header row
      </label>
      <h4>Columns</h4>
      <div id="columns"></div>
      <div class="dashboard-actions">
        <button type="button" id="sample">Sample</button>
        <button type="button" class="secondary" id="clear">Clear</button>
      </div>
    </div>
    <div>
      <h4>SQL output</h4>
      <pre id="output" class="dashboard-output"></pre>
      <div class="dashboard-actions">
        <button type="button" id="copy">Copy</button>
      </div>
    </div>
  </div>
</div>

<script>
const $ = s => document.querySelector(s);
let columns = [];
let rows = [];

function showCopied(btn) {
  btn.classList.add("copied");
  btn.textContent = "Copied ✓";
  setTimeout(() => {
    btn.classList.remove("copied");
    btn.textContent = "Copy";
  }, 1200);
}

function parseCSV(text) {
  return text.trim().split("\n").map(r => r.split(","));
}

function renderColumns() {
  $("#columns").innerHTML = columns.map((c, i) =>
    `<label>Column ${i + 1}<input type="text" class="column-edit" data-i="${i}" value="${c}" /></label>`
  ).join("");

  document.querySelectorAll(".column-edit").forEach(input => {
    input.addEventListener("input", () => {
      columns[input.dataset.i] = input.value;
      build();
    });
  });
}

function build() {
  const text = $("#csvText").value.trim();
  if (!text) return;

  rows = parseCSV(text);

  if (rows.some(r => r.length !== rows[0].length)) {
    $("#output").textContent = "-- Warning: inconsistent columns";
    return;
  }

  if ($("#hasHeader").checked) {
    columns = rows[0];
    rows = rows.slice(1);
  } else {
    columns = rows[0].map((_, i) => `col_${i + 1}`);
  }

  renderColumns();

  const table = $("#tableName").value;

  const sql = rows.map(r => {
    const vals = r.map(v => `'${v.replace(/'/g, "''")}'`);
    return `INSERT INTO ${table} (${columns.join(", ")}) VALUES (${vals.join(", ")});`;
  }).join("\n");

  $("#output").textContent = sql;
}

$("#csvText").addEventListener("input", build);
$("#tableName").addEventListener("input", build);
$("#hasHeader").addEventListener("change", build);

$("#copy").onclick = e => {
  navigator.clipboard.writeText($("#output").textContent);
  showCopied(e.target);
};

$("#clear").onclick = () => {
  $("#csvText").value = "";
  $("#output").textContent = "";
};

$("#sample").onclick = () => {
  $("#csvText").value =
`id,name,email
1,Ash,ash@email.com
2,Loki,loki@email.com`;
  build();
};
</script>

</body>
</html>
