<!DOCTYPE html>

<html xmlns="http://www.w3.org/1999/xhtml" class="page-project neo-dark-doc">
<head>
<meta charset="utf-8"/>
  <link rel="stylesheet" href="neo-brutalist.css" />
  <link rel="stylesheet" href="neo-brutal-overrides.css" />
<meta content="pandoc" name="generator"/>
<meta content="width=device-width, initial-scale=1.0, user-scalable=yes" name="viewport"/>
<title>PROJECT</title>

<script>/* mm-local-persist */
(function (w) {
  var timer;
  w.__mmPersistKey = function () {
    try {
      var p = w.location && w.location.pathname ? w.location.pathname : "";
      var m = p.match(/[^\\/]+$/);
      return "mm-template-persist:" + (m ? m[0] : "page");
    } catch (e) {
      return "mm-template-persist:page";
    }
  };
  w.__mmPersistLoad = function () {
    var root = document.getElementById("__mmPersistRoot");
    if (!root) return;
    try {
      var raw = localStorage.getItem(w.__mmPersistKey());
      if (raw) root.innerHTML = raw;
    } catch (e) {}
  };
  w.__mmPersistSave = function () {
    var root = document.getElementById("__mmPersistRoot");
    if (!root) return;
    clearTimeout(timer);
    timer = setTimeout(function () {
      try {
        localStorage.setItem(w.__mmPersistKey(), root.innerHTML);
      } catch (e2) {}
    }, 280);
  };
  w.__mmPersistHook = function () {
    document.addEventListener("input", w.__mmPersistSave, true);
    document.addEventListener("change", w.__mmPersistSave, true);
    var root = document.getElementById("__mmPersistRoot");
    if (root && typeof MutationObserver !== "undefined") {
      new MutationObserver(function () {
        w.__mmPersistSave();
      }).observe(root, { subtree: true, childList: true, attributes: true, characterData: true });
    }
  };
})(window);
</script>

</head>
<body>
<div id="__mmPersistRoot">
<h1 id="project">🚀 Project</h1>
<h2 id="overview">Overview</h2>
<hr/>
<h2 id="tasks">Tasks</h2>
<ul class="task-list">
<li><label><input type="checkbox"/>Task 1</label></li>
<li><label><input type="checkbox"/>Task 2</label></li>
</ul>
<table id="project-table">
<thead>
<tr>
<th>Item</th>
<th>Status</th>
<th>Notes</th>
</tr>
</thead>
<tbody>
<tr>
<td></td>
<td></td>
<td></td>
</tr>
</tbody>
</table>
<hr/>
<h2 id="progress">Progress</h2>
<div class="project-progress-slider">
<div class="slider-wrap">
  <div class="value" id="val">50%</div>
  <input type="range" min="0" max="100" value="50" id="range"/>
</div>
</div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {
  if (typeof __mmPersistLoad === "function") __mmPersistLoad();

  document.querySelectorAll("table").forEach(function (table) {
    table.querySelectorAll("th, td").forEach(function (cell) {
      cell.setAttribute("contenteditable", "true");
      cell.setAttribute("spellcheck", "false");
      cell.setAttribute("tabindex", "0");
    });
  });

  var projectTable = document.getElementById("project-table");
  if (projectTable) {
    var headerCells = projectTable.querySelectorAll("thead tr th");
    var colCount = headerCells.length;
    if (!colCount) {
      var firstRow = projectTable.querySelector("tbody tr");
      if (firstRow) {
        colCount = firstRow.querySelectorAll("td").length;
      }
    }
    if (colCount) {
      var existingBtn = projectTable.nextElementSibling;
      var rowBtn =
        existingBtn && existingBtn.classList && existingBtn.classList.contains("add-table-row-btn")
          ? existingBtn
          : (function () {
              var b = document.createElement("button");
              b.type = "button";
              b.className = "add-table-row-btn";
              b.textContent = "+ add row";
              projectTable.insertAdjacentElement("afterend", b);
              return b;
            })();

      rowBtn.onclick = function () {
        var tbody = projectTable.querySelector("tbody");
        if (!tbody) {
          tbody = projectTable.appendChild(document.createElement("tbody"));
        }
        var tr = document.createElement("tr");
        for (var i = 0; i < colCount; i++) {
          var td = document.createElement("td");
          td.setAttribute("contenteditable", "true");
          td.setAttribute("spellcheck", "false");
          td.setAttribute("tabindex", "0");
          tr.appendChild(td);
        }
        tbody.appendChild(tr);
      };
    }
  }

  var range = document.getElementById("range");
  var val = document.getElementById("val");
  if (range && val) {
    function updateProgressSlider() {
      var v = range.value;
      val.textContent = v + "%";
      range.style.background =
        "linear-gradient(to right, #b8ff24 " + v + "%, #2a2a35 " + v + "%)";
    }
    range.addEventListener("input", updateProgressSlider);
    updateProgressSlider();
  }

  if (typeof __mmPersistHook === "function") __mmPersistHook();
});
</script>
</body>
</html>
