<title>Advanced Mindmap</title>
<style>

<body>

<div class="toolbar">
  <input id="childText" placeholder="New node label…" />
  <button id="addCore">Add Main</button>
  <button id="addNode">Add Child</button>
  <button id="deleteNode">Delete</button>
  <span class="view-controls">
    <button id="zoomOut" type="button">−</button>
    <span id="zoomReadout" class="zoom-readout">100%</span>
    <button id="zoomIn" type="button">+</button>
    <button id="resetView" type="button">Reset View</button>
  </span>
</div>

<div class="mindmap" id="mindmap" aria-label="Draggable and zoomable mindmap canvas">
  <div class="mindmap-world" id="world">
    <svg id="lines" viewBox="-100000 -100000 200000 200000"></svg>
  </div>
</div>

<script>
  const mindmap = document.getElementById("mindmap");
  const world = document.getElementById("world");
  const lines = document.getElementById("lines");
  const addCoreBtn = document.getElementById("addCore");
  const addBtn = document.getElementById("addNode");
  const deleteBtn = document.getElementById("deleteNode");
  const childInput = document.getElementById("childText");
  const zoomInBtn = document.getElementById("zoomIn");
  const zoomOutBtn = document.getElementById("zoomOut");
  const resetViewBtn = document.getElementById("resetView");
  const zoomReadout = document.getElementById("zoomReadout");

  let cores = [];
  let nodes = [];
  let selectedEl = null;
  let scale = 1;
  let panX = window.innerWidth / 2;
  let panY = window.innerHeight / 2;
  let isPanning = false;
  let isDraggingNode = false;
  let lastPointer = { x: 0, y: 0 };
  let dragState = null;
  let hasLaidOut = false;

  const MIN_SCALE = 0.25;
  const MAX_SCALE = 2.5;
  const CHILD_SPACING = 132;
  const DEPTH_SPACING = 190;
  const CORE_RADIUS = 210;

  function uid() {
    return "n" + Math.random().toString(36).slice(2, 10);
  }

  function nodeById(id) {
    if (!id) return null;
    const core = cores.find(c => c.dataset.id === id);
    if (core) return core;
    const row = nodes.find(n => n.el.dataset.id === id);
    return row ? row.el : null;
  }

  function childrenOf(parentId) {
    return nodes.filter(n => n.parentId === parentId);
  }

  function descendantsOf(parentId) {
    const out = [];
    const walk = id => {
      childrenOf(id).forEach(n => {
        out.push(n.el.dataset.id);
        walk(n.el.dataset.id);
      });
    };
    walk(parentId);
    return out;
  }

  function selectedIds() {
    return new Set(selectedEl ? [selectedEl.dataset.id, ...descendantsOf(selectedEl.dataset.id)] : []);
  }

  function updateTransform() {
    world.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
    zoomReadout.textContent = `${Math.round(scale * 100)}%`;
  }

  function screenToWorld(clientX, clientY) {
    return {
      x: (clientX - panX) / scale,
      y: (clientY - panY) / scale
    };
  }

  function getNodeX(el) {
    return parseFloat(el.style.left || "0");
  }

  function getNodeY(el) {
    return parseFloat(el.style.top || "0");
  }

  function centerOf(el) {
    return {
      x: getNodeX(el) + el.offsetWidth / 2,
      y: getNodeY(el) + el.offsetHeight / 2
    };
  }

  function placeNode(el, x, y) {
    el.style.left = `${x - el.offsetWidth / 2}px`;
    el.style.top = `${y - el.offsetHeight / 2}px`;
  }

  function normalizeNodeShape(el) {
    // Resize nodes by width first so labels like "Away Messages" do not split
    // awkwardly into tiny stacked words. Short labels remain round; longer labels
    // become wider oval/pill nodes and only wrap after a comfortable width.
    const isCore = el.classList.contains("core");
    const baseSize = isCore ? 118 : 98;
    const maxReadableWidth = isCore ? 360 : 310;
    const horizontalPadding = isCore ? 50 : 44;

    el.style.width = "auto";
    el.style.minWidth = `${baseSize}px`;
    el.style.minHeight = `${baseSize}px`;
    el.style.whiteSpace = "nowrap";

    const naturalWidth = Math.ceil(el.scrollWidth + 2);
    const targetWidth = Math.max(baseSize, Math.min(maxReadableWidth, naturalWidth + horizontalPadding));

    el.style.width = `${targetWidth}px`;
    el.style.whiteSpace = "normal";

    // Let height grow only when the text is genuinely long, but never smaller
    // than the base circle size. Width is no longer forced to match height.
    el.style.minHeight = `${Math.max(baseSize, el.scrollHeight)}px`;
  }

  function normalizeAllNodeShapes() {
    [...cores, ...nodes.map(n => n.el)].forEach(normalizeNodeShape);
  }

  function selectNode(el) {
    selectedEl = el;
    mindmap.querySelectorAll(".node").forEach(n => {
      n.style.outline = n === el ? "4px solid #ff4fb8" : "";
    });
  }

  function clearSelection() {
    selectedEl = null;
    mindmap.querySelectorAll(".node").forEach(n => {
      n.style.outline = "";
    });
  }

  function treeDepth(parentId) {
    const kids = childrenOf(parentId);
    if (!kids.length) return 0;
    return 1 + Math.max(...kids.map(kid => treeDepth(kid.el.dataset.id)));
  }

  function layoutSubtree(parentEl, parentX, parentY, depth, baseAngle) {
    const kids = childrenOf(parentEl.dataset.id);
    if (!kids.length) return;

    const radius = DEPTH_SPACING + Math.min(kids.length, 8) * 14;
    const spread = Math.min(Math.PI * 1.25, Math.max(0.7, (kids.length - 1) * 0.42));

    kids.forEach((row, index) => {
      const offset = kids.length === 1 ? 0 : (index / (kids.length - 1) - 0.5) * spread;
      const angle = baseAngle + offset;
      const branchDepth = treeDepth(row.el.dataset.id);
      const x = parentX + Math.cos(angle) * (radius + branchDepth * 28);
      const y = parentY + Math.sin(angle) * (radius + branchDepth * 28) + (index - (kids.length - 1) / 2) * CHILD_SPACING * 0.15;

      placeNode(row.el, x, y);

      const c = centerOf(row.el);
      layoutSubtree(row.el, c.x, c.y, depth + 1, angle);
    });
  }

  function drawLines() {
    lines.innerHTML = "";
    nodes.forEach(row => {
      const parentEl = nodeById(row.parentId);
      if (!parentEl) return;

      const p = centerOf(parentEl);
      const c = centerOf(row.el);
      const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
      line.setAttribute("x1", p.x);
      line.setAttribute("y1", p.y);
      line.setAttribute("x2", c.x);
      line.setAttribute("y2", c.y);
      lines.appendChild(line);
    });
  }

  function arrangeNodes({ preserveDragged = false } = {}) {
    normalizeAllNodeShapes();
    const protectedIds = preserveDragged ? selectedIds() : new Set();
    if (!cores.length) {
      drawLines();
      return;
    }

    if (!hasLaidOut || !preserveDragged) {
      cores.forEach((core, index) => {
        const angle = (index / cores.length) * Math.PI * 2 - Math.PI / 2;
        const radius = cores.length === 1 ? 0 : CORE_RADIUS + cores.length * 18;
        placeNode(core, Math.cos(angle) * radius, Math.sin(angle) * radius);

        const c = centerOf(core);
        layoutSubtree(core, c.x, c.y, 0, angle);
      });
      hasLaidOut = true;
    } else {
      // Only place brand-new/unpositioned nodes after the user starts dragging things around.
      cores.forEach((core, index) => {
        if (core.style.left && core.style.top) return;
        const angle = (index / cores.length) * Math.PI * 2 - Math.PI / 2;
        placeNode(core, Math.cos(angle) * CORE_RADIUS, Math.sin(angle) * CORE_RADIUS);
      });

      nodes.forEach(row => {
        if (row.el.style.left && row.el.style.top) return;
        const parentEl = nodeById(row.parentId);
        if (!parentEl || protectedIds.has(row.el.dataset.id)) return;
        const siblings = childrenOf(row.parentId);
        const index = siblings.indexOf(row);
        const parent = centerOf(parentEl);
        const angle = siblings.length === 1 ? 0 : (index / siblings.length) * Math.PI * 2 - Math.PI / 2;
        placeNode(row.el, parent.x + Math.cos(angle) * DEPTH_SPACING, parent.y + Math.sin(angle) * DEPTH_SPACING);
      });
    }

    drawLines();
    fitCanvasToNodes();
  }

  function getBounds() {
    const all = [...cores, ...nodes.map(n => n.el)];
    if (!all.length) return null;

    return all.reduce((box, el) => {
      const left = getNodeX(el);
      const top = getNodeY(el);
      const right = left + el.offsetWidth;
      const bottom = top + el.offsetHeight;
      return {
        left: Math.min(box.left, left),
        top: Math.min(box.top, top),
        right: Math.max(box.right, right),
        bottom: Math.max(box.bottom, bottom)
      };
    }, { left: Infinity, top: Infinity, right: -Infinity, bottom: -Infinity });
  }

  function fitCanvasToNodes() {
    const bounds = getBounds();
    if (!bounds) return;

    const padding = 180;
    const contentWidth = Math.max(1, bounds.right - bounds.left + padding * 2);
    const contentHeight = Math.max(1, bounds.bottom - bounds.top + padding * 2);
    const maxScaleX = window.innerWidth / contentWidth;
    const maxScaleY = (window.innerHeight - 90) / contentHeight;
    const nextScale = Math.min(1, Math.max(MIN_SCALE, Math.min(maxScaleX, maxScaleY)));

    if (contentWidth > window.innerWidth || contentHeight > window.innerHeight) {
      scale = nextScale;
    }

    const centerX = (bounds.left + bounds.right) / 2;
    const centerY = (bounds.top + bounds.bottom) / 2;
    panX = window.innerWidth / 2 - centerX * scale;
    panY = window.innerHeight / 2 - centerY * scale + 30;
    updateTransform();
  }

  function keepNodeVisible(el) {
    if (!el) return;
    const c = centerOf(el);
    const screenX = panX + c.x * scale;
    const screenY = panY + c.y * scale;
    const margin = 120;

    if (screenX < margin) panX += margin - screenX;
    if (screenX > window.innerWidth - margin) panX -= screenX - (window.innerWidth - margin);
    if (screenY < margin) panY += margin - screenY;
    if (screenY > window.innerHeight - margin) panY -= screenY - (window.innerHeight - margin);
    updateTransform();
  }

  function setZoom(nextScale, originX = window.innerWidth / 2, originY = window.innerHeight / 2) {
    const before = screenToWorld(originX, originY);
    scale = Math.min(MAX_SCALE, Math.max(MIN_SCALE, nextScale));
    panX = originX - before.x * scale;
    panY = originY - before.y * scale;
    updateTransform();
  }

  function addCore(text = "Main Idea") {
    const node = document.createElement("div");
    node.className = "node core";
    node.contentEditable = "true";
    node.textContent = text;
    node.dataset.id = uid();

    world.appendChild(node);
    normalizeNodeShape(node);
    cores.push(node);
    hasLaidOut = false;
    selectNode(node);
    arrangeNodes();
    keepNodeVisible(node);
  }

  function addNode(text = "New Idea", parentEl) {
    const parent = parentEl || selectedEl || cores[0];
    if (!parent) {
      addCore(text === "New Idea" ? "Main Idea" : text);
      return;
    }

    const node = document.createElement("div");
    node.className = "node child";
    node.contentEditable = "true";
    node.textContent = text;
    node.dataset.id = uid();

    const parentCenter = centerOf(parent);
    const siblingCount = childrenOf(parent.dataset.id).length;
    placeNode(node, parentCenter.x + DEPTH_SPACING, parentCenter.y + siblingCount * 54);

    world.appendChild(node);
    normalizeNodeShape(node);
    nodes.push({ el: node, parentId: parent.dataset.id });
    hasLaidOut = false;
    selectNode(node);
    arrangeNodes();
    keepNodeVisible(node);
  }

  function deleteSelected() {
    if (!selectedEl) return;

    const drop = new Set([selectedEl.dataset.id, ...descendantsOf(selectedEl.dataset.id)]);

    cores = cores.filter(c => {
      if (drop.has(c.dataset.id)) {
        c.remove();
        return false;
      }
      return true;
    });

    nodes = nodes.filter(n => {
      if (drop.has(n.el.dataset.id)) {
        n.el.remove();
        return false;
      }
      return true;
    });

    clearSelection();
    hasLaidOut = false;
    arrangeNodes();
  }

  addCoreBtn.addEventListener("click", () => {
    const text = childInput.value.trim() || "Main Idea";
    addCore(text);
    childInput.value = "";
  });

  addBtn.addEventListener("click", () => {
    const text = childInput.value.trim() || "New Idea";
    addNode(text);
    childInput.value = "";
  });

  deleteBtn.addEventListener("click", deleteSelected);
  zoomInBtn.addEventListener("click", () => setZoom(scale * 1.2));
  zoomOutBtn.addEventListener("click", () => setZoom(scale / 1.2));
  resetViewBtn.addEventListener("click", fitCanvasToNodes);

  childInput.addEventListener("keydown", e => {
    if (e.key === "Enter") {
      if (e.shiftKey) addCoreBtn.click();
      else addBtn.click();
    }
  });

  mindmap.addEventListener("wheel", e => {
    e.preventDefault();
    const factor = e.deltaY < 0 ? 1.08 : 1 / 1.08;
    setZoom(scale * factor, e.clientX, e.clientY);
  }, { passive: false });

  mindmap.addEventListener("pointerdown", e => {
    const node = e.target.closest(".node");
    lastPointer = { x: e.clientX, y: e.clientY };

    if (node) {
      selectNode(node);
      isDraggingNode = true;
      const pointerWorld = screenToWorld(e.clientX, e.clientY);
      dragState = {
        node,
        offsetX: pointerWorld.x - getNodeX(node),
        offsetY: pointerWorld.y - getNodeY(node),
        moved: false
      };
      node.setPointerCapture(e.pointerId);
      return;
    }

    isPanning = true;
    mindmap.classList.add("is-panning");
    mindmap.setPointerCapture(e.pointerId);
  });

  mindmap.addEventListener("pointermove", e => {
    if (isDraggingNode && dragState) {
      const pointerWorld = screenToWorld(e.clientX, e.clientY);
      dragState.node.style.left = `${pointerWorld.x - dragState.offsetX}px`;
      dragState.node.style.top = `${pointerWorld.y - dragState.offsetY}px`;
      dragState.moved = true;
      drawLines();
      return;
    }

    if (!isPanning) return;
    panX += e.clientX - lastPointer.x;
    panY += e.clientY - lastPointer.y;
    lastPointer = { x: e.clientX, y: e.clientY };
    updateTransform();
  });

  function endPointer(e) {
    if (isDraggingNode && dragState) {
      drawLines();
      fitCanvasToNodes();
      keepNodeVisible(dragState.node);
      try { dragState.node.releasePointerCapture(e.pointerId); } catch (_) {}
    }

    isDraggingNode = false;
    dragState = null;
    isPanning = false;
    mindmap.classList.remove("is-panning");
    try { mindmap.releasePointerCapture(e.pointerId); } catch (_) {}
  }

  mindmap.addEventListener("pointerup", endPointer);
  mindmap.addEventListener("pointercancel", endPointer);

  mindmap.addEventListener("click", e => {
    const node = e.target.closest(".node");
    if (node) {
      selectNode(node);
      e.stopPropagation();
      return;
    }
    if (!isPanning && !isDraggingNode) clearSelection();
  });


  world.addEventListener("input", e => {
    const node = e.target.closest(".node");
    if (!node) return;
    const oldCenter = centerOf(node);
    normalizeNodeShape(node);
    placeNode(node, oldCenter.x, oldCenter.y);
    drawLines();
    fitCanvasToNodes();
    keepNodeVisible(node);
  });

  window.addEventListener("resize", fitCanvasToNodes);

  updateTransform();
  addCore("Main Idea");
  ["Character", "Setting", "Conflict", "Theme", "Scene", "Ending"].forEach(t => addNode(t, cores[0]));
</script>

</body>
