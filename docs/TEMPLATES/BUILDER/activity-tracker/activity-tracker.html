<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Activity Tracker</title>
  <style>
    :root {
      --bg: #08080c;
      --panel: #12121a;
      --tile: #1b1b27;
      --tile-hover: #242435;
      --text: #f7f7ff;
      --muted: #a7a7ba;
      --lime: #73ff00;
      --pink: #ff2fb3;
      --aqua: #00f5ff;
      --border: rgba(255,255,255,.12);
      --shadow: 0 18px 45px rgba(0,0,0,.35);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255,47,179,.22), transparent 32rem),
        radial-gradient(circle at bottom right, rgba(115,255,0,.16), transparent 28rem),
        linear-gradient(135deg, #050508, #11111a 55%, #050508);
      padding: 24px;
    }

    .app {
      width: min(1120px, 100%);
      margin: 0 auto;
    }

    header {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 20px;
      align-items: center;
      margin-bottom: 22px;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 5vw, 4.25rem);
      line-height: .9;
      letter-spacing: -0.08em;
      text-transform: uppercase;
    }

    .subtitle {
      color: var(--muted);
      margin-top: 12px;
      max-width: 700px;
      font-size: 1rem;
    }

    .date-card {
      background: rgba(255,255,255,.06);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 16px 18px;
      box-shadow: var(--shadow);
      min-width: 180px;
      text-align: center;
    }

    .date-card .label {
      color: var(--muted);
      font-size: .75rem;
      text-transform: uppercase;
      letter-spacing: .16em;
    }

    .date-card .date {
      font-size: 1.15rem;
      font-weight: 800;
      margin-top: 4px;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      background: rgba(18,18,26,.8);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 12px;
      margin-bottom: 18px;
      backdrop-filter: blur(14px);
    }

    button, .file-label {
      border: 0;
      border-radius: 999px;
      padding: 10px 15px;
      color: #050508;
      font-weight: 800;
      cursor: pointer;
      background: var(--lime);
      transition: transform .15s ease, filter .15s ease, background .15s ease;
      font-size: .9rem;
      font-family: inherit;
    }

    button:hover, .file-label:hover { transform: translateY(-1px); filter: brightness(1.08); }

    button.secondary, .file-label.secondary {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
    }

    button.danger {
      background: var(--pink);
      color: white;
    }

    input[type="file"] { display: none; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 14px;
    }

    .tile {
      position: relative;
      min-height: 190px;
      border: 1px solid var(--border);
      border-radius: 26px;
      background: linear-gradient(145deg, rgba(255,255,255,.08), rgba(255,255,255,.03)), var(--tile);
      box-shadow: var(--shadow);
      padding: 20px 18px 18px;
      display: grid;
      place-items: center;
      text-align: center;
      cursor: pointer;
      user-select: none;
      overflow: hidden;
      isolation: isolate;
    }

    .tile::before {
      content: "";
      position: absolute;
      inset: auto -30px -50px auto;
      width: 110px;
      height: 110px;
      border-radius: 50%;
      background: rgba(0,245,255,.12);
      z-index: -1;
    }

    .tile:hover { background-color: var(--tile-hover); }

    .icon-wrap {
      width: 104px;
      height: 104px;
      display: grid;
      place-items: center;
      margin: 8px auto 14px;
    }

    .icon-img {
      width: 104px;
      height: 104px;
      object-fit: contain;
      display: block;
      image-rendering: auto;
      filter: drop-shadow(0 8px 18px rgba(0,0,0,.35));
      pointer-events: none;
    }

    .missing-icon {
      width: 104px;
      height: 104px;
      display: grid;
      place-items: center;
      border: 1px dashed var(--border);
      border-radius: 22px;
      color: var(--muted);
      font-size: .75rem;
      font-weight: 900;
      letter-spacing: .12em;
      text-transform: uppercase;
      pointer-events: none;
    }

    .name {
    color:white;
      font-size: .95rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: .08em;
      outline: none;
      border-radius: 10px;
      padding: 4px 6px;
      max-width: 100%;
      word-break: break-word;
    }

    .name[contenteditable="true"] {
      background: rgba(255,255,255,.12);
      box-shadow: 0 0 0 2px var(--aqua);
      cursor: text;
      text-transform: none;
      user-select: text;
    }

    .count {
      position: absolute;
      top: 12px;
      right: 12px;
      min-width: 46px;
      height: 46px;
      padding: 0 13px;
      display: none;
      place-items: center;
      border-radius: 999px;
      background: var(--pink);
      color: white;
      font-size: 1.35rem;
      font-weight: 950;
      box-shadow: 0 10px 24px rgba(255,47,179,.28);
      pointer-events: none;
    }

    .edit-label-btn {
      position: absolute;
      left: 12px;
      top: 12px;
      width: 34px;
      height: 34px;
      padding: 0;
      display: grid;
      place-items: center;
      border-radius: 999px;
      background: rgba(255,255,255,.08);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: .95rem;
      z-index: 2;
    }

    .edit-label-btn:hover {
      background: var(--aqua);
      color: #050508;
    }

    .tile[data-count]:not([data-count="0"]) .count { display: grid; }

    .summary {
      margin-top: 18px;
      color: var(--muted);
      text-align: center;
    }

    @media (max-width: 700px) {
      body { padding: 14px; }
      header { grid-template-columns: 1fr; }
      .date-card { text-align: left; }
      .grid { grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); }
      .tile { min-height: 165px; }
      .icon-wrap, .icon-img, .missing-icon {
        width: 86px;
        height: 86px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <div>
        <h1>Daily Activity Tracker</h1>
        <p class="subtitle">Click a square to count an activity. Use the pencil to rename a label. Export saves the current edited tracker as an HTML file named with today’s date.</p>
      </div>
      <div class="date-card">
        <div class="label">Tracking Date</div>
        <div class="date" id="displayDate"></div>
      </div>
    </header>

    <section class="toolbar" aria-label="Activity tracker controls">
      <button id="exportBtn">Export HTML</button>
      <label for="restoreInput" class="file-label secondary">Restore HTML</label>
      <input id="restoreInput" type="file" accept=".html,.htm,text/html" />
      <button id="resetCountsBtn" class="secondary">Reset Counts</button>
      <button id="resetAllBtn" class="danger">Reset All</button>
    </section>

    <section class="grid" id="activityGrid" aria-label="Activity grid"></section>

    <p class="summary" id="summaryText">Total activities counted: 0</p>
  </main>

  <script id="tracker-data" type="application/json">
    {
      "created": "",
      "activities": [
        { "label": "CHORES", "icon": "chores.gif", "count": 0 },
        { "label": "CREATIVE", "icon": "creative.gif", "count": 0 },
        { "label": "ERRANDS", "icon": "errands.gif", "count": 0 },
        { "label": "EXERCISE", "icon": "exercise.gif", "count": 0 },
        { "label": "CUSTOM", "icon": "", "count": 0 },
        { "label": "PERSONAL CARE", "icon": "personal-care.gif", "count": 0 },
        { "label": "PETS", "icon": "pets.gif", "count": 0 },
        { "label": "READ", "icon": "read.gif", "count": 0 },
        { "label": "SLEEP", "icon": "sleep.gif", "count": 0 },
        { "label": "SOCIAL", "icon": "social.gif", "count": 0 },
        { "label": "TV", "icon": "tv.gif", "count": 0 },
        { "label": "WORK", "icon": "work.gif", "count": 0 }
      ]
    }
  </script>

  <script>
    const STORAGE_KEY = "modular-markup-activity-tracker-fixed-icons-v1";
    const grid = document.getElementById("activityGrid");
    const displayDate = document.getElementById("displayDate");
    const summaryText = document.getElementById("summaryText");
    const exportBtn = document.getElementById("exportBtn");
    const restoreInput = document.getElementById("restoreInput");
    const resetCountsBtn = document.getElementById("resetCountsBtn");
    const resetAllBtn = document.getElementById("resetAllBtn");

    const today = new Date();
    const todaySlug = today.toISOString().slice(0, 10);

    displayDate.textContent = today.toLocaleDateString(undefined, {
      weekday: "long",
      year: "numeric",
      month: "long",
      day: "numeric"
    });

    function readEmbeddedData() {
      try {
        const data = JSON.parse(document.getElementById("tracker-data").textContent);
        if (!data.created) data.created = todaySlug;
        return data;
      } catch (error) {
        console.error("Could not read tracker data.", error);
        return { created: todaySlug, activities: [] };
      }
    }

    function getDefaultData() {
      const original = readEmbeddedData();
      original.created = todaySlug;
      original.activities = original.activities.map(item => ({ ...item, count: 0 }));
      return original;
    }

    let state = loadState();

    function loadState() {
      const embedded = readEmbeddedData();

      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
        if (saved && Array.isArray(saved.activities)) return saved;
      } catch (error) {
        console.warn("Saved tracker data could not be loaded.", error);
      }

      return embedded;
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function render() {
      grid.innerHTML = "";

      state.activities.forEach((activity, index) => {
        const tile = document.createElement("button");
        tile.className = "tile";
        tile.type = "button";
        tile.dataset.index = index;
        tile.dataset.count = activity.count || 0;
        tile.setAttribute("aria-label", `${activity.label}: ${activity.count || 0}`);

        const safeLabel = escapeHTML(activity.label);
        const safeIcon = escapeAttribute(activity.icon || "");

        tile.innerHTML = `
          <button class="edit-label-btn" type="button" title="Rename ${safeLabel}" aria-label="Rename ${safeLabel}">✎</button>
          <span class="count">${activity.count || 0}</span>
          <div>
            <div class="icon-wrap" aria-hidden="true">
              <img class="icon-img" src="${safeIcon}" alt="" onerror="this.replaceWith(createMissingIcon())">
            </div>
            <div class="name">${safeLabel}</div>
          </div>
        `;

        tile.addEventListener("click", event => {
          if (event.target.closest(".edit-label-btn")) return;
          if (event.target.classList.contains("name") && event.target.isContentEditable) return;

          state.activities[index].count = (state.activities[index].count || 0) + 1;
          saveState();
          render();
        });

        const labelBtn = tile.querySelector(".edit-label-btn");
        const name = tile.querySelector(".name");

        labelBtn.addEventListener("click", event => {
          event.stopPropagation();
          name.contentEditable = "true";
          name.focus();
          selectText(name);
        });

        name.addEventListener("click", event => {
          if (name.isContentEditable) event.stopPropagation();
        });

        name.addEventListener("keydown", event => {
          if (event.key === "Enter") {
            event.preventDefault();
            name.blur();
          }

          if (event.key === "Escape") {
            name.textContent = state.activities[index].label;
            name.blur();
          }
        });

        name.addEventListener("blur", () => {
          const newLabel = name.textContent.trim() || state.activities[index].label;
          state.activities[index].label = newLabel;
          name.contentEditable = "false";
          saveState();
          render();
        });

        grid.appendChild(tile);
      });

      const total = state.activities.reduce((sum, item) => sum + (Number(item.count) || 0), 0);
      summaryText.textContent = `Total activities counted: ${total}`;
    }

    function createMissingIcon() {
      const span = document.createElement("span");
      span.className = "missing-icon";
      span.textContent = "GIF";
      return span;
    }

    function escapeHTML(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function escapeAttribute(value) {
      return escapeHTML(value).replaceAll("`", "&#096;");
    }

    function selectText(element) {
      const range = document.createRange();
      range.selectNodeContents(element);
      const selection = window.getSelection();
      selection.removeAllRanges();
      selection.addRange(range);
    }

    function exportHTML() {
      state.created = todaySlug;
      saveState();

      const clonedDocument = document.documentElement.cloneNode(true);
      const dataTag = clonedDocument.querySelector("#tracker-data");
      dataTag.textContent = "\n" + JSON.stringify(state, null, 2) + "\n  ";

      const html = "<!DOCTYPE html>\n" + clonedDocument.outerHTML;
      const blob = new Blob([html], { type: "text/html" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");

      link.href = url;
      link.download = `${todaySlug}-activity-tracker.html`;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }

    function restoreHTML(file) {
      const reader = new FileReader();

      reader.onload = event => {
        try {
          const parser = new DOMParser();
          const restoredDoc = parser.parseFromString(event.target.result, "text/html");
          const restoredDataTag = restoredDoc.querySelector("#tracker-data");

          if (!restoredDataTag) throw new Error("No tracker data found in this HTML file.");

          const restoredState = JSON.parse(restoredDataTag.textContent);

          if (!restoredState.activities || !Array.isArray(restoredState.activities)) {
            throw new Error("Tracker data is missing activities.");
          }

          state = restoredState;
          saveState();
          render();
        } catch (error) {
          alert("That file could not be restored as an activity tracker HTML file.");
          console.error(error);
        }
      };

      reader.readAsText(file);
    }

    exportBtn.addEventListener("click", exportHTML);

    restoreInput.addEventListener("change", event => {
      const file = event.target.files[0];
      if (file) restoreHTML(file);
      restoreInput.value = "";
    });

    resetCountsBtn.addEventListener("click", () => {
      state.activities = state.activities.map(item => ({ ...item, count: 0 }));
      state.created = todaySlug;
      saveState();
      render();
    });

    resetAllBtn.addEventListener("click", () => {
      if (!confirm("Reset all labels and counts back to the original template?")) return;
      state = getDefaultData();
      saveState();
      render();
    });

    render();
  </script>
</body>
</html>
