<!doctype html>
<html lang="en" class="page-dashboard-widget neo-dark-doc page-scratch-it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Scratch-Off Card Generator (Image Upload + Hidden Text)</title>
  <link rel="stylesheet" href="../../neo-brutalist.css" />
  <link rel="stylesheet" href="../../neo-brutal-overrides.css" />
</head>
<body>

<div id="scratch-it-generator" class="dashboard-widget panel dashboard-widget--wide">
  <h3>Scratch-Off Generator</h3>
  <p class="dashboard-lead">Upload an image for the scratch surface and set the hidden message underneath. Works with mouse or touch.</p>

  <div class="dashboard-split">
    <div>
      <h4>Controls</h4>

      <label>
        Scratch surface image (jpg/png/webp)
        <input id="imgInput" type="file" accept="image/*" />
      </label>

      <label>
        Hidden message (text under the scratch)
        <textarea id="msgInput" rows="4">🎉 You win! 🎉
Use code: LOKI-LOVE</textarea>
      </label>

      <div class="dashboard-field-row">
        <label>
          Brush size
          <input id="brush" type="range" min="10" max="90" value="38" />
        </label>
        <label>
          Reveal threshold (%)
          <input id="threshold" type="number" min="1" max="100" value="45" />
        </label>
      </div>

      <div class="dashboard-actions">
        <button type="button" id="resetBtn" class="secondary">Reset scratch layer</button>
        <button type="button" id="revealBtn">Reveal all</button>
      </div>

      <div class="scratch-stats">
        <span class="scratch-pill">Revealed: <span id="pct">0</span>%</span>
        <span class="scratch-pill">Pointer: <span id="ptr">—</span></span>
      </div>

      <label>
        Embed code (demo snippet)
        <div class="scratch-codebox" id="codebox"></div>
      </label>

      <p class="dashboard-hint">Mouse: click and drag to scratch. Mobile: touch and drag. The image is drawn on the canvas and erased where you scratch.</p>
    </div>

    <div class="scratch-stage-panel">
      <h4>Preview</h4>
      <div class="scratch-wrap" id="wrap">
        <div class="scratch-under">
          <div class="scratch-msg" id="msg"></div>
        </div>
        <canvas id="scratch"></canvas>
      </div>
    </div>
  </div>
</div>

<script>
(() => {
  const imgInput = document.getElementById('imgInput');
  const msgInput = document.getElementById('msgInput');
  const msgEl = document.getElementById('msg');
  const brush = document.getElementById('brush');
  const threshold = document.getElementById('threshold');
  const resetBtn = document.getElementById('resetBtn');
  const revealBtn = document.getElementById('revealBtn');
  const pctEl = document.getElementById('pct');
  const ptrEl = document.getElementById('ptr');
  const codebox = document.getElementById('codebox');

  const wrap = document.getElementById('wrap');
  const canvas = document.getElementById('scratch');
  const ctx = canvas.getContext('2d', { willReadFrequently: true });

  let surfaceImg = new Image();
  let hasUserImage = false;

  let isDown = false;
  let last = null;
  let revealedDone = false;

  let sampleTimer = null;

  function fitCanvas() {
    const r = wrap.getBoundingClientRect();
    const dpr = Math.max(1, window.devicePixelRatio || 1);
    canvas.width = Math.round(r.width * dpr);
    canvas.height = Math.round(r.height * dpr);
    canvas.style.width = r.width + 'px';
    canvas.style.height = r.height + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    drawSurface();
  }

  function drawSurface() {
    revealedDone = false;
    pctEl.textContent = '0';

    const w = wrap.clientWidth;
    const h = wrap.clientHeight;

    ctx.globalCompositeOperation = 'source-over';
    ctx.clearRect(0, 0, w, h);

    if (hasUserImage && surfaceImg.complete && surfaceImg.naturalWidth) {
      const iw = surfaceImg.naturalWidth;
      const ih = surfaceImg.naturalHeight;
      const scale = Math.max(w / iw, h / ih);
      const sw = iw * scale;
      const sh = ih * scale;
      const dx = (w - sw) / 2;
      const dy = (h - sh) / 2;
      ctx.drawImage(surfaceImg, dx, dy, sw, sh);
    } else {
      ctx.fillStyle = '#bdbdbd';
      ctx.fillRect(0, 0, w, h);
      ctx.fillStyle = 'rgba(0,0,0,0.12)';
      for (let y = 0; y < h; y += 14) {
        ctx.fillRect(0, y, w, 7);
      }
      ctx.fillStyle = 'rgba(255,255,255,0.10)';
      for (let x = 0; x < w; x += 18) {
        ctx.fillRect(x, 0, 6, h);
      }
    }

    ctx.globalCompositeOperation = 'destination-out';
  }

  function setMessage() {
    msgEl.textContent = msgInput.value || '';
    updateCodeBox();
  }

  function pointerPos(evt) {
    const rect = wrap.getBoundingClientRect();
    let clientX;
    let clientY;
    let type = 'mouse';
    if (evt.touches && evt.touches[0]) {
      clientX = evt.touches[0].clientX;
      clientY = evt.touches[0].clientY;
      type = 'touch';
    } else {
      clientX = evt.clientX;
      clientY = evt.clientY;
    }
    return {
      x: clientX - rect.left,
      y: clientY - rect.top,
      type
    };
  }

  function scratchLine(a, b) {
    const size = Number(brush.value);
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.lineWidth = size;

    ctx.beginPath();
    ctx.moveTo(a.x, a.y);
    ctx.lineTo(b.x, b.y);
    ctx.stroke();
  }

  function scratchDot(p) {
    const size = Number(brush.value);
    ctx.beginPath();
    ctx.arc(p.x, p.y, size / 2, 0, Math.PI * 2);
    ctx.fill();
  }

  function measureRevealedPct() {
    const w = wrap.clientWidth;
    const h = wrap.clientHeight;

    const step = 6;
    const img = ctx.getImageData(0, 0, w, h).data;

    let total = 0;
    let cleared = 0;
    for (let y = 0; y < h; y += step) {
      for (let x = 0; x < w; x += step) {
        const i = (y * w + x) * 4;
        const alpha = img[i + 3];
        total++;
        if (alpha === 0) cleared++;
      }
    }

    const pct = Math.min(100, Math.max(0, Math.round((cleared / total) * 100)));
    pctEl.textContent = String(pct);

    const t = Number(threshold.value) || 0;
    if (!revealedDone && t > 0 && pct >= t) {
      revealedDone = true;
      revealAll();
    }
  }

  function scheduleMeasure() {
    if (sampleTimer) return;
    sampleTimer = setTimeout(() => {
      sampleTimer = null;
      measureRevealedPct();
    }, 180);
  }

  function revealAll() {
    const w = wrap.clientWidth;
    const h = wrap.clientHeight;
    ctx.save();
    ctx.globalCompositeOperation = 'destination-out';
    ctx.fillStyle = 'rgba(0,0,0,1)';
    ctx.fillRect(0, 0, w, h);
    ctx.restore();
    pctEl.textContent = '100';
  }

  function onDown(e) {
    e.preventDefault();
    isDown = true;
    const p = pointerPos(e);
    ptrEl.textContent = p.type;
    last = p;
    scratchDot(p);
    scheduleMeasure();
  }

  function onMove(e) {
    if (!isDown) return;
    e.preventDefault();
    const p = pointerPos(e);
    ptrEl.textContent = p.type;
    scratchLine(last, p);
    last = p;
    scheduleMeasure();
  }

  function onUp() {
    isDown = false;
    last = null;
  }

  imgInput.addEventListener('change', () => {
    const file = imgInput.files && imgInput.files[0];
    if (!file) return;

    const url = URL.createObjectURL(file);
    surfaceImg = new Image();
    surfaceImg.onload = () => {
      hasUserImage = true;
      URL.revokeObjectURL(url);
      drawSurface();
      updateCodeBox();
    };
    surfaceImg.src = url;
  });

  msgInput.addEventListener('input', setMessage);
  brush.addEventListener('input', updateCodeBox);
  threshold.addEventListener('input', updateCodeBox);

  resetBtn.addEventListener('click', () => drawSurface());
  revealBtn.addEventListener('click', () => revealAll());

  wrap.addEventListener('mousedown', onDown);
  window.addEventListener('mousemove', onMove);
  window.addEventListener('mouseup', onUp);

  wrap.addEventListener('touchstart', onDown, { passive: false });
  wrap.addEventListener('touchmove', onMove, { passive: false });
  wrap.addEventListener('touchend', onUp);

  window.addEventListener('resize', fitCanvas);

  function updateCodeBox() {
    const msg = (msgInput.value || '').replaceAll('<', '&lt;').replaceAll('>', '&gt;');
    codebox.innerHTML =
`<div class="scratch-wrap">
  <div class="scratch-under">
    <div class="scratch-msg">${msg.replaceAll('\n', '<br>')}</div>
  </div>
  <canvas id="scratch"></canvas>
</div>

Brush size: ${brush.value}px
Auto-reveal at: ${threshold.value}%`;
  }

  setMessage();
  fitCanvas();
})();
</script>

</body>
</html>
