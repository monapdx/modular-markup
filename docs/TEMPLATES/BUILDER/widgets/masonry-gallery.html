<!DOCTYPE html>
<html lang="en" class="page-masonry-gallery">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Masonry Gallery Builder</title>
  <style>
    html.page-masonry-gallery{
      --bg:#0a0a0a;
      --lime:#c6ff00;
      --pink:#ff4fd8;
      --blue:#42d9ff;
      --white:#fff;
      --black:#000;
      --paper:#f7f5ef;
      --muted:#1a1a1a;
      --border:4px solid var(--black);
      --shadow:6px 6px 0 var(--black);
      --shadow-sm:4px 4px 0 var(--black);
    }
    html.page-masonry-gallery *{ box-sizing:border-box; }
    html.page-masonry-gallery body{
      margin:0;
      padding:2rem;
      background:var(--bg);
      font-family: Arial, Helvetica, sans-serif;
      color: var(--white);
    }
    @media(max-width:900px){ html.page-masonry-gallery body{ padding:1rem; } }

    html.page-masonry-gallery .wrap{
      width: min(1400px, calc(100vw - 3rem));
      margin: 0 auto;
    }

    /* Toolbar */
    html.page-masonry-gallery .mm-toolbar{
      display:flex;
      flex-wrap:wrap;
      align-items:center;
      gap:.65rem .85rem;
      margin-bottom: 1.25rem;
      padding:.65rem .85rem;
      background: var(--lime);
      border: var(--border);
      box-shadow: var(--shadow);
      color: var(--black);
    }
    html.page-masonry-gallery .mm-toolbar button,
    html.page-masonry-gallery .mm-toolbar .btnlike{
      font: inherit;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: .04em;
      padding: .45rem .85rem;
      cursor: pointer;
      border: 3px solid var(--black);
      border-radius: 999px;
      box-shadow: var(--shadow-sm);
      background: var(--pink);
      color: var(--black);
      transition: transform .12s ease, box-shadow .12s ease, filter .12s ease;
      user-select:none;
    }
    html.page-masonry-gallery .mm-toolbar button:hover,
    html.page-masonry-gallery .mm-toolbar .btnlike:hover{
      transform: translate(-2px,-2px);
      box-shadow: 6px 6px 0 var(--black);
      filter: brightness(1.02);
    }
    html.page-masonry-gallery .mm-toolbar button.secondary{ background: var(--blue); }
    html.page-masonry-gallery .mm-toolbar button.danger{ background: var(--white); }
    html.page-masonry-gallery .mm-status{
      margin-left:auto;
      font-size: .72rem;
      font-weight: 800;
      text-transform: uppercase;
      color: var(--black);
      max-width: 16rem;
      text-align:right;
    }
    html.page-masonry-gallery .mm-toolbar input[type="file"]{
      position:absolute;
      width:1px; height:1px;
      padding:0; margin:-1px;
      overflow:hidden;
      clip: rect(0,0,0,0);
      white-space:nowrap;
      border:0;
    }

    /* Title */
    html.page-masonry-gallery .title{
      display:inline-block;
      margin: 0 0 1.25rem;
      padding: .75rem 1.25rem;
      background: var(--pink);
      border: var(--border);
      box-shadow: var(--shadow);
      font-size: clamp(2rem, 5vw, 4rem);
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: -.06em;
      color: var(--black);
    }
    html.page-masonry-gallery .subtitle{
      margin: 0 0 1.25rem;
      color: rgba(255,255,255,.8);
      max-width: 70ch;
      line-height: 1.5;
      font-weight: 700;
    }

    /* Masonry columns */
    html.page-masonry-gallery .masonry{
      column-count: 4;
      column-gap: 1.25rem;
      width: 100%;
    }
    @media(max-width:1100px){ html.page-masonry-gallery .masonry{ column-count: 3; } }
    @media(max-width:800px){ html.page-masonry-gallery .masonry{ column-count: 2; } }
    @media(max-width:560px){ html.page-masonry-gallery .masonry{ column-count: 1; } }

    html.page-masonry-gallery .item{
      display:block;
      width:100%;
      break-inside: avoid;
      margin: 0 0 1.25rem;
      background: var(--paper);
      border: var(--border);
      box-shadow: var(--shadow);
      color: var(--black);
      overflow:hidden;
      transition: transform .15s ease, box-shadow .15s ease, filter .15s ease;
    }
    html.page-masonry-gallery .item:hover{
      transform: translate(-4px,-4px);
      box-shadow: 10px 10px 0 var(--black);
      filter: brightness(1.02);
      z-index: 2;
    }

    html.page-masonry-gallery .imgwrap{
      width:100%;
      background:
        linear-gradient(45deg,#e5e5e5 25%,transparent 25%),
        linear-gradient(-45deg,#e5e5e5 25%,transparent 25%),
        linear-gradient(45deg,transparent 75%,#e5e5e5 75%),
        linear-gradient(-45deg,transparent 75%,#e5e5e5 75%);
      background-size: 20px 20px;
      background-position: 0 0,0 10px,10px -10px,-10px 0;
    }
    html.page-masonry-gallery img{
      width:100%;
      height:auto;
      display:block;
    }
    html.page-masonry-gallery .cap{
      padding: .75rem .85rem;
      border-top: 3px solid var(--black);
      background: var(--white);
      font-size: .92rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: .02em;
      line-height: 1.2;
      outline: none;
      cursor: text;
    }
    html.page-masonry-gallery .cap:focus{
      box-shadow: inset 0 0 0 3px var(--black);
      background: #fff;
    }
    html.page-masonry-gallery .meta{
      padding: 0 .85rem .85rem;
      font-size: .72rem;
      font-weight: 800;
      text-transform: uppercase;
      color: #333;
      opacity: .9;
      word-break: break-word;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="mm-toolbar" role="toolbar" aria-label="Masonry gallery tools">
      <button type="button" id="btn-import-images">Import Images</button>
      <input
        type="file"
        id="input-image-import"
        accept=".jpg,.jpeg,.png,.webp,.gif,image/jpeg,image/png,image/webp,image/gif"
        multiple
        aria-label="Select image files"
      />
      <button type="button" id="btn-export-html" class="secondary">Export This Version</button>
      <button type="button" id="btn-restore-default" class="danger">Restore Default</button>
      <span class="mm-status" id="mm-status" aria-live="polite">Changes saved locally</span>
    </div>

    <div class="title">Masonry Gallery</div>
    <p class="subtitle">Local-first, single-file gallery builder. Import images, edit captions inline, and export a standalone HTML you can share or archive.</p>

    <div id="gallery" class="masonry" aria-label="Masonry gallery grid"></div>
  </div>

  <script type="application/json" id="mm-masonry-boot">
  [
    { "caption": "Moodboard Item", "src": "data:image/svg+xml;utf8,%3Csvg%20xmlns%3D%27http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%27%20width%3D%271200%27%20height%3D%27800%27%20viewBox%3D%270%200%201200%20800%27%3E%3Cdefs%3E%3ClinearGradient%20id%3D%27g%27%20x1%3D%270%27%20y1%3D%270%27%20x2%3D%271%27%20y2%3D%271%27%3E%3Cstop%20offset%3D%270%25%27%20stop-color%3D%27%23ff4fd8%27%2F%3E%3Cstop%20offset%3D%27100%25%27%20stop-color%3D%27%2342d9ff%27%2F%3E%3C%2FlinearGradient%3E%3C%2Fdefs%3E%3Crect%20width%3D%271200%27%20height%3D%27800%27%20fill%3D%27url(%23g)%27%2F%3E%3Crect%20x%3D%2740%27%20y%3D%2740%27%20width%3D%271120%27%20height%3D%27720%27%20fill%3D%27none%27%20stroke%3D%27%23000%27%20stroke-width%3D%2720%27%2F%3E%3Ctext%20x%3D%2760%27%20y%3D%27720%27%20fill%3D%27%23000%27%20font-size%3D%2790%27%20font-family%3D%27Arial%27%20font-weight%3D%27900%27%3EMOODBOARD%3C%2Ftext%3E%3C%2Fsvg%3E", "fileName": "placeholder-moodboard.svg", "isPlaceholder": true },
    { "caption": "Project Shot", "src": "data:image/svg+xml;utf8,%3Csvg%20xmlns%3D%27http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%27%20width%3D%27900%27%20height%3D%271200%27%20viewBox%3D%270%200%20900%201200%27%3E%3Crect%20width%3D%27900%27%20height%3D%271200%27%20fill%3D%27%23c6ff00%27%2F%3E%3Cpath%20d%3D%27M0%2C240%20L900%2C120%20L900%2C520%20L0%2C640%20Z%27%20fill%3D%27%23000%27%20opacity%3D%270.15%27%2F%3E%3Crect%20x%3D%2740%27%20y%3D%2740%27%20width%3D%27820%27%20height%3D%271120%27%20fill%3D%27none%27%20stroke%3D%27%23000%27%20stroke-width%3D%2720%27%2F%3E%3Ctext%20x%3D%2760%27%20y%3D%271100%27%20fill%3D%27%23000%27%20font-size%3D%2780%27%20font-family%3D%27Arial%27%20font-weight%3D%27900%27%3EPROJECT%3C%2Ftext%3E%3C%2Fsvg%3E", "fileName": "placeholder-project.svg", "isPlaceholder": true },
    { "caption": "Reference Image", "src": "data:image/svg+xml;utf8,%3Csvg%20xmlns%3D%27http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%27%20width%3D%271200%27%20height%3D%27900%27%20viewBox%3D%270%200%201200%20900%27%3E%3Crect%20width%3D%271200%27%20height%3D%27900%27%20fill%3D%27%23111111%27%2F%3E%3Crect%20x%3D%2740%27%20y%3D%2740%27%20width%3D%271120%27%20height%3D%27820%27%20fill%3D%27%23f7f5ef%27%20stroke%3D%27%23000%27%20stroke-width%3D%2720%27%2F%3E%3Ccircle%20cx%3D%27330%27%20cy%3D%27420%27%20r%3D%27130%27%20fill%3D%27%2342d9ff%27%20stroke%3D%27%23000%27%20stroke-width%3D%2716%27%2F%3E%3Ccircle%20cx%3D%27790%27%20cy%3D%27450%27%20r%3D%27170%27%20fill%3D%27%23ff4fd8%27%20stroke%3D%27%23000%27%20stroke-width%3D%2716%27%2F%3E%3Ctext%20x%3D%2780%27%20y%3D%27800%27%20fill%3D%27%23000%27%20font-size%3D%2780%27%20font-family%3D%27Arial%27%20font-weight%3D%27900%27%3EREFERENCE%3C%2Ftext%3E%3C%2Fsvg%3E", "fileName": "placeholder-reference.svg", "isPlaceholder": true },
    { "caption": "Inspiration", "src": "data:image/svg+xml;utf8,%3Csvg%20xmlns%3D%27http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%27%20width%3D%271050%27%20height%3D%27750%27%20viewBox%3D%270%200%201050%20750%27%3E%3Crect%20width%3D%271050%27%20height%3D%27750%27%20fill%3D%27%2342d9ff%27%2F%3E%3Crect%20x%3D%2740%27%20y%3D%2740%27%20width%3D%27970%27%20height%3D%27670%27%20fill%3D%27none%27%20stroke%3D%27%23000%27%20stroke-width%3D%2720%27%2F%3E%3Cpath%20d%3D%27M80%2C210%20C240%2C120%20340%2C380%20510%2C260%20C660%2C150%20820%2C470%20970%2C310%27%20fill%3D%27none%27%20stroke%3D%27%23000%27%20stroke-width%3D%2720%27%20stroke-linecap%3D%27round%27%2F%3E%3Ctext%20x%3D%2770%27%20y%3D%27650%27%20fill%3D%27%23000%27%20font-size%3D%2780%27%20font-family%3D%27Arial%27%20font-weight%3D%27900%27%3EINSPO%3C%2Ftext%3E%3C%2Fsvg%3E", "fileName": "placeholder-inspiration.svg", "isPlaceholder": true }
  ]
  </script>

  <script>
  (function () {
    var LS_KEY = "mm-masonry-gallery-v1";
    var items = [];
    var statusEl = null;
    var saveTimer = null;

    function setStatus(msg) {
      if (!statusEl) statusEl = document.getElementById("mm-status");
      if (statusEl) statusEl.textContent = msg || "";
    }

    function sanitizeText(value) {
      return String(value || "").replace(/\s+/g, " ").trim();
    }

    function fileNameToCaption(filename) {
      var base = String(filename || "").replace(/^.*[\\/]/, "");
      base = base.replace(/\.(gif|png|jpe?g|webp|svg)$/i, "");
      base = base.replace(/[-_]+/g, " ").replace(/\s+/g, " ").trim();
      if (!base) return "Gallery Item";
      return base.split(" ").map(function (w) {
        if (!w) return "";
        return w.charAt(0).toUpperCase() + w.slice(1).toLowerCase();
      }).join(" ");
    }

    function isAllowedImageFile(file) {
      var n = (file && file.name) || "";
      var t = (file && file.type) || "";
      if (/\.jpe?g$/i.test(n) || t === "image/jpeg") return true;
      if (/\.png$/i.test(n) || t === "image/png") return true;
      if (/\.webp$/i.test(n) || t === "image/webp") return true;
      if (/\.gif$/i.test(n) || t === "image/gif") return true;
      return false;
    }

    function readFileAsDataURL(file) {
      return new Promise(function (resolve, reject) {
        var fr = new FileReader();
        fr.onload = function () { resolve(fr.result); };
        fr.onerror = function () { reject(fr.error || new Error("read failed")); };
        fr.readAsDataURL(file);
      });
    }

    function inferIsPlaceholder(item) {
      if (!item) return false;
      if (item.isPlaceholder === true) return true;
      if (item.isPlaceholder === false) return false;
      var fn = String(item.fileName || "");
      var src = String(item.src || "");
      if (/^placeholder-/i.test(fn)) return true;
      if (/^data:image\/svg\+xml/i.test(src) && /placeholder/i.test(fn)) return true;
      return false;
    }

    function normalizeItem(item) {
      var it = item && typeof item === "object" ? item : {};
      return {
        caption: sanitizeText(it.caption || ""),
        src: String(it.src || ""),
        fileName: String(it.fileName || ""),
        isPlaceholder: inferIsPlaceholder(it)
      };
    }

    function hasOnlyPlaceholders(list) {
      return Array.isArray(list) && list.length > 0 && list.every(function (item) {
        return item && item.isPlaceholder === true;
      });
    }

    function getItemsFromDom() {
      var nodes = document.querySelectorAll("#gallery .item");
      return Array.prototype.map.call(nodes, function (el) {
        var img = el.querySelector("img");
        var cap = el.querySelector(".cap");
        return {
          caption: sanitizeText(cap ? cap.textContent : ""),
          src: img ? (img.getAttribute("src") || "") : "",
          fileName: el.getAttribute("data-file-name") || "",
          isPlaceholder: el.getAttribute("data-is-placeholder") === "true"
        };
      });
    }

    function saveItems() {
      items = getItemsFromDom();
      try {
        localStorage.setItem(LS_KEY, JSON.stringify(items));
        setStatus("Changes saved locally");
      } catch (e) {
        setStatus("Could not save");
      }
    }

    function scheduleSave() {
      if (saveTimer) clearTimeout(saveTimer);
      setStatus("Saving…");
      saveTimer = setTimeout(function () {
        saveItems();
      }, 280);
    }

    function removeBootElementIfPresent() {
      var el = document.getElementById("mm-masonry-boot");
      if (el && el.parentNode) el.parentNode.removeChild(el);
    }

    function readBootItems() {
      var el = document.getElementById("mm-masonry-boot");
      if (!el || !el.textContent.trim()) return null;
      var text = el.textContent;
      if (el.parentNode) el.parentNode.removeChild(el);
      try {
        var arr = JSON.parse(text);
        if (Array.isArray(arr) && arr.length) return arr;
      } catch (e) {}
      return null;
    }

    function getDefaultItems() {
      var boot = readBootItems();
      if (boot) return boot;
      return [];
    }

    function render(list) {
      items = (list || []).slice();
      var root = document.getElementById("gallery");
      if (!root) return;
      root.innerHTML = "";

      items.forEach(function (item) {
        var normalized = normalizeItem(item);
        var card = document.createElement("article");
        card.className = "item";
        if (normalized.fileName) card.setAttribute("data-file-name", normalized.fileName);
        card.setAttribute("data-is-placeholder", normalized.isPlaceholder ? "true" : "false");

        var imgWrap = document.createElement("div");
        imgWrap.className = "imgwrap";

        var img = document.createElement("img");
        img.alt = "";
        img.src = normalized.src || "";
        img.loading = "lazy";
        imgWrap.appendChild(img);

        var cap = document.createElement("div");
        cap.className = "cap";
        cap.setAttribute("contenteditable", "true");
        cap.setAttribute("spellcheck", "false");
        cap.textContent = normalized.caption || "";
        cap.addEventListener("input", scheduleSave);
        cap.addEventListener("blur", function () { saveItems(); });
        cap.addEventListener("keydown", function (ev) {
          if (ev.key === "Enter") {
            ev.preventDefault();
            cap.blur();
          }
        });

        var meta = document.createElement("div");
        meta.className = "meta";
        meta.textContent = normalized.fileName ? ("File: " + normalized.fileName) : "File: (placeholder)";

        card.appendChild(imgWrap);
        card.appendChild(cap);
        card.appendChild(meta);
        root.appendChild(card);
      });
    }

    function importImages(fileList) {
      var files = Array.prototype.slice.call(fileList || [], 0).filter(isAllowedImageFile);
      if (!files.length) {
        setStatus("No images selected");
        return;
      }

      setStatus("Importing images…");
      var chain = Promise.resolve();
      var newItems = [];

      files.forEach(function (file) {
        chain = chain.then(function () {
          return readFileAsDataURL(file).then(function (dataUrl) {
            newItems.push({
              caption: fileNameToCaption(file.name),
              src: dataUrl,
              fileName: file.name,
              isPlaceholder: false
            });
          });
        });
      });

      chain
        .then(function () {
          if (hasOnlyPlaceholders(items.map(normalizeItem))) {
            items = [];
          }
          items = items.concat(newItems);
          render(items);
          saveItems();
          setStatus("Changes saved locally");
        })
        .catch(function () {
          setStatus("Could not save");
        });
    }

    function getEmbeddedCss() {
      var styles = document.getElementsByTagName("style");
      var out = "";
      for (var i = 0; i < styles.length; i++) out += (styles[i].textContent || "");
      return out;
    }

    function getAppScriptSource() {
      var scripts = document.getElementsByTagName("script");
      return scripts[scripts.length - 1].textContent || "";
    }

    function exportThisVersion() {
      saveItems();
      var snapshot = getItemsFromDom();
      setStatus("Export ready");

      var bootJson = JSON.stringify(snapshot).replace(/</g, "\\u003c");
      var css = getEmbeddedCss();
      var scriptBody = getAppScriptSource();

      var toolbarHtml =
        '<div class="mm-toolbar" role="toolbar" aria-label="Masonry gallery tools">' +
        '<button type="button" id="btn-import-images">Import Images</button>' +
        '<input type="file" id="input-image-import" accept=".jpg,.jpeg,.png,.webp,.gif,image/jpeg,image/png,image/webp,image/gif" multiple aria-label="Select image files" />' +
        '<button type="button" id="btn-export-html" class="secondary">Export This Version</button>' +
        '<button type="button" id="btn-restore-default" class="danger">Restore Default</button>' +
        '<span class="mm-status" id="mm-status" aria-live="polite">Changes saved locally</span>' +
        "</div>";

      var inner =
        '<div class="wrap">' +
        toolbarHtml +
        '<div class="title">Masonry Gallery</div>' +
        '<p class="subtitle">Local-first, single-file gallery builder. Import images, edit captions inline, and export a standalone HTML you can share or archive.</p>' +
        '<div id="gallery" class="masonry" aria-label="Masonry gallery grid"></div>' +
        "</div>" +
        '<script type="application/json" id="mm-masonry-boot">' +
        bootJson +
        "<\/script>" +
        "<script>" +
        scriptBody +
        "<\/script>";

      var doc =
        "<!DOCTYPE html>\n" +
        '<html lang="en" class="page-masonry-gallery">\n<head>\n<meta charset="UTF-8"/>\n<meta name="viewport" content="width=device-width, initial-scale=1.0"/>\n<title>Masonry Gallery (export)</title>\n<style>' +
        css +
        "</style>\n</head>\n<body>\n" +
        inner +
        "\n</body>\n</html>";

      try {
        var blob = new Blob([doc], { type: "text/html;charset=utf-8" });
        var url = URL.createObjectURL(blob);
        var a = document.createElement("a");
        a.href = url;
        a.download = "masonry-gallery-export.html";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setTimeout(function () {
          URL.revokeObjectURL(url);
        }, 0);
      } catch (e) {
        setStatus("Could not save");
      }
    }

    function restoreDefault() {
      if (!window.confirm("Restore the original gallery and clear imported images?")) return;
      try { localStorage.removeItem(LS_KEY); } catch (e) {}
      location.reload();
    }

    function init() {
      var fromLs = null;
      try {
        var raw = localStorage.getItem(LS_KEY);
        if (raw) {
          var parsed = JSON.parse(raw);
          if (Array.isArray(parsed) && parsed.length) fromLs = parsed;
        }
      } catch (e) {}

      if (fromLs) {
        items = fromLs.map(normalizeItem);
        removeBootElementIfPresent();
      } else {
        var boot = readBootItems();
        if (boot) {
          items = boot.map(normalizeItem);
          try { localStorage.setItem(LS_KEY, JSON.stringify(items)); } catch (e2) {}
        } else {
          items = getDefaultItems();
        }
      }

      render(items);

      var fileInput = document.getElementById("input-image-import");
      document.getElementById("btn-import-images").addEventListener("click", function () {
        fileInput.click();
      });
      fileInput.addEventListener("change", function () {
        if (fileInput.files && fileInput.files.length) importImages(fileInput.files);
        fileInput.value = "";
      });
      document.getElementById("btn-export-html").addEventListener("click", exportThisVersion);
      document.getElementById("btn-restore-default").addEventListener("click", restoreDefault);
    }

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", init);
    } else {
      init();
    }
  })();
  </script>
</body>
</html>
