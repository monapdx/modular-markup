<!DOCTYPE html>
<html lang="en" class="page-sticker-sheet-sticker-sheet">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="stylesheet" href="../neo-brutal-overrides.css" />
<title>Neo Brutalist Sticker Grid</title>
<style>
  /* Toolbar: matches sticker vault palette (scoped to this page class) */
  html.page-sticker-sheet-sticker-sheet .sticker-toolbar {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 0.65rem 0.85rem;
    margin-bottom: 1.25rem;
    padding: 0.65rem 0.85rem;
    background: var(--lime, #c6ff00);
    border: var(--border, 4px solid #000);
    box-shadow: var(--shadow, 6px 6px 0 #000);
  }
  html.page-sticker-sheet-sticker-sheet .sticker-toolbar button {
    font: inherit;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    padding: 0.45rem 0.85rem;
    cursor: pointer;
    border: 3px solid var(--black, #000);
    border-radius: 999px;
    box-shadow: 4px 4px 0 var(--black, #000);
    background: var(--pink, #ff4fd8);
    color: var(--black, #000);
    transition: transform 0.12s ease, box-shadow 0.12s ease;
  }
  html.page-sticker-sheet-sticker-sheet .sticker-toolbar button:hover {
    transform: translate(-2px, -2px);
    box-shadow: 6px 6px 0 var(--black, #000);
  }
  html.page-sticker-sheet-sticker-sheet .sticker-toolbar button.secondary {
    background: var(--blue, #42d9ff);
  }
  html.page-sticker-sheet-sticker-sheet .sticker-toolbar button.danger {
    background: var(--white, #fff);
  }
  html.page-sticker-sheet-sticker-sheet .sticker-toolbar .sticker-status {
    margin-left: auto;
    font-size: 0.72rem;
    font-weight: 800;
    text-transform: uppercase;
    color: var(--black, #000);
    max-width: 14rem;
    text-align: right;
  }
  html.page-sticker-sheet-sticker-sheet .sticker-toolbar input[type="file"] {
    position: absolute;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    white-space: nowrap;
    border: 0;
  }
  html.page-sticker-sheet-sticker-sheet .label[contenteditable="true"] {
    cursor: text;
    min-width: 2ch;
    outline: none;
  }
  html.page-sticker-sheet-sticker-sheet .label[contenteditable="true"]:focus {
    box-shadow: 0 0 0 2px var(--black, #000);
  }
</style>
</head>
<body>

<div class="wrapper">

  <div class="sticker-toolbar" role="toolbar" aria-label="Sticker sheet tools">
    <button type="button" id="btn-import-gifs">Import GIFs</button>
    <input type="file" id="input-gif-import" accept=".gif,image/gif" multiple aria-label="Select GIF files" />
    <button type="button" id="btn-export-html" class="secondary">Export This Version</button>
    <button type="button" id="btn-restore-default" class="danger">Restore Default</button>
    <span class="sticker-status" id="sticker-status" aria-live="polite">Changes saved locally</span>
  </div>

  <div class="title">
    Sticker Vault
  </div>

  <div class="table-shell">
    <table>
      <tbody id="sticker-tbody"></tbody>
    </table>
  </div>

</div>

<script>
(function () {
  var LS_KEY = "mm-sticker-sheet-v1";
  var COLS = 4;
  var stickers = [];

  var DEFAULT_STICKERS = [
    { label: "Belle", src: "belle.gif", fileName: "belle.gif" },
    { label: "Aurora", src: "sleeping-beauty.gif", fileName: "sleeping-beauty.gif" },
    { label: "Pocahontas", src: "poca.gif", fileName: "poca.gif" },
    { label: "Jasmine", src: "jasmine.gif", fileName: "jasmine.gif" },
    { label: "Cinderella", src: "cinderella.gif", fileName: "cinderella.gif" },
    { label: "Snow White", src: "snow-white.gif", fileName: "snow-white.gif" },
    { label: "Mulan", src: "mulan.gif", fileName: "mulan.gif" },
    { label: "Ariel", src: "mermaid.gif", fileName: "mermaid.gif" }
  ];

  var statusEl = null;
  var saveLabelTimer = null;

  function setStatus(msg) {
    if (!statusEl) statusEl = document.getElementById("sticker-status");
    if (statusEl) statusEl.textContent = msg || "";
  }

  function fileNameToLabel(filename) {
    var base = String(filename || "").replace(/^.*[\\/]/, "");
    base = base.replace(/\.(gif|png|jpe?g|webp)$/i, "");
    base = base.replace(/[-_]+/g, " ").replace(/\s+/g, " ").trim();
    if (!base) return "Sticker";
    return base.split(" ").map(function (w) {
      if (!w) return "";
      return w.charAt(0).toUpperCase() + w.slice(1).toLowerCase();
    }).join(" ");
  }

  function readFileAsDataURL(file) {
    return new Promise(function (resolve, reject) {
      var fr = new FileReader();
      fr.onload = function () {
        resolve(fr.result);
      };
      fr.onerror = function () {
        reject(fr.error || new Error("read failed"));
      };
      fr.readAsDataURL(file);
    });
  }

  function isGifFile(file) {
    var n = (file && file.name) || "";
    var t = (file && file.type) || "";
    return /\.gif$/i.test(n) || t === "image/gif";
  }

  function chunk(arr, size) {
    var out = [];
    for (var i = 0; i < arr.length; i += size) {
      out.push(arr.slice(i, i + size));
    }
    return out;
  }

  function getDefaultStickers() {
    return DEFAULT_STICKERS.map(function (s) {
      return { label: s.label, src: s.src, fileName: s.fileName };
    });
  }

  function getStickersFromDom() {
    var nodes = document.querySelectorAll("#sticker-tbody .sticker");
    return Array.prototype.map.call(nodes, function (el) {
      var img = el.querySelector("img");
      var label = el.querySelector(".label");
      return {
        label: (label && label.textContent ? label.textContent : "").replace(/\s+/g, " ").trim(),
        src: img ? img.getAttribute("src") || "" : "",
        fileName: el.getAttribute("data-file-name") || ""
      };
    });
  }

  function saveStickers() {
    stickers = getStickersFromDom();
    try {
      localStorage.setItem(LS_KEY, JSON.stringify(stickers));
      setStatus("Changes saved locally");
    } catch (e) {
      setStatus("Could not save");
    }
  }

  function loadStickers() {
    try {
      var raw = localStorage.getItem(LS_KEY);
      if (!raw) return getDefaultStickers();
      var arr = JSON.parse(raw);
      if (!Array.isArray(arr) || arr.length === 0) return getDefaultStickers();
      return arr;
    } catch (e) {
      return getDefaultStickers();
    }
  }

  function removeBootElementIfPresent() {
    var el = document.getElementById("mm-sticker-boot");
    if (el && el.parentNode) el.parentNode.removeChild(el);
  }

  function readBootStickers() {
    var el = document.getElementById("mm-sticker-boot");
    if (!el || !el.textContent.trim()) return null;
    var text = el.textContent;
    el.parentNode.removeChild(el);
    try {
      var arr = JSON.parse(text);
      if (Array.isArray(arr) && arr.length) return arr;
    } catch (e) {}
    return null;
  }

  function scheduleSaveLabels() {
    if (saveLabelTimer) clearTimeout(saveLabelTimer);
    saveLabelTimer = setTimeout(function () {
      saveStickers();
    }, 280);
  }

  function renderStickers(list) {
    stickers = list.slice();
    var tbody = document.getElementById("sticker-tbody");
    if (!tbody) return;
    tbody.innerHTML = "";
    var rows = chunk(stickers, COLS);
    rows.forEach(function (rowItems) {
      var tr = document.createElement("tr");
      rowItems.forEach(function (item) {
        var td = document.createElement("td");
        var wrap = document.createElement("div");
        wrap.className = "sticker";
        if (item.fileName) wrap.setAttribute("data-file-name", item.fileName);
        var img = document.createElement("img");
        img.setAttribute("src", item.src);
        img.setAttribute("alt", "");
        var lab = document.createElement("div");
        lab.className = "label";
        lab.setAttribute("contenteditable", "true");
        lab.setAttribute("spellcheck", "false");
        lab.textContent = item.label || "";
        lab.addEventListener("input", scheduleSaveLabels);
        lab.addEventListener("blur", function () {
          saveStickers();
        });
        lab.addEventListener("keydown", function (ev) {
          if (ev.key === "Enter") {
            ev.preventDefault();
            lab.blur();
          }
        });
        wrap.appendChild(img);
        wrap.appendChild(lab);
        td.appendChild(wrap);
        tr.appendChild(td);
      });
      tbody.appendChild(tr);
    });
  }

  function importGifs(fileList) {
    var files = Array.prototype.slice.call(fileList || [], 0).filter(isGifFile);
    if (!files.length) {
      setStatus("No GIF files selected");
      return;
    }
    setStatus("Importing GIFs…");
    var chain = Promise.resolve();
    var newItems = [];
    files.forEach(function (file) {
      chain = chain.then(function () {
        return readFileAsDataURL(file).then(function (dataUrl) {
          newItems.push({
            label: fileNameToLabel(file.name),
            src: dataUrl,
            fileName: file.name
          });
        });
      });
    });
    chain
      .then(function () {
        stickers = stickers.concat(newItems);
        renderStickers(stickers);
        saveStickers();
        setStatus("Changes saved locally");
      })
      .catch(function () {
        setStatus("Could not save");
      });
  }

  function getEmbeddedStickerCss() {
    return (
      "html.page-sticker-sheet-sticker-sheet{--bg:#0a0a0a;--lime:#c6ff00;--pink:#ff4fd8;--blue:#42d9ff;--white:#fff;--black:#000;--border:4px solid var(--black);--shadow:6px 6px 0 var(--black)}" +
      "html.page-sticker-sheet-sticker-sheet *{box-sizing:border-box}" +
      "html.page-sticker-sheet-sticker-sheet body{margin:0;padding:2rem;background:var(--bg);font-family:Arial,Helvetica,sans-serif}" +
      "html.page-sticker-sheet-sticker-sheet .wrapper{max-width:1400px;margin:auto}" +
      "html.page-sticker-sheet-sticker-sheet .title{display:inline-block;margin-bottom:1.5rem;padding:.75rem 1.25rem;background:var(--pink);border:var(--border);box-shadow:var(--shadow);font-size:clamp(2rem,5vw,4rem);font-weight:900;text-transform:uppercase;letter-spacing:-.06em;color:var(--black)}" +
      "html.page-sticker-sheet-sticker-sheet .table-shell{background:var(--lime);border:var(--border);box-shadow:10px 10px 0 var(--black);padding:1rem;overflow-x:auto}" +
      "html.page-sticker-sheet-sticker-sheet table{width:100%;border-collapse:collapse;table-layout:fixed;min-width:700px;background:var(--white);border:var(--border)}" +
      "html.page-sticker-sheet-sticker-sheet td{border:3px solid var(--black);padding:.65rem;background:var(--white)}" +
      "html.page-sticker-sheet-sticker-sheet .sticker{position:relative;width:100%;aspect-ratio:1/1;border:3px solid var(--black);background:linear-gradient(45deg,#e5e5e5 25%,transparent 25%),linear-gradient(-45deg,#e5e5e5 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#e5e5e5 75%),linear-gradient(-45deg,transparent 75%,#e5e5e5 75%);background-size:20px 20px;background-position:0 0,0 10px,10px -10px,-10px 0;overflow:hidden;transition:transform .15s ease,background .15s ease}" +
      "html.page-sticker-sheet-sticker-sheet .sticker:hover{transform:translate(-4px,-4px);box-shadow:6px 6px 0 var(--black);z-index:2}" +
      "html.page-sticker-sheet-sticker-sheet .sticker img{width:100%;height:100%;object-fit:contain;display:block}" +
      "html.page-sticker-sheet-sticker-sheet .label{position:absolute;left:8px;bottom:8px;background:var(--pink);border:2px solid var(--black);padding:.25rem .5rem;font-size:.75rem;font-weight:900;text-transform:uppercase;box-shadow:3px 3px 0 var(--black)}" +
      "html.page-sticker-sheet-sticker-sheet .sticker-toolbar{display:flex;flex-wrap:wrap;align-items:center;gap:.65rem .85rem;margin-bottom:1.25rem;padding:.65rem .85rem;background:var(--lime);border:var(--border);box-shadow:var(--shadow)}" +
      "html.page-sticker-sheet-sticker-sheet .sticker-toolbar button{font:inherit;font-weight:900;text-transform:uppercase;letter-spacing:.04em;padding:.45rem .85rem;cursor:pointer;border:3px solid var(--black);border-radius:999px;box-shadow:4px 4px 0 var(--black);background:var(--pink);color:var(--black);transition:transform .12s ease,box-shadow .12s ease}" +
      "html.page-sticker-sheet-sticker-sheet .sticker-toolbar button:hover{transform:translate(-2px,-2px);box-shadow:6px 6px 0 var(--black)}" +
      "html.page-sticker-sheet-sticker-sheet .sticker-toolbar button.secondary{background:var(--blue)}" +
      "html.page-sticker-sheet-sticker-sheet .sticker-toolbar button.danger{background:var(--white)}" +
      "html.page-sticker-sheet-sticker-sheet .sticker-toolbar .sticker-status{margin-left:auto;font-size:.72rem;font-weight:800;text-transform:uppercase;color:var(--black);max-width:14rem;text-align:right}" +
      "html.page-sticker-sheet-sticker-sheet .sticker-toolbar input[type=file]{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}" +
      "html.page-sticker-sheet-sticker-sheet .label[contenteditable=true]{cursor:text;min-width:2ch;outline:none}" +
      "html.page-sticker-sheet-sticker-sheet .label[contenteditable=true]:focus{box-shadow:0 0 0 2px var(--black)}" +
      "@media(max-width:900px){html.page-sticker-sheet-sticker-sheet body{padding:1rem}html.page-sticker-sheet-sticker-sheet table{min-width:0}html.page-sticker-sheet-sticker-sheet tbody{display:grid;grid-template-columns:repeat(2,1fr);gap:.75rem}html.page-sticker-sheet-sticker-sheet tr{display:contents}html.page-sticker-sheet-sticker-sheet td{padding:.5rem}}" +
      "@media(max-width:560px){html.page-sticker-sheet-sticker-sheet tbody{grid-template-columns:1fr}}"
    );
  }

  function getAppScriptSource() {
    var scripts = document.getElementsByTagName("script");
    return scripts[scripts.length - 1].textContent || "";
  }

  function exportThisVersion() {
    saveStickers();
    var snapshot = getStickersFromDom();
    setStatus("Export ready");
    var bootJson = JSON.stringify(snapshot).replace(/</g, "\\u003c");
    var css = getEmbeddedStickerCss();
    var scriptBody = getAppScriptSource();
    var toolbarHtml =
      '<div class="sticker-toolbar" role="toolbar" aria-label="Sticker sheet tools">' +
      '<button type="button" id="btn-import-gifs">Import GIFs</button>' +
      '<input type="file" id="input-gif-import" accept=".gif,image/gif" multiple aria-label="Select GIF files" />' +
      '<button type="button" id="btn-export-html" class="secondary">Export This Version</button>' +
      '<button type="button" id="btn-restore-default" class="danger">Restore Default</button>' +
      '<span class="sticker-status" id="sticker-status" aria-live="polite">Changes saved locally</span>' +
      "</div>";
    var inner =
      '<div class="wrapper">' +
      toolbarHtml +
      '<div class="title">Sticker Vault</div>' +
      '<div class="table-shell"><table><tbody id="sticker-tbody"></tbody></table></div>' +
      "</div>" +
      '<script type="application/json" id="mm-sticker-boot">' +
      bootJson +
      "<\/script>" +
      "<script>" +
      scriptBody +
      "<\/script>";
    var doc =
      "<!DOCTYPE html>\n" +
      '<html lang="en" class="page-sticker-sheet-sticker-sheet">\n<head>\n<meta charset="UTF-8"/>\n<meta name="viewport" content="width=device-width, initial-scale=1.0"/>\n<title>Sticker Vault (export)</title>\n<style>' +
      css +
      "</style>\n</head>\n<body>\n" +
      inner +
      "\n</body>\n</html>";
    try {
      var blob = new Blob([doc], { type: "text/html;charset=utf-8" });
      var url = URL.createObjectURL(blob);
      var a = document.createElement("a");
      a.href = url;
      a.download = "sticker-sheet-export.html";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(function () {
        URL.revokeObjectURL(url);
      }, 0);
    } catch (e) {
      setStatus("Could not save");
    }
  }

  function restoreDefault() {
    if (!window.confirm("Restore the original sticker sheet and clear imported GIFs?")) return;
    try {
      localStorage.removeItem(LS_KEY);
    } catch (e) {}
    location.reload();
  }

  function init() {
    var fromLs = null;
    try {
      var raw = localStorage.getItem(LS_KEY);
      if (raw) {
        var parsed = JSON.parse(raw);
        if (Array.isArray(parsed) && parsed.length) fromLs = parsed;
      }
    } catch (e) {}
    if (fromLs) {
      stickers = fromLs;
      removeBootElementIfPresent();
    } else {
      var boot = readBootStickers();
      if (boot) {
        stickers = boot;
        try {
          localStorage.setItem(LS_KEY, JSON.stringify(stickers));
        } catch (e2) {}
      } else {
        stickers = loadStickers();
      }
    }
    renderStickers(stickers);

    var fileInput = document.getElementById("input-gif-import");
    document.getElementById("btn-import-gifs").addEventListener("click", function () {
      fileInput.click();
    });
    fileInput.addEventListener("change", function () {
      if (fileInput.files && fileInput.files.length) {
        importGifs(fileInput.files);
      }
      fileInput.value = "";
    });
    document.getElementById("btn-export-html").addEventListener("click", exportThisVersion);
    document.getElementById("btn-restore-default").addEventListener("click", restoreDefault);
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", init);
  } else {
    init();
  }
})();
</script>

</body>
</html>
