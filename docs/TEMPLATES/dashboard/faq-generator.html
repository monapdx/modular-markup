<!DOCTYPE html>
<html lang="en" class="page-dashboard-widget neo-dark-doc">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Accordion FAQ Generator</title>
  <link rel="stylesheet" href="../neo-brutalist.css" />
  <link rel="stylesheet" href="../neo-brutal-overrides.css" />
</head>
<body>

<div id="faq-generator" class="dashboard-widget panel">
  <h3>Accordion FAQ Generator</h3>

  <label>
    Question
    <input type="text" id="faq-question" placeholder="What is this?" />
  </label>

  <label>
    Answer
    <textarea id="faq-answer" rows="4" placeholder="This is the answer."></textarea>
  </label>

  <div class="dashboard-actions">
    <button type="button" id="add-faq">+ Add FAQ Item</button>
    <button type="button" class="secondary" id="download-faq-html">Download HTML</button>
  </div>

  <h4>Preview</h4>
  <div id="faq-preview" class="dashboard-preview"></div>

  <h4>Generated HTML</h4>
  <textarea id="generated-faq-html" rows="12" readonly></textarea>
</div>

<script>
(() => {
  const items = [];

  const questionInput = document.getElementById("faq-question");
  const answerInput = document.getElementById("faq-answer");
  const addButton = document.getElementById("add-faq");
  const downloadButton = document.getElementById("download-faq-html");
  const preview = document.getElementById("faq-preview");
  const output = document.getElementById("generated-faq-html");

  function escapeHtml(value) {
    return value
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;");
  }

  function generateHtml() {
    return items
      .map(
        (item) =>
          `<details>
  <summary>${escapeHtml(item.question)}</summary>
  <p>${escapeHtml(item.answer)}</p>
</details>`.trim()
      )
      .join("\n\n");
  }

  function render() {
    const html = generateHtml();
    preview.innerHTML = html;
    output.value = html;
  }

  addButton.addEventListener("click", () => {
    const question = questionInput.value.trim();
    const answer = answerInput.value.trim();

    if (!question || !answer) {
      alert("Please enter both a question and an answer.");
      return;
    }

    items.push({ question, answer });

    questionInput.value = "";
    answerInput.value = "";
    render();
  });

  downloadButton.addEventListener("click", () => {
    const html = `<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Generated FAQ</title>
</head>
<body>
${generateHtml()}
</body>
</html>`;

    const blob = new Blob([html], { type: "text/html;charset=utf-8" });
    const link = document.createElement("a");
    const url = URL.createObjectURL(blob);
    link.href = url;
    link.download = "generated-faq.html";
    link.click();
    setTimeout(() => URL.revokeObjectURL(url), 0);
  });

  render();
})();
</script>

</body>
</html>
