<!DOCTYPE html>
<html lang="en" class="page-dashboard-widget neo-dark-doc">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Progress Bar Generator</title>
  <link rel="stylesheet" href="../neo-brutalist.css" />
  <link rel="stylesheet" href="../neo-brutal-overrides.css" />
</head>
<body>

<div id="progress-bar-generator" class="dashboard-widget panel">
  <h3>Progress Bar Generator</h3>

  <label>
    Label
    <input type="text" id="progress-label" placeholder="Project Completion" />
  </label>

  <label>
    Percentage
    <input type="number" id="progress-percent" min="0" max="100" value="50" />
  </label>

  <label>
    Fill Color
    <input type="text" id="progress-color" placeholder="#b8ff24 or lime" />
  </label>

  <label>
    Show Percentage Text
    <input type="checkbox" id="show-percent" checked />
  </label>

  <div class="dashboard-actions">
    <button type="button" id="generate-progress">Generate</button>
  </div>

  <h4>Preview</h4>
  <div id="progress-preview" class="dashboard-preview"></div>

  <h4>Generated HTML</h4>
  <textarea id="generated-progress-html" rows="12" readonly></textarea>
</div>

<script>
(() => {
  const labelInput = document.getElementById("progress-label");
  const percentInput = document.getElementById("progress-percent");
  const colorInput = document.getElementById("progress-color");
  const showPercentInput = document.getElementById("show-percent");

  const preview = document.getElementById("progress-preview");
  const output = document.getElementById("generated-progress-html");

  const generateButton = document.getElementById("generate-progress");

  function escapeHtml(value) {
    return value
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;");
  }

  /** Strip characters that could break inline CSS; keep simple color tokens */
  function sanitizeCssColor(raw) {
    const s = String(raw || "").trim().slice(0, 80);
    if (!s) return "var(--electric-lime, #b8ff24)";
    if (/[<>"'`;{}\\]/.test(s)) return "var(--electric-lime, #b8ff24)";
    return s;
  }

  function generateHtml() {
    const label = escapeHtml(labelInput.value.trim()) || "Progress";
    const percent = Math.max(0, Math.min(100, Number(percentInput.value) || 0));

    const color = sanitizeCssColor(colorInput.value.trim() || "#b8ff24");
    const showPercent = showPercentInput.checked;

    const pctHtml = showPercent
      ? `<span class="dashboard-progress-pct">${percent}%</span>`
      : "";

    return `<div class="dashboard-progress-out">
  <div class="dashboard-progress-label">${label}</div>
  <div class="dashboard-progress-track">
    <div class="dashboard-progress-fill" style="width:${percent}%;background:${color};">
      ${pctHtml}
    </div>
  </div>
</div>`.trim();
  }

  function render() {
    const html = generateHtml();

    preview.innerHTML = html;
    output.value = html;
  }

  generateButton.addEventListener("click", render);

  render();
})();
</script>

</body>
</html>
