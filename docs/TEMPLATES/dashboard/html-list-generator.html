<!DOCTYPE html>
<html lang="en" class="page-dashboard-widget neo-dark-doc">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HTML List Generator</title>
  <link rel="stylesheet" href="../neo-brutalist.css" />
  <link rel="stylesheet" href="../neo-brutal-overrides.css" />
</head>
<body>

<div id="html-list-generator" class="dashboard-widget panel">
  <h3>HTML List Generator</h3>

  <label>
    URL
    <input type="url" id="list-url" placeholder="https://example.com" />
  </label>

  <label>
    Anchor text
    <input type="text" id="list-text" placeholder="Example link" />
  </label>

  <label>
    Custom marker image
    <input type="file" id="marker-upload" accept="image/*" />
  </label>

  <div class="dashboard-actions">
    <button type="button" id="add-list-item">+ Add List Item</button>
    <button type="button" class="secondary" id="download-html">Download HTML</button>
  </div>

  <h4>Preview</h4>
  <div id="list-preview" class="dashboard-preview"></div>

  <h4>Generated HTML</h4>
  <textarea id="generated-html" rows="10" readonly></textarea>
</div>

<script>
(() => {
  const items = [];
  let markerDataUrl = "";

  const urlInput = document.getElementById("list-url");
  const textInput = document.getElementById("list-text");
  const markerUpload = document.getElementById("marker-upload");
  const addButton = document.getElementById("add-list-item");
  const downloadButton = document.getElementById("download-html");
  const preview = document.getElementById("list-preview");
  const output = document.getElementById("generated-html");

  function escapeHtml(value) {
    return value
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;");
  }

  function generateHtml() {
    const style = markerDataUrl
      ? `<style>
ul.generated-link-list {
  list-style: none;
  padding-left: 0;
}
ul.generated-link-list li {
  background-image: url("${markerDataUrl}");
  background-repeat: no-repeat;
  background-position: 0 0.25em;
  background-size: 1em 1em;
  padding-left: 1.4em;
}
</style>

`
      : "";

    const listItems = items
      .map((item) => `  <li><a href="${escapeHtml(item.url)}">${escapeHtml(item.text)}</a></li>`)
      .join("\n");

    return `${style}<ul class="generated-link-list">
${listItems}
</ul>`;
  }

  function render() {
    const html = generateHtml();
    preview.innerHTML = html;
    output.value = html;
  }

  markerUpload.addEventListener("change", () => {
    const file = markerUpload.files[0];
    if (!file) {
      markerDataUrl = "";
      render();
      return;
    }

    const reader = new FileReader();
    reader.onload = (event) => {
      markerDataUrl = event.target.result;
      render();
    };
    reader.readAsDataURL(file);
  });

  addButton.addEventListener("click", () => {
    const url = urlInput.value.trim();
    const text = textInput.value.trim();

    if (!url || !text) {
      alert("Please enter both a URL and anchor text.");
      return;
    }

    items.push({ url, text });

    urlInput.value = "";
    textInput.value = "";
    render();
  });

  downloadButton.addEventListener("click", () => {
    const html = `<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Generated Link List</title>
</head>
<body>
${generateHtml()}
</body>
</html>`;

    const blob = new Blob([html], { type: "text/html;charset=utf-8" });
    const link = document.createElement("a");
    const url = URL.createObjectURL(blob);
    link.href = url;
    link.download = "generated-link-list.html";
    link.click();
    setTimeout(() => URL.revokeObjectURL(url), 0);
  });

  render();
})();
</script>

</body>
</html>
