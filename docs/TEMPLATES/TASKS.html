<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" class="page-tasks neo-dark-doc">
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="neo-brutalist.css" />
  <link rel="stylesheet" href="neo-brutal-overrides.css" />
  <meta name="generator" content="pandoc" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
  <title>TASKS</title>
  

<script>
document.addEventListener('DOMContentLoaded', function () {
  const editableCells = document.querySelectorAll('table td, table th');
  editableCells.forEach((cell) => {
    cell.setAttribute('contenteditable', 'true');
    cell.setAttribute('spellcheck', 'false');
    cell.classList.add('editable-cell');
  });

  const addTaskBtn = document.getElementById('add-task-btn');
  const taskListUl = document.getElementById('task-list-items');
  if (addTaskBtn && taskListUl) {
    addTaskBtn.addEventListener('click', function () {
      const li = document.createElement('li');
      const label = document.createElement('label');
      const input = document.createElement('input');
      input.type = 'checkbox';
      const text = document.createElement('span');
      text.setAttribute('contenteditable', 'true');
      text.setAttribute('spellcheck', 'false');
      label.appendChild(input);
      label.appendChild(text);
      li.appendChild(label);
      taskListUl.appendChild(li);
      text.focus();
    });
  }
});
</script>


</head>
<body>
<h1 id="tasks">✅ Tasks</h1>
<h2 id="priority">🔥 Priority</h2>

<hr />
<h2 id="task-list">📋 Task List</h2>
<p class="add-task-wrap">
  <button type="button" id="add-task-btn" class="add-task-btn">+ add task</button>
</p>
<ul class="task-list" id="task-list-items"></ul>
<table>
<thead>
<tr>
<th>Task</th>
<th>Status</th>
<th>Notes</th>
</tr>
</thead>
<tbody>
<tr>
<td></td>
<td></td>
<td></td>
</tr>
</tbody>
</table>
</body>
</html>
