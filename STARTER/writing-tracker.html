<!DOCTYPE html>
<html lang="en" class="page-writing-tracker neo-dark-doc">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="neo-brutalist.css" />
  <link rel="stylesheet" href="neo-brutal-overrides.css" />
  <title>Writing Progress Tracker</title>
</head>
<body>
  <header>
    <h1>Writing Tracker</h1>
    <p class="subtitle">Writing progress tracker for finished, in-progress, and remaining entries.</p>
  </header>

  <section class="dashboard">
    <div class="stat">
      <div class="stat-label">Total Words</div>
      <div class="stat-value" id="totalWords">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Finished Entries</div>
      <div class="stat-value" id="finishedCount">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">In Progress Entries</div>
      <div class="stat-value" id="progressCount">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Remaining Entries</div>
      <div class="stat-value" id="remainingCount">0</div>
    </div>
  </section>

  <main>
    <section class="add-panel">
      <h2>Add Entry</h2>
      <div class="add-grid">
        <div class="add-bulk-field">
          <label for="entryTitle">Entries</label>
          <textarea id="entryTitle" rows="4" placeholder="One per line, e.g.&#10;Google (494)&#10;StumbleUpon (820)"></textarea>
          <button type="button" class="secondary reset-tracker" onclick="clearAll()">Reset tracker</button>
        </div>
        <div>
          <label for="entryWords">Default word count</label>
          <input id="entryWords" type="number" min="0" placeholder="0" />
        </div>
        <div class="add-status-field">
          <label for="entryStatusTrigger">Add to</label>
          <div class="status-select">
            <input type="hidden" id="entryStatus" value="remainingShort" />
            <button
              type="button"
              class="status-select-trigger"
              id="entryStatusTrigger"
              aria-haspopup="listbox"
              aria-expanded="false"
              aria-controls="entryStatusList"
            >
              <span class="status-select-value">Remaining — Short</span>
            </button>
            <div class="status-select-list" id="entryStatusList" role="listbox" hidden>
              <button type="button" role="option" class="status-select-option is-selected" data-value="remainingShort" aria-selected="true">Remaining — Short</button>
              <button type="button" role="option" class="status-select-option" data-value="remainingMedium" aria-selected="false">Remaining — Medium</button>
              <button type="button" role="option" class="status-select-option" data-value="remainingLong" aria-selected="false">Remaining — Long</button>
              <button type="button" role="option" class="status-select-option" data-value="inProgress" aria-selected="false">In Progress</button>
              <button type="button" role="option" class="status-select-option" data-value="finished" aria-selected="false">Finished</button>
            </div>
          </div>
        </div>
        <button onclick="addEntry()">Add</button>
      </div>

      <div class="export-row">
        <button class="secondary" onclick="exportData()">Export Backup</button>
        <button class="secondary" onclick="document.getElementById('importFile').click()">Import Backup</button>
        <input id="importFile" type="file" accept="application/json" style="display:none" onchange="importData(event)" />
      </div>
    </section>

    <div class="columns">
      <section>
        <div class="section">
          <h2>Finished</h2>
          <div id="finished"></div>
        </div>

        <div class="section">
          <h2>In Progress</h2>
          <div id="inProgress"></div>
        </div>
      </section>

      <section class="section">
        <h2>Remaining</h2>

        <h3>Expected Short</h3>
        <div id="remainingShort"></div>

        <h3>Expected Medium</h3>
        <div id="remainingMedium"></div>

        <h3>Expected Long</h3>
        <div id="remainingLong"></div>
      </section>
    </div>
  </main>

  <script>
    const STORAGE_KEY = "relicsWritingProgress";

    let data = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {
      finished: [],
      inProgress: [],
      remainingShort: [],
      remainingMedium: [],
      remainingLong: []
    };

    function save() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    function formatNumber(num) {
      return Number(num || 0).toLocaleString();
    }

    function parseEntryLine(line) {
      let text = line.trim();
      if (!text) return null;

      text = text.replace(/^[-*•]\s*/, "").replace(/^\d+[.)]\s*/, "");

      const match = text.match(/^(.+?)\s*\((\d[\d,]*)\)\s*$/);
      if (match) {
        return {
          title: match[1].trim(),
          words: Number(match[2].replace(/,/g, ""))
        };
      }

      return { title: text, words: null };
    }

    function parseBulkInput(raw, defaultWords) {
      const lines = raw.split(/\r?\n/).map(parseEntryLine).filter(Boolean);
      if (!lines.length) return [];

      return lines.map((line) => ({
        title: line.title,
        words: line.words !== null ? line.words : defaultWords
      }));
    }

    function addEntry() {
      const titleInput = document.getElementById("entryTitle");
      const wordsInput = document.getElementById("entryWords");
      const statusInput = document.getElementById("entryStatus");

      const defaultWords = Number(wordsInput.value || 0);
      const entries = parseBulkInput(titleInput.value, defaultWords);
      const status = statusInput.value;

      if (!entries.length) {
        alert("Please enter at least one entry.");
        return;
      }

      const baseId = Date.now();
      entries.forEach((entry, index) => {
        data[status].push({
          id: `${baseId}-${index}`,
          title: entry.title,
          words: entry.words
        });
      });

      titleInput.value = "";
      wordsInput.value = "";
      save();
      render();
    }

    function sumWords(list) {
      return list.reduce((sum, item) => sum + Number(item.words || 0), 0);
    }

    function allLists() {
      return [
        data.finished,
        data.inProgress,
        data.remainingShort,
        data.remainingMedium,
        data.remainingLong
      ];
    }

    function clearAll() {
      if (!confirm("Reset the tracker? All entries will be removed.")) return;

      data = {
        finished: [],
        inProgress: [],
        remainingShort: [],
        remainingMedium: [],
        remainingLong: []
      };

      document.getElementById("entryTitle").value = "";
      document.getElementById("entryWords").value = "";
      setStatusValue("remainingShort");

      save();
      render();
    }

    function renderList(listName, elementId) {
      const container = document.getElementById(elementId);
      const entries = data[listName];

      if (!entries.length) {
        container.innerHTML = '<div class="empty">No entries yet.</div>';
        return;
      }

      container.innerHTML = entries.map(entry => `
          <div class="entry">
            <span class="entry-title">${escapeHtml(entry.title)}</span>
            <span class="entry-words">(${formatNumber(entry.words)})</span>
          </div>
        `).join("");
    }

    function renderStats() {
      const totalWords = allLists().reduce((sum, list) => sum + sumWords(list), 0);
      const finishedCount = data.finished.length;
      const progressCount = data.inProgress.length;
      const remainingCount =
        data.remainingShort.length +
        data.remainingMedium.length +
        data.remainingLong.length;

      document.getElementById("totalWords").textContent = formatNumber(totalWords);
      document.getElementById("finishedCount").textContent = formatNumber(finishedCount);
      document.getElementById("progressCount").textContent = formatNumber(progressCount);
      document.getElementById("remainingCount").textContent = formatNumber(remainingCount);
    }

    function render() {
      renderList("finished", "finished");
      renderList("inProgress", "inProgress");
      renderList("remainingShort", "remainingShort");
      renderList("remainingMedium", "remainingMedium");
      renderList("remainingLong", "remainingLong");
      renderStats();
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll('"', "&quot;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;");
    }

    function exportData() {
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "relics-writing-progress-backup.json";
      a.click();
      URL.revokeObjectURL(url);
    }

    function importData(event) {
      const file = event.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const imported = JSON.parse(e.target.result);
          const required = ["finished", "inProgress", "remainingShort", "remainingMedium", "remainingLong"];

          if (!required.every(key => Array.isArray(imported[key]))) {
            throw new Error("Invalid backup format.");
          }

          data = imported;
          save();
          render();
        } catch (err) {
          alert("Could not import this file.");
        }
      };
      reader.readAsText(file);
    }

    let setStatusValue = function () {};

    function initStatusSelect() {
      const wrap = document.querySelector(".status-select");
      if (!wrap || wrap.dataset.ready) return;
      wrap.dataset.ready = "1";

      const hidden = document.getElementById("entryStatus");
      const trigger = document.getElementById("entryStatusTrigger");
      const list = document.getElementById("entryStatusList");
      const valueEl = trigger.querySelector(".status-select-value");
      const options = list.querySelectorAll(".status-select-option");

      function setStatus(value) {
        hidden.value = value;
        const selected = [...options].find((option) => option.dataset.value === value);
        valueEl.textContent = selected ? selected.textContent.trim() : value;
        options.forEach((option) => {
          const isSelected = option.dataset.value === value;
          option.classList.toggle("is-selected", isSelected);
          option.setAttribute("aria-selected", isSelected ? "true" : "false");
        });
      }

      function close() {
        list.hidden = true;
        trigger.setAttribute("aria-expanded", "false");
        wrap.classList.remove("is-open");
      }

      function open() {
        list.hidden = false;
        trigger.setAttribute("aria-expanded", "true");
        wrap.classList.add("is-open");
      }

      trigger.addEventListener("click", (event) => {
        event.stopPropagation();
        if (list.hidden) open();
        else close();
      });

      options.forEach((option) => {
        option.addEventListener("click", (event) => {
          event.stopPropagation();
          setStatus(option.dataset.value);
          close();
        });
      });

      document.addEventListener("click", close);
      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape") close();
      });

      setStatusValue = setStatus;
      setStatus(hidden.value || "remainingShort");
    }

    initStatusSelect();
    render();
  </script>
</body>
</html>
