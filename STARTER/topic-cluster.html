<!DOCTYPE html>
<html lang="en" class="page-topic-cluster">
<head>
<meta charset="UTF-8" />
  <link rel="stylesheet" href="neo-brutal-overrides.css" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Editable Mindmap</title>


</head>

<body>

<div class="toolbar">
  <input id="childText" placeholder="New child node..." />
  <button id="addNode">Add Node</button>
</div>

<div class="mindmap" id="mindmap">
  <svg id="lines"></svg>

  <div class="node core" id="core" contenteditable="true">
    Main Idea
  </div>
</div>

<script>
  const mindmap = document.getElementById("mindmap");
  const core = document.getElementById("core");
  const lines = document.getElementById("lines");
  const addBtn = document.getElementById("addNode");
  const childInput = document.getElementById("childText");

  let nodes = [];

  function centerCore() {
    core.style.left = `${window.innerWidth / 2 - core.offsetWidth / 2}px`;
    core.style.top = `${window.innerHeight / 2 - core.offsetHeight / 2}px`;
  }

  function addNode(text = "New Idea") {
    const node = document.createElement("div");
    node.className = "node child";
    node.contentEditable = "true";
    node.textContent = text;

    mindmap.appendChild(node);
    nodes.push(node);

    arrangeNodes();
  }

  function arrangeNodes() {
    centerCore();
    lines.innerHTML = "";

    const centerX = window.innerWidth / 2;
    const centerY = window.innerHeight / 2;
    const radius = Math.min(window.innerWidth, window.innerHeight) * 0.34;

    nodes.forEach((node, index) => {
      const angle = (index / nodes.length) * Math.PI * 2 - Math.PI / 2;

      const x = centerX + Math.cos(angle) * radius - node.offsetWidth / 2;
      const y = centerY + Math.sin(angle) * radius - node.offsetHeight / 2;

      node.style.left = `${x}px`;
      node.style.top = `${y}px`;

      const nodeCenterX = x + node.offsetWidth / 2;
      const nodeCenterY = y + node.offsetHeight / 2;

      const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
      line.setAttribute("x1", centerX);
      line.setAttribute("y1", centerY);
      line.setAttribute("x2", nodeCenterX);
      line.setAttribute("y2", nodeCenterY);

      lines.appendChild(line);
    });
  }

  addBtn.addEventListener("click", () => {
    const text = childInput.value.trim() || "New Idea";
    addNode(text);
    childInput.value = "";
  });

  childInput.addEventListener("keydown", e => {
    if (e.key === "Enter") {
      addBtn.click();
    }
  });

  window.addEventListener("resize", arrangeNodes);

  centerCore();

  ["Character", "Setting", "Conflict", "Theme", "Scene", "Ending"].forEach(addNode);
</script>

</body>
</html>
