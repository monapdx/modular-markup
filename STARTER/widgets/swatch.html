<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Palette Press — Simple Swatch</title>
  <link rel="stylesheet" href="neo-brutalist.css" />
  <style>
    /* Page layout on top of neo-brutalist.css */
    .app {
      width: min(1200px, 100%);
      margin: 0 auto;
      padding: 24px;
      display: grid;
      gap: 22px;
    }

    .hero {
      display: grid;
      gap: 10px;
      padding: 22px;
      border: var(--border);
      border-radius: 22px;
      background: linear-gradient(135deg, rgba(255, 69, 189, 0.92), rgba(110, 231, 255, 0.58));
      box-shadow: var(--shadow);
    }

    .hero .brand {
      margin: 0;
      color: var(--electric-lime);
      text-shadow: 2px 2px 0 #000;
      font-size: 1.2rem;
    }

    .hero h1 {
      margin: 0;
      color: var(--paper);
      font-size: clamp(1.8rem, 5vw, 3.4rem);
      text-shadow: 4px 4px 0 #000;
    }

    .hero p {
      margin: 0;
      max-width: 46ch;
      color: rgba(247, 245, 239, 0.88);
      font-weight: 700;
    }

    .shell {
      display: grid;
      grid-template-columns: minmax(280px, 360px) minmax(0, 1fr);
      gap: 22px;
      align-items: start;
    }

    .controls,
    .preview-wrap {
      padding: 18px;
    }

    .controls h2,
    .preview-wrap h2 {
      margin: 0 0 14px;
      font-size: 1.2rem;
      text-shadow: 2px 2px 0 #000;
    }

    .controls label {
      display: grid;
      gap: 8px;
      margin-bottom: 14px;
      color: var(--muted);
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-size: 0.78rem;
    }

    .btn-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 8px;
    }

    .btn-row .primary { background: var(--hot-pink); }
    .btn-row .secondary { background: var(--sky-blue); color: var(--ink); }

    .errors {
      list-style: none;
      margin: 12px 0 0;
      padding: 12px 14px;
      border: 3px solid #000;
      border-radius: 14px;
      background: rgba(255, 95, 95, 0.16);
      color: #ffd0d9;
      box-shadow: 4px 4px 0 #000;
      font-size: 0.88rem;
    }

    .errors:empty { display: none; }

    .status {
      min-height: 1.25rem;
      margin: 12px 0 0;
      color: var(--muted);
      font-weight: 700;
      font-size: 0.9rem;
    }

    .status.ok { color: var(--electric-lime); }
    .status.bad { color: #ff5f5f; }

    .canvas {
      border: 3px solid #000;
      border-radius: 14px;
      padding: 14px;
      background:
        linear-gradient(45deg, #2a2436 25%, transparent 25%) 0 0 / 16px 16px,
        linear-gradient(-45deg, #2a2436 25%, transparent 25%) 0 8px / 16px 16px,
        #111118;
      box-shadow: 4px 4px 0 #000;
      min-height: 420px;
      display: grid;
      place-items: center;
    }

    #swatch-svg {
      width: 100%;
      max-width: 720px;
      height: auto;
      display: block;
      border-radius: 8px;
    }

    .hint code {
      color: var(--electric-lime);
      font-weight: 700;
    }

    @media (max-width: 860px) {
      .shell { grid-template-columns: 1fr; }
      .preview-wrap { order: -1; }
    }

    @media (prefers-reduced-motion: reduce) {
      button, .btn { transition: none; }
      button:hover, .btn:hover { transform: none; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="hero">
      <p class="brand">PALETTE PRESS</p>
      <h1>Simple Swatch</h1>
      <p>Paste hex codes. Export a clean SVG or PNG swatch.</p>
    </header>

    <div class="shell">
      <aside class="panel controls" aria-label="Swatch controls">
        <h2>Input</h2>

        <label for="palette-name">
          Palette name
          <input id="palette-name" type="text" value="Electric Current" autocomplete="off" />
        </label>

        <label for="color-input">
          Colors
          <span class="hint" style="font-weight:500;text-transform:none;letter-spacing:0;font-size:0.85rem">
            One per line. Optional name after a pipe: <code>#FF2BD6 | Hot Pink</code>
          </span>
          <textarea id="color-input" rows="10" spellcheck="false">#39FF14 | Electric Lime
#FF2BD6 | Hot Pink
#00E5FF | Cyan Shock
#FFFB00 | Voltage Yellow
#17131F | Near Black</textarea>
        </label>

        <div class="btn-row">
          <button type="button" id="btn-svg" class="primary">Download SVG</button>
          <button type="button" id="btn-png" class="secondary">Download PNG</button>
        </div>

        <ul id="errors" class="errors" role="alert"></ul>
        <p id="status" class="status" role="status" aria-live="polite"></p>
      </aside>

      <main class="panel preview-wrap" aria-label="Swatch preview">
        <h2>Preview</h2>
        <div class="canvas">
          <svg
            id="swatch-svg"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 1080 1080"
            role="img"
            aria-label="Palette swatch preview"
          ></svg>
        </div>
      </main>
    </div>
  </div>

  <script>
  (() => {
  const SIZE = 1080;
  const PAD = 56;
  const DEMO = `#39FF14 | Electric Lime
#FF2BD6 | Hot Pink
#00E5FF | Cyan Shock
#FFFB00 | Voltage Yellow
#17131F | Near Black`;

  const colorInput = document.getElementById('color-input');
  const nameInput = document.getElementById('palette-name');
  const svgEl = document.getElementById('swatch-svg');
  const errorsEl = document.getElementById('errors');
  const statusEl = document.getElementById('status');
  const btnSvg = document.getElementById('btn-svg');
  const btnPng = document.getElementById('btn-png');

  /** @typedef {{ hex: string, name: string }} Color */
  /** @typedef {{ lineNumber: number, message: string }} ParseError */

  function isValidHex(value) {
    return /^#?([0-9a-fA-F]{3}|[0-9a-fA-F]{6}|[0-9a-fA-F]{8})$/.test(
      value.trim(),
    );
  }

  function normalizeHex(value) {
    const trimmed = value.trim();
    if (!isValidHex(trimmed)) return null;
    let hex = trimmed.startsWith('#') ? trimmed.slice(1) : trimmed;
    hex = hex.toUpperCase();
    if (hex.length === 3) {
      hex = hex
        .split('')
        .map((ch) => ch + ch)
        .join('');
    }
    return `#${hex}`;
  }

  function hexToRgb(hex) {
    const n = normalizeHex(hex);
    if (!n) return null;
    const body = n.slice(1);
    return {
      r: Number.parseInt(body.slice(0, 2), 16),
      g: Number.parseInt(body.slice(2, 4), 16),
      b: Number.parseInt(body.slice(4, 6), 16),
    };
  }

  function relativeLuminance(r, g, b) {
    const channel = (c) => {
      const s = c / 255;
      return s <= 0.03928 ? s / 12.92 : ((s + 0.055) / 1.055) ** 2.4;
    };
    return 0.2126 * channel(r) + 0.7152 * channel(g) + 0.0722 * channel(b);
  }

  function contrastRatio(a, b) {
    const lighter = Math.max(a, b);
    const darker = Math.min(a, b);
    return (lighter + 0.05) / (darker + 0.05);
  }

  function pickForeground(hex) {
    const rgb = hexToRgb(hex);
    if (!rgb) return '#000000';
    const lum = relativeLuminance(rgb.r, rgb.g, rgb.b);
    return contrastRatio(lum, 1) >= contrastRatio(lum, 0)
      ? '#FFFFFF'
      : '#000000';
  }

  /**
   * @param {string} raw
   * @returns {{ colors: Color[], errors: ParseError[] }}
   */
  function parseColors(raw) {
    /** @type {Color[]} */
    const colors = [];
    /** @type {ParseError[]} */
    const errors = [];

    raw.split(/\r?\n/).forEach((line, index) => {
      const trimmed = line.trim();
      if (!trimmed) return;

      const pipe = trimmed.indexOf('|');
      const hexPart = (pipe === -1 ? trimmed : trimmed.slice(0, pipe)).trim();
      const namePart = pipe === -1 ? '' : trimmed.slice(pipe + 1).trim();
      const hex = normalizeHex(hexPart);

      if (!hex) {
        errors.push({
          lineNumber: index + 1,
          message: `Invalid hex “${hexPart}”. Use 3, 6, or 8 hex digits.`,
        });
        return;
      }

      colors.push({ hex, name: namePart });
    });

    return { colors: colors.slice(0, 12), errors };
  }

  function escapeXml(text) {
    return text
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;');
  }

  function truncate(text, max) {
    if (text.length <= max) return text;
    return `${text.slice(0, Math.max(0, max - 1))}…`;
  }

  /**
   * Neo-brutalist horizontal strip swatch.
   * @param {Color[]} colors
   * @param {string} title
   */
  function buildSvgMarkup(colors, title) {
    const safeTitle = escapeXml(truncate(title.trim() || 'Untitled Palette', 36));
    const headerH = 150;
    const bandTop = PAD + headerH;
    const bandH = SIZE - bandTop - PAD;
    const bandW = SIZE - PAD * 2;
    const count = Math.max(colors.length, 1);
    const stripW = bandW / count;

    let strips = '';
    if (colors.length === 0) {
      strips = `
        <rect x="${PAD}" y="${bandTop}" width="${bandW}" height="${bandH}" fill="#20202A" stroke="#000" stroke-width="5"/>
        <text x="${SIZE / 2}" y="${bandTop + bandH / 2}" text-anchor="middle"
          fill="#B9B7C6" font-family="Inter, Impact, sans-serif" font-size="28" font-weight="900">
          ADD COLORS
        </text>`;
    } else {
      strips = colors
        .map((color, i) => {
          const x = PAD + i * stripW;
          const fg = pickForeground(color.hex);
          const label = escapeXml(
            truncate(color.name.trim() || color.hex, 22),
          );
          const hex = escapeXml(color.hex);
          const offset = 8;
          return `
            <g>
              <rect x="${x + offset}" y="${bandTop + offset}" width="${stripW - 4}" height="${bandH - 4}" fill="#000"/>
              <rect x="${x}" y="${bandTop}" width="${stripW - 4}" height="${bandH - 4}"
                fill="${color.hex}" stroke="#000" stroke-width="5"/>
              <text x="${x + 18}" y="${bandTop + bandH - 48}"
                fill="${fg}" font-family="Inter, Impact, sans-serif" font-size="20" font-weight="900">${label}</text>
              <text x="${x + 18}" y="${bandTop + bandH - 22}"
                fill="${fg}" font-family="IBM Plex Mono, monospace" font-size="15" font-weight="500">${hex}</text>
            </g>`;
        })
        .join('');
    }

    return `
      <rect width="${SIZE}" height="${SIZE}" fill="#0B0B10"/>
      <rect x="${PAD + 8}" y="${PAD + 8}" width="${SIZE - PAD * 2}" height="${headerH}" fill="#000"/>
      <rect x="${PAD}" y="${PAD}" width="${SIZE - PAD * 2}" height="${headerH}"
        fill="#B8FF24" stroke="#000" stroke-width="5"/>
      <text x="${PAD + 28}" y="${PAD + 48}"
        fill="#050508" font-family="IBM Plex Mono, monospace" font-size="16" font-weight="700" letter-spacing="2">
        PALETTE PRESS
      </text>
      <text x="${PAD + 28}" y="${PAD + 110}"
        fill="#050508" font-family="Inter, Impact, sans-serif" font-size="52" font-weight="900">${safeTitle}</text>
      ${strips}
    `;
  }

  function render() {
    const { colors, errors } = parseColors(colorInput.value);
    const title = nameInput.value;

    errorsEl.innerHTML = errors
      .map(
        (err) =>
          `<li><strong>Line ${err.lineNumber}:</strong> ${escapeXml(err.message)}</li>`,
      )
      .join('');

    svgEl.setAttribute('viewBox', `0 0 ${SIZE} ${SIZE}`);
    svgEl.innerHTML = buildSvgMarkup(colors, title);
    return colors;
  }

  function slugify(name) {
    return (
      name
        .trim()
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, '-')
        .replace(/^-+|-+$/g, '') || 'palette-swatch'
    );
  }

  function serializeSvg() {
    const clone = svgEl.cloneNode(true);
    clone.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
    clone.setAttribute('width', String(SIZE));
    clone.setAttribute('height', String(SIZE));
    return `<?xml version="1.0" encoding="UTF-8"?>\n${new XMLSerializer().serializeToString(clone)}`;
  }

  function downloadBlob(blob, filename) {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    a.rel = 'noopener';
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  }

  function setStatus(message, kind) {
    statusEl.textContent = message;
    statusEl.className = `status${kind ? ` ${kind}` : ''}`;
    if (message) {
      window.setTimeout(() => {
        if (statusEl.textContent === message) {
          statusEl.textContent = '';
          statusEl.className = 'status';
        }
      }, 2200);
    }
  }

  function downloadSvg() {
    render();
    const blob = new Blob([serializeSvg()], {
      type: 'image/svg+xml;charset=utf-8',
    });
    downloadBlob(blob, `${slugify(nameInput.value)}.svg`);
    setStatus('SVG downloaded', 'ok');
  }

  async function downloadPng() {
    render();
    await document.fonts.ready;

    const markup = serializeSvg();
    const blob = new Blob([markup], { type: 'image/svg+xml;charset=utf-8' });
    const url = URL.createObjectURL(blob);

    try {
      const image = await new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = () => reject(new Error('Failed to rasterize SVG'));
        img.src = url;
      });

      const canvas = document.createElement('canvas');
      canvas.width = SIZE;
      canvas.height = SIZE;
      const ctx = canvas.getContext('2d');
      if (!ctx) throw new Error('Canvas unsupported');

      ctx.fillStyle = '#0B0B10';
      ctx.fillRect(0, 0, SIZE, SIZE);
      ctx.drawImage(image, 0, 0, SIZE, SIZE);

      const pngBlob = await new Promise((resolve, reject) => {
        canvas.toBlob((result) => {
          if (result) resolve(result);
          else reject(new Error('PNG encoding failed'));
        }, 'image/png');
      });

      downloadBlob(pngBlob, `${slugify(nameInput.value)}.png`);
      setStatus('PNG downloaded', 'ok');
    } catch (error) {
      setStatus(
        error instanceof Error ? error.message : 'PNG export failed',
        'bad',
      );
    } finally {
      URL.revokeObjectURL(url);
    }
  }

  if (!colorInput.value.trim()) colorInput.value = DEMO;

  colorInput.addEventListener('input', render);
  nameInput.addEventListener('input', render);
  btnSvg.addEventListener('click', downloadSvg);
  btnPng.addEventListener('click', () => {
    void downloadPng();
  });

  render();
})();

  
  </script>
</body>
</html>
