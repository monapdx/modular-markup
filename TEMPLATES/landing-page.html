<!DOCTYPE html>
<html lang="en" class="page-landing-page">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="neo-brutal-overrides.css" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title> — </title>

</head>
<body>
  <div class="paper"></div>
  <main class="page">
    <section class="hero card">
      <div class="hero-copy">
        <p class="eyebrow"> /  / </p>
        <h1></h1>
        <p class="dek"></p>
        <div class="cta-row">
          <a class="button primary" href="#download"></a>
          <a class="button" href="#screens"></a>
        </div>
        <ul class="meta">
          <li></li>
          <li></li>
          <li></li>
        </ul>
      </div>
      <div class="hero-art">
        <div class="stack stack-a"></div>
        <div class="stack stack-b"></div>
        <div class="stack stack-c"></div>
        <div class="screen">
          <div class="window-bar"></div>
          <div class="screen-grid">
            <aside>
              <span class="chip hot"></span>
              <span class="chip"></span>
              <span class="chip"></span>
            </aside>
            <section>
              <div class="note yellow"></div>
              <div class="pane-row">
                <div class="note"></div>
                <div class="note dark"></div>
              </div>
            </section>
          </div>
        </div>
      </div>
    </section>

    <section class="content-grid">
      <div class="card intro">
        <h2></h2>
        <p></p>
        <p></p>
      </div>

      <div class="card bullets">
        <h2></h2>
        <ul>
          <li></li>
          <li></li>
          <li></li>
          <li></li>
        </ul>
      </div>

      <div class="card quote wide">
        <p>""</p>
      </div>
    </section>

    <section class="card" id="screens">
      <div class="section-head">
        <h2>Screenshots</h2>
        <p></p>
      </div>
      <div class="shots">
        <figure class="shot shot1"><figcaption></figcaption></figure>
        <figure class="shot shot2"><figcaption></figcaption></figure>
        <figure class="shot shot3"><figcaption></figcaption></figure>
      </div>
    </section>

    <section class="two-col">
      <div class="card install" id="download">
        <h2>Download / install</h2>
        <p></p>
        <ol>
          <li></li>
          <li></li>
          <li></li>
          <li></li>
        </ol>
      </div>

      <div class="card notes">
        <h2>Notes</h2>
        <ul>
          <li></li>
          <li></li>
          <li></li>
        </ul>
      </div>
    </section>

    <section class="card footer-card">
      <h2></h2>
      <p class="shortdesc"></p>
    </section>
  </main>
</body>
</html>
