<!DOCTYPE html>
<html lang="en" class="page-sticker-sheet-sticker-sheet">
<head>
<meta charset="UTF-8" />
  <link rel="stylesheet" href="../neo-brutal-overrides.css" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Neo Brutalist Sticker Grid</title>


</head>

<body>

    Sticker Vault

  <div class="table-shell">

    <table>
      <tbody>

        <tr>

          <td>
            <div class="sticker">
              <img src="belle.gif" alt="">

            </div>
          </td>

          <td>
            <div class="sticker">
              <img src="sleeping-beauty.gif" alt="">
              <div class="label">Aurora</div>
            </div>
          </td>

          <td>
            <div class="sticker">
              <img src="poca.gif" alt="">
              <div class="label">Pocahontas</div>
            </div>
          </td>

          <td>
            <div class="sticker">
              <img src="jasmine.gif" alt="">
              <div class="label">Jasmine</div>
            </div>
          </td>

        </tr>

        <tr>

          <td>
            <div class="sticker">
              <img src="cinderella.gif" alt="">
              <div class="label">Cinderella</div>
            </div>
          </td>

          <td>
            <div class="sticker">
              <img src="snow-white.gif" alt="">
              <div class="label">Snow White</div>
            </div>
          </td>

          <td>
            <div class="sticker">
              <img src="mulan.gif" alt="">
              <div class="label">Mulan</div>
            </div>
          </td>

          <td>
            <div class="sticker">
              <img src="mermaid.gif" alt="">
              <div class="label">Ariel</div>
            </div>

        </tr>

      </tbody>
    </table>

  </div>

</div>

</body>
</html>
