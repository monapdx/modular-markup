<h1 id="progress-tracker">📊 Progress Tracker</h1>
<table>
<thead>
<tr>
<th>Item</th>
<th>Progress</th>
<th>Status</th>
</tr>
</thead>
<tbody>
<tr>
<td></td>
<td>0%</td>
<td>⛔</td>
</tr>
<tr>
<td></td>
<td>50%</td>

<tr>

</tbody>
</table>

<script>
(function () {
  function makeTablesEditable() {
    document.querySelectorAll("table").forEach((table) => {
      table.querySelectorAll("td, th").forEach((cell) => {
        cell.setAttribute("contenteditable", "true");
        cell.setAttribute("spellcheck", "false");
        cell.classList.add("editable-cell");
      });
    });
  }

  document.addEventListener("DOMContentLoaded", makeTablesEditable);
})();
</script>

</body>
