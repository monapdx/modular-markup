<!DOCTYPE html>
<html lang="en" class="page-episode-template">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="neo-brutal-overrides.css" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Episode Tracker</title>
  
</head>
<body>

  <h1>🎙️ Episode Tracker</h1>

  <h2>Episodes</h2>

  <table id="episodes-table">
    <thead>
      <tr>
        <th>Episode Title</th>
        <th>Format</th>
        <th>Total Words</th>
        <th>Topics</th>
      </tr>
    </thead>
    <tbody>

    </tbody>
  </table>

  <datalist id="topic-options">
    <option value="sex"></option>
    <option value="rape"></option>
    <option value="anatomy"></option>
    <option value="rape"></option>
    <option value="reproduction"></option>
    <option value="marriage"></option>
    <option value="motherhood"></option>
    <option value="homosexuality"></option>
    <option value="mental illness"></option>
    <option value="clitoris"></option>
    <option value="male superiority"></option>
    <option value="female inferiority"></option>
  </datalist>

  <details>
    <summary>📌 Notes</summary>
    <p contenteditable="true">Use this table to track episode drafts, show formats, word counts, and recurring topics.</p>
  </details>

  <script>
    const formatOptions = ["broadcast", "guest", "caller", "sponsor"];

    function createSelect(options, selectedValue = options[0]) {
      const select = document.createElement("select");

      options.forEach(optionValue => {
        const option = document.createElement("option");
        option.value = optionValue;
        option.textContent = optionValue;

        if (optionValue === selectedValue) {
          option.selected = true;
        }

        select.appendChild(option);
      });

      return select;
    }

    function createTopicPicker(initialTopics = []) {
      const wrapper = document.createElement("div");
      wrapper.className = "topic-picker";

      const controls = document.createElement("div");
      controls.className = "topic-controls";

      const input = document.createElement("input");
      input.className = "topic-input";
      input.setAttribute("list", "topic-options");
      input.placeholder = "Choose or type topic";

      const addButton = document.createElement("button");
      addButton.type = "button";
      addButton.textContent = "+ Add";

      const tags = document.createElement("div");
      tags.className = "topic-tags";

      function addTopic(value) {
        const topic = value.trim();
        if (!topic) return;

        const existing = [...tags.querySelectorAll(".topic-tag span")]
          .map(span => span.textContent.toLowerCase());

        if (existing.includes(topic.toLowerCase())) {
          input.value = "";
          return;
        }

        const tag = document.createElement("span");
        tag.className = "topic-tag";

        const label = document.createElement("span");
        label.textContent = topic;

        const removeButton = document.createElement("button");
        removeButton.type = "button";
        removeButton.textContent = "×";
        removeButton.title = "Remove topic";
        removeButton.addEventListener("click", () => tag.remove());

        tag.appendChild(label);
        tag.appendChild(removeButton);
        tags.appendChild(tag);
        input.value = "";
      }

      addButton.addEventListener("click", () => addTopic(input.value));

      input.addEventListener("keydown", event => {
        if (event.key === "Enter") {
          event.preventDefault();
          addTopic(input.value);
        }
      });

      controls.appendChild(input);
      controls.appendChild(addButton);
      wrapper.appendChild(controls);
      wrapper.appendChild(tags);

      initialTopics.forEach(addTopic);

      return wrapper;
    }

    function makeEditableCell(value = "") {
      const td = document.createElement("td");
      td.contentEditable = "true";
      td.textContent = value;
      return td;
    }

    function setupExistingRows() {
      const rows = document.querySelectorAll("#episodes-table tbody tr");

      const defaults = [
        { format: "broadcast", topics: ["old web", "tech history"] },
        { format: "caller", topics: ["internet culture", "personal story"] },
        { format: "sponsor", topics: ["software", "business"] }
      ];

      rows.forEach((row, index) => {
        const formatCell = row.children[1];
        const topicsCell = row.children[3];

        formatCell.appendChild(createSelect(formatOptions, defaults[index]?.format || "broadcast"));
        topicsCell.appendChild(createTopicPicker(defaults[index]?.topics || []));
      });
    }

    function addRow(table) {
      const tbody = table.querySelector("tbody");
      const newRow = document.createElement("tr");

      newRow.appendChild(makeEditableCell(""));

      const formatCell = document.createElement("td");
      formatCell.appendChild(createSelect(formatOptions));
      newRow.appendChild(formatCell);

      newRow.appendChild(makeEditableCell(""));

      const topicsCell = document.createElement("td");
      topicsCell.appendChild(createTopicPicker());
      newRow.appendChild(topicsCell);

      tbody.appendChild(newRow);
    }

    function addButtonsToTables() {
      const tables = document.querySelectorAll("table");

      tables.forEach(table => {
        const button = document.createElement("button");
        button.textContent = "+ Add row";
        button.className = "add-row-button";

        button.addEventListener("click", () => addRow(table));

        table.insertAdjacentElement("afterend", button);
      });
    }

    setupExistingRows();
    addButtonsToTables();
  </script>
</body>
</html>
