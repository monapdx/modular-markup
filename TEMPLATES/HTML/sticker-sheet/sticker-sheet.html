<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Neo Brutalist Sticker Grid</title>

<style>
  :root{
    --bg:#0a0a0a;
    --lime:#c6ff00;
    --pink:#ff4fd8;
    --blue:#42d9ff;
    --white:#ffffff;
    --black:#000000;

    --border:4px solid var(--black);
    --shadow:6px 6px 0 var(--black);
  }

  *{
    box-sizing:border-box;
  }

  body{
    margin:0;
    padding:2rem;
    background:var(--bg);
    font-family:Arial, Helvetica, sans-serif;
  }

  .wrapper{
    max-width:1400px;
    margin:auto;
  }

  .title{
    display:inline-block;
    margin-bottom:1.5rem;
    padding:.75rem 1.25rem;
    background:var(--pink);
    border:var(--border);
    box-shadow:var(--shadow);

    font-size:clamp(2rem,5vw,4rem);
    font-weight:900;
    text-transform:uppercase;
    letter-spacing:-0.06em;
    color:var(--black);
  }

  .table-shell{
    background:var(--lime);
    border:var(--border);
    box-shadow:10px 10px 0 var(--black);
    padding:1rem;
    overflow-x:auto;
  }

  table{
    width:100%;
    border-collapse:collapse;
    table-layout:fixed;
    min-width:700px;
    background:var(--white);
    border:var(--border);
  }

  td{
    border:3px solid var(--black);
    padding:.65rem;
    background:var(--white);
  }

  .sticker{
    position:relative;
    width:100%;
    aspect-ratio:1 / 1;

    border:3px solid var(--black);

    background:
      linear-gradient(45deg,#e5e5e5 25%,transparent 25%),
      linear-gradient(-45deg,#e5e5e5 25%,transparent 25%),
      linear-gradient(45deg,transparent 75%,#e5e5e5 75%),
      linear-gradient(-45deg,transparent 75%,#e5e5e5 75%);

    background-size:20px 20px;
    background-position:0 0,0 10px,10px -10px,-10px 0;

    overflow:hidden;

    transition:
      transform .15s ease,
      background .15s ease;
  }

  .sticker:hover{
    transform:translate(-4px,-4px);
    box-shadow:6px 6px 0 var(--black);
    z-index:2;
  }

  .sticker img{
    width:100%;
    height:100%;
    object-fit:contain;
    display:block;
  }

  .label{
    position:absolute;
    left:8px;
    bottom:8px;

    background:var(--pink);
    border:2px solid var(--black);

    padding:.25rem .5rem;

    font-size:.75rem;
    font-weight:900;
    text-transform:uppercase;

    box-shadow:3px 3px 0 var(--black);
  }

  /* MOBILE */

  @media (max-width: 900px){

    body{
      padding:1rem;
    }

    table{
      min-width:0;
    }

    tbody{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:.75rem;
    }

    tr{
      display:contents;
    }

    td{
      padding:.5rem;
    }
  }

  @media (max-width: 560px){

    tbody{
      grid-template-columns:1fr;
    }
  }
</style>
</head>

<body>

<div class="wrapper">

    Sticker Vault
  </div>

    <table>

        </tr>

        <tr>

          <td>
