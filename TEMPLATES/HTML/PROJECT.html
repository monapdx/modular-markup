  <div class="value" id="val">50%</div>
  <input type="range" min="0" max="100" value="50" id="range"/>
</div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {
  document.querySelectorAll("table").forEach(function (table) {
    table.querySelectorAll("th, td").forEach(function (cell) {
      cell.setAttribute("contenteditable", "true");
      cell.setAttribute("spellcheck", "false");
      cell.setAttribute("tabindex", "0");
    });
  });

  var projectTable = document.getElementById("project-table");
  if (projectTable) {
    var headerCells = projectTable.querySelectorAll("thead tr th");
    var colCount = headerCells.length;
    if (!colCount) {
      var firstRow = projectTable.querySelector("tbody tr");
      if (firstRow) {
        colCount = firstRow.querySelectorAll("td").length;
      }
    }
    if (colCount) {
      var rowBtn = document.createElement("button");
      rowBtn.type = "button";
      rowBtn.className = "add-table-row-btn";
      rowBtn.textContent = "+ add row";
      projectTable.insertAdjacentElement("afterend", rowBtn);

      rowBtn.addEventListener("click", function () {
        var tbody = projectTable.querySelector("tbody");
        if (!tbody) {
          tbody = projectTable.appendChild(document.createElement("tbody"));
        }
        var tr = document.createElement("tr");
        for (var i = 0; i < colCount; i++) {
          var td = document.createElement("td");
          td.setAttribute("contenteditable", "true");
          td.setAttribute("spellcheck", "false");
          td.setAttribute("tabindex", "0");
          tr.appendChild(td);
        }
        tbody.appendChild(tr);
      });
    }
  }

  var range = document.getElementById("range");
  var val = document.getElementById("val");
  if (range && val) {
    function updateProgressSlider() {
      var v = range.value;
      val.textContent = v + "%";
      range.style.background = "linear-gradient(to right, #4caf50 " + v + "%, #ddd " + v + "%)";
    }
    range.addEventListener("input", updateProgressSlider);
    updateProgressSlider();
  }
});
</script>
