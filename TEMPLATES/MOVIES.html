<script>
(function () {
  function makeTablesEditable() {
    document.querySelectorAll("table").forEach((table) => {
      table.querySelectorAll("td, th").forEach((cell) => {
        cell.setAttribute("contenteditable", "true");
        cell.setAttribute("spellcheck", "false");
        cell.classList.add("editable-cell");
      });
    });
  }

  function addTableRowButtons() {
    document.querySelectorAll("table").forEach((table) => {
      let colCount = table.querySelectorAll("thead tr th").length;
      if (!colCount) {
        const firstRow = table.querySelector("tbody tr");
        if (firstRow) {
          colCount = firstRow.querySelectorAll("td").length;
        }
      }
      if (!colCount) {
        return;
      }

      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "add-table-row-btn";
      btn.textContent = "+ table row";
      table.insertAdjacentElement("afterend", btn);

      btn.addEventListener("click", () => {
        let tbody = table.querySelector("tbody");
        if (!tbody) {
          tbody = table.appendChild(document.createElement("tbody"));
        }
        const tr = document.createElement("tr");
        for (let i = 0; i < colCount; i++) {
          const td = document.createElement("td");
          td.setAttribute("contenteditable", "true");
          td.setAttribute("spellcheck", "false");
          td.classList.add("editable-cell");
          tr.appendChild(td);
        }
        tbody.appendChild(tr);
      });
    });
  }

  document.addEventListener("DOMContentLoaded", () => {
    makeTablesEditable();
    addTableRowButtons();
  });
})();
</script>
