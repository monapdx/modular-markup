<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Frontend Kanban Board</title>
  <style>
    :root {
      --bg: #101014;
      --panel: #181820;
      --card: #f7f7f2;
      --ink: #101014;
      --muted: #8d8d99;
      --line: #050505;
      --pink: #ff4fd8;
      --lime: #c7ff3d;
      --blue: #6ee7ff;
      --danger: #ff5f5f;
      --shadow: 7px 7px 0 #000;
      --radius: 18px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 10% 10%, rgba(255, 79, 216, 0.18), transparent 30%),
        radial-gradient(circle at 90% 5%, rgba(199, 255, 61, 0.12), transparent 28%),
        var(--bg);
      color: white;
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    .app {
      width: min(1500px, 100%);
      margin: 0 auto;
      padding: 24px;
    }

    header {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 18px;
      align-items: center;
      margin-bottom: 22px;
    }

    .title-block {
      border: 3px solid var(--line);
      background: var(--panel);
      box-shadow: var(--shadow);
      border-radius: var(--radius);
      padding: 18px;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 5vw, 4.5rem);
      line-height: 0.92;
      letter-spacing: -0.07em;
      text-transform: uppercase;
    }

    .subtitle {
      margin: 10px 0 0;
      color: var(--muted);
      max-width: 70ch;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: flex-end;
    }

    .btn {
      border: 3px solid var(--line);
      background: var(--lime);
      color: var(--ink);
      border-radius: 999px;
      padding: 11px 16px;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 4px 4px 0 #000;
      transition: transform 0.15s ease, box-shadow 0.15s ease, filter 0.15s ease;
    }

    .btn:hover {
      transform: translate(-2px, -2px);
      box-shadow: 6px 6px 0 #000;
      filter: brightness(1.04);
    }

    .btn:active {
      transform: translate(2px, 2px);
      box-shadow: 2px 2px 0 #000;
    }

    .btn.secondary {
      background: white;
    }

    .btn.danger {
      background: var(--danger);
      color: white;
    }

    .search-row {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) auto;
      gap: 12px;
      margin-bottom: 20px;
    }

    .search-row input {
      width: 100%;
      border: 3px solid var(--line);
      border-radius: 999px;
      padding: 13px 18px;
      background: white;
      color: var(--ink);
      box-shadow: 4px 4px 0 #000;
      outline: none;
      font-weight: 700;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(4, minmax(260px, 1fr));
      gap: 18px;
      align-items: start;
      overflow-x: auto;
      padding-bottom: 16px;
    }

    .column {
      min-width: 260px;
      background: var(--panel);
      border: 3px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 14px;
      transition: background 0.2s ease, transform 0.2s ease;
    }

    .column.drag-over {
      background: #262631;
      transform: translateY(-4px);
    }

    .column-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
      border-bottom: 3px solid var(--line);
      padding-bottom: 10px;
    }

    .column-title {
      display: flex;
      align-items: center;
      gap: 9px;
      font-size: 1.05rem;
      font-weight: 950;
      text-transform: uppercase;
      letter-spacing: -0.03em;
    }

    .dot {
      width: 15px;
      height: 15px;
      border-radius: 999px;
      border: 2px solid var(--line);
      background: var(--pink);
    }

    .column:nth-child(2) .dot { background: var(--blue); }
    .column:nth-child(3) .dot { background: var(--lime); }
    .column:nth-child(4) .dot { background: white; }

    .count {
      display: inline-grid;
      place-items: center;
      min-width: 34px;
      height: 30px;
      border: 3px solid var(--line);
      border-radius: 999px;
      background: white;
      color: var(--ink);
      font-weight: 950;
    }

    .cards {
      display: grid;
      gap: 12px;
      min-height: 180px;
    }

    .empty {
      display: grid;
      place-items: center;
      min-height: 120px;
      border: 3px dashed rgba(255,255,255,0.25);
      border-radius: 14px;
      color: var(--muted);
      text-align: center;
      padding: 16px;
      font-weight: 800;
    }

    .card {
      background: var(--card);
      color: var(--ink);
      border: 3px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      box-shadow: 5px 5px 0 #000;
      cursor: grab;
      animation: cardIn 0.25s ease both;
    }

    .card:active {
      cursor: grabbing;
    }

    .card.dragging {
      opacity: 0.55;
      transform: rotate(2deg) scale(0.98);
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(8px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .card-top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: start;
    }

    .card h3 {
      margin: 0;
      font-size: 1.05rem;
      letter-spacing: -0.03em;
      overflow-wrap: anywhere;
    }

    .card p {
      margin: 8px 0 12px;
      color: #3f3f46;
      line-height: 1.4;
      overflow-wrap: anywhere;
      white-space: pre-wrap;
    }

    .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      align-items: center;
      justify-content: space-between;
    }

    .tag {
      border: 2px solid var(--line);
      background: var(--pink);
      color: white;
      border-radius: 999px;
      padding: 4px 9px;
      font-size: 0.78rem;
      font-weight: 950;
      text-transform: uppercase;
    }

    .priority-low { background: var(--blue); color: var(--ink); }
    .priority-medium { background: var(--lime); color: var(--ink); }
    .priority-high { background: var(--pink); color: white; }

    .icon-btn {
      border: 2px solid var(--line);
      background: white;
      color: var(--ink);
      border-radius: 10px;
      font-weight: 950;
      cursor: pointer;
      width: 32px;
      height: 30px;
      box-shadow: 2px 2px 0 #000;
    }

    .icon-row {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }

    dialog {
      width: min(560px, calc(100% - 28px));
      border: 3px solid var(--line);
      border-radius: 20px;
      box-shadow: 10px 10px 0 #000;
      padding: 0;
      background: white;
      color: var(--ink);
    }

    dialog::backdrop {
      background: rgba(0,0,0,0.72);
      backdrop-filter: blur(4px);
    }

    .modal-inner {
      padding: 20px;
    }

    .modal-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .modal-head h2 {
      margin: 0;
      text-transform: uppercase;
      letter-spacing: -0.05em;
      font-size: 2rem;
    }

    form {
      display: grid;
      gap: 13px;
    }

    label {
      display: grid;
      gap: 6px;
      font-weight: 950;
      text-transform: uppercase;
      font-size: 0.82rem;
    }

    input,
    textarea,
    select {
      border: 3px solid var(--line);
      border-radius: 13px;
      padding: 11px 12px;
      background: #fbfbf7;
      color: var(--ink);
      outline: none;
      font-weight: 700;
    }

    textarea {
      min-height: 110px;
      resize: vertical;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 6px;
      flex-wrap: wrap;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 900px) {
      header,
      .search-row {
        grid-template-columns: 1fr;
      }

      .toolbar,
      .search-row .btn {
        justify-content: stretch;
      }

      .btn {
        width: 100%;
      }
    }

    @media (max-width: 640px) {
      .app {
        padding: 14px;
      }

      .board {
        grid-template-columns: 1fr;
        overflow: visible;
      }

      .column {
        min-width: 0;
      }

      .form-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <section class="title-block">
        <h1>Kanban Board</h1>
        <p class="subtitle">A tiny frontend-only project board with draggable cards, editable tasks, search, priorities, and browser persistence.</p>
      </section>

      <div class="toolbar">
        <button class="btn" id="addCardBtn">+ Add Card</button>
        <button class="btn secondary" id="resetBtn">Reset Demo</button>
      </div>
    </header>

    <section class="search-row" aria-label="Board controls">
      <input id="searchInput" type="search" placeholder="Search cards by title or description..." />
      <button class="btn secondary" id="clearSearchBtn">Clear Search</button>
    </section>

    <section class="board" id="board" aria-label="Kanban board"></section>
  </main>

  <dialog id="cardDialog">
    <div class="modal-inner">
      <div class="modal-head">
        <h2 id="dialogTitle">Add Card</h2>
        <button class="icon-btn" id="closeDialogBtn" type="button" aria-label="Close dialog">×</button>
      </div>

      <form id="cardForm">
        <input type="hidden" id="cardId" />

        <label>
          Title
          <input id="cardTitle" required maxlength="80" placeholder="Example: Design landing page" />
        </label>

        <label>
          Description
          <textarea id="cardDescription" maxlength="500" placeholder="Add notes, requirements, links, or next steps..."></textarea>
        </label>

        <div class="form-grid">
          <label>
            Column
            <select id="cardStatus"></select>
          </label>

          <label>
            Priority
            <select id="cardPriority">
              <option value="low">Low</option>
              <option value="medium">Medium</option>
              <option value="high">High</option>
            </select>
          </label>
        </div>

        <div class="modal-actions">
          <button class="btn secondary" id="cancelBtn" type="button">Cancel</button>
          <button class="btn" type="submit">Save Card</button>
        </div>
      </form>
    </div>
  </dialog>

  <script>
    const STORAGE_KEY = "frontend-kanban-board-v1";

    const columns = [
      { id: "backlog", title: "Backlog" },
      { id: "todo", title: "To Do" },
      { id: "doing", title: "Doing" },
      { id: "done", title: "Done" }
    ];

    const demoCards = [
      {
        id: crypto.randomUUID(),
        title: "Sketch board layout",
        description: "Rough out the column structure, card shape, and controls.",
        status: "backlog",
        priority: "low",
        createdAt: Date.now() - 4000
      },
      {
        id: crypto.randomUUID(),
        title: "Add drag and drop",
        description: "Cards should move between columns and save their new status.",
        status: "todo",
        priority: "high",
        createdAt: Date.now() - 3000
      },
      {
        id: crypto.randomUUID(),
        title: "Polish styling",
        description: "Make the app feel bold, readable, and fun to use.",
        status: "doing",
        priority: "medium",
        createdAt: Date.now() - 2000
      },
      {
        id: crypto.randomUUID(),
        title: "Persist to localStorage",
        description: "Reloading the page should keep the current board state.",
        status: "done",
        priority: "medium",
        createdAt: Date.now() - 1000
      }
    ];

    let cards = loadCards();
    let searchTerm = "";
    let draggedCardId = null;

    const board = document.querySelector("#board");
    const dialog = document.querySelector("#cardDialog");
    const form = document.querySelector("#cardForm");
    const dialogTitle = document.querySelector("#dialogTitle");
    const cardIdInput = document.querySelector("#cardId");
    const cardTitleInput = document.querySelector("#cardTitle");
    const cardDescriptionInput = document.querySelector("#cardDescription");
    const cardStatusInput = document.querySelector("#cardStatus");
    const cardPriorityInput = document.querySelector("#cardPriority");
    const searchInput = document.querySelector("#searchInput");

    document.querySelector("#addCardBtn").addEventListener("click", () => openCardDialog());
    document.querySelector("#closeDialogBtn").addEventListener("click", closeDialog);
    document.querySelector("#cancelBtn").addEventListener("click", closeDialog);
    document.querySelector("#clearSearchBtn").addEventListener("click", () => {
      searchTerm = "";
      searchInput.value = "";
      renderBoard();
    });

    document.querySelector("#resetBtn").addEventListener("click", () => {
      if (!confirm("Reset the board back to the demo cards?")) return;
      cards = structuredClone(demoCards).map(card => ({ ...card, id: crypto.randomUUID() }));
      saveCards();
      renderBoard();
    });

    searchInput.addEventListener("input", event => {
      searchTerm = event.target.value.trim().toLowerCase();
      renderBoard();
    });

    form.addEventListener("submit", event => {
      event.preventDefault();

      const existingId = cardIdInput.value;
      const payload = {
        title: cardTitleInput.value.trim(),
        description: cardDescriptionInput.value.trim(),
        status: cardStatusInput.value,
        priority: cardPriorityInput.value
      };

      if (!payload.title) return;

      if (existingId) {
        cards = cards.map(card => card.id === existingId ? { ...card, ...payload } : card);
      } else {
        cards.unshift({
          id: crypto.randomUUID(),
          ...payload,
          createdAt: Date.now()
        });
      }

      saveCards();
      closeDialog();
      renderBoard();
    });

    function loadCards() {
      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        return saved ? JSON.parse(saved) : structuredClone(demoCards);
      } catch (error) {
        console.warn("Could not load saved board. Falling back to demo cards.", error);
        return structuredClone(demoCards);
      }
    }

    function saveCards() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(cards));
    }

    function populateColumnSelect() {
      cardStatusInput.innerHTML = columns
        .map(column => `<option value="${column.id}">${column.title}</option>`)
        .join("");
    }

    function renderBoard() {
      board.innerHTML = "";

      columns.forEach(column => {
        const columnEl = document.createElement("article");
        columnEl.className = "column";
        columnEl.dataset.columnId = column.id;

        columnEl.addEventListener("dragover", handleDragOver);
        columnEl.addEventListener("dragleave", handleDragLeave);
        columnEl.addEventListener("drop", handleDrop);

        const columnCards = getVisibleCards().filter(card => card.status === column.id);

        columnEl.innerHTML = `
          <div class="column-header">
            <div class="column-title"><span class="dot"></span>${escapeHtml(column.title)}</div>
            <span class="count">${columnCards.length}</span>
          </div>
          <div class="cards" data-card-list="${column.id}"></div>
        `;

        const cardsEl = columnEl.querySelector(".cards");

        if (columnCards.length === 0) {
          const emptyEl = document.createElement("div");
          emptyEl.className = "empty";
          emptyEl.textContent = searchTerm ? "No matching cards here." : "Drop cards here.";
          cardsEl.appendChild(emptyEl);
        } else {
          columnCards
            .sort((a, b) => b.createdAt - a.createdAt)
            .forEach(card => cardsEl.appendChild(createCardElement(card)));
        }

        board.appendChild(columnEl);
      });
    }

    function getVisibleCards() {
      if (!searchTerm) return cards;
      return cards.filter(card => {
        const haystack = `${card.title} ${card.description}`.toLowerCase();
        return haystack.includes(searchTerm);
      });
    }

    function createCardElement(card) {
      const cardEl = document.createElement("article");
      cardEl.className = "card";
      cardEl.draggable = true;
      cardEl.dataset.cardId = card.id;

      cardEl.innerHTML = `
        <div class="card-top">
          <h3>${escapeHtml(card.title)}</h3>
          <div class="icon-row">
            <button class="icon-btn" data-action="edit" aria-label="Edit card">✎</button>
            <button class="icon-btn" data-action="delete" aria-label="Delete card">×</button>
          </div>
        </div>
        ${card.description ? `<p>${escapeHtml(card.description)}</p>` : ""}
        <div class="tag-row">
          <span class="tag priority-${card.priority}">${escapeHtml(card.priority)}</span>
        </div>
      `;

      cardEl.addEventListener("dragstart", () => {
        draggedCardId = card.id;
        cardEl.classList.add("dragging");
      });

      cardEl.addEventListener("dragend", () => {
        draggedCardId = null;
        cardEl.classList.remove("dragging");
        document.querySelectorAll(".column").forEach(column => column.classList.remove("drag-over"));
      });

      cardEl.querySelector('[data-action="edit"]').addEventListener("click", event => {
        event.stopPropagation();
        openCardDialog(card);
      });

      cardEl.querySelector('[data-action="delete"]').addEventListener("click", event => {
        event.stopPropagation();
        deleteCard(card.id);
      });

      return cardEl;
    }

    function handleDragOver(event) {
      event.preventDefault();
      event.currentTarget.classList.add("drag-over");
    }

    function handleDragLeave(event) {
      event.currentTarget.classList.remove("drag-over");
    }

    function handleDrop(event) {
      event.preventDefault();
      const columnId = event.currentTarget.dataset.columnId;
      event.currentTarget.classList.remove("drag-over");

      if (!draggedCardId) return;

      cards = cards.map(card => card.id === draggedCardId ? { ...card, status: columnId } : card);
      saveCards();
      renderBoard();
    }

    function openCardDialog(card = null) {
      populateColumnSelect();
      form.reset();

      if (card) {
        dialogTitle.textContent = "Edit Card";
        cardIdInput.value = card.id;
        cardTitleInput.value = card.title;
        cardDescriptionInput.value = card.description;
        cardStatusInput.value = card.status;
        cardPriorityInput.value = card.priority;
      } else {
        dialogTitle.textContent = "Add Card";
        cardIdInput.value = "";
        cardStatusInput.value = "backlog";
        cardPriorityInput.value = "medium";
      }

      dialog.showModal();
      setTimeout(() => cardTitleInput.focus(), 50);
    }

    function closeDialog() {
      dialog.close();
    }

    function deleteCard(cardId) {
      const card = cards.find(item => item.id === cardId);
      if (!card) return;

      if (!confirm(`Delete “${card.title}”?`)) return;
      cards = cards.filter(item => item.id !== cardId);
      saveCards();
      renderBoard();
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    renderBoard();
  </script>
</body>
</html>
